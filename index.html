<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050302">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Scholar's Study</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
html, body { width:100%; height:100%; background:#050302; overflow:hidden; font-family:'Crimson Pro','Noto Serif SC',Georgia,serif; -webkit-tap-highlight-color:transparent; position:fixed; touch-action:none; }
#app { width:100vw; height:100vh; position:relative; overflow:hidden; }

.room { position:absolute; top:50%; left:50%; transform-origin:center center; transition:opacity 0.4s ease; }
.room.hidden { opacity:0; pointer-events:none; }

.layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; will-change:transform; }
.layer img { width:100%; height:100%; display:block; image-rendering:pixelated; image-rendering:crisp-edges; opacity:0; transition:opacity 0.5s ease; }
.layer img.loaded { opacity:1; }

/* ============================================
   STUDY 主厅景别
   后景墙 depth=0
   书柜+三本书 depth=0.2 (贴墙的家具)
   椅子+天体仪 depth=0.6 (中景家具)
   书桌+地毯 depth=0.8 (中景偏前)
   桌上地图 depth=1.2 (桌面物件)
   吊灯 depth=1.6 (最前,从天花板垂下)
============================================ */
#study #L_bg { --depth:0; z-index:1; }
#study #L_papers { --depth:0; z-index:2; }
#study .layer[id^="L_wall_"] { --depth:0; z-index:3; }
#study #L_bookshelf { --depth:0.2; z-index:4; }
#study #L_psychology_book, #study #L_sociology_book, #study #L_philosophy_book { --depth:0.2; z-index:5; }
#study #L_chair { --depth:0.6; z-index:6; }
#study #L_celestial { --depth:0.6; z-index:7; }
#study #L_desk { --depth:0.8; z-index:8; }
#study #L_world_map { --depth:1.2; z-index:9; }
#study #L_chandelier { --depth:1.6; z-index:10; }

/* ============================================
   GALLERY 展厅景别
   背景墙 depth=0
   拱门、墙挂画、嵌墙物件、台灯 depth=0.2
   家具 depth=0.6
   桌面/台面物件 depth=1.2
   飞行器 depth=2.0
============================================ */
#gallery #G_bg { --depth:0; z-index:1; }
/* 嵌墙/贴墙物件 + 拱门 + 台灯 - 后景 */
#gallery #G_arch { --depth:0.2; z-index:2; }
#gallery #G_top_lights { --depth:1.6; z-index:3; }
#gallery #G_left_lamp { --depth:0.2; z-index:3; }
#gallery #G_mona_lisa, #gallery #G_cave_painting { --depth:0.2; z-index:4; }
#gallery #G_flag { --depth:0.2; z-index:5; }
/* 家具 - 中景 */
#gallery #G_double_cabinet { --depth:0.6; z-index:6; }
#gallery #G_corner_cabinet { --depth:0.6; z-index:6; }
#gallery #G_work_table { --depth:0.6; z-index:6; }
#gallery #G_long_display { --depth:0.6; z-index:6; }
#gallery #G_test_tube_shelf { --depth:0.6; z-index:6; }
/* 嵌在柜子里的物件 - 比柜子稍前 */
#gallery #G_warfare { --depth:0.7; z-index:7; }
#gallery #G_shell, #gallery #G_knife_coin, #gallery #G_copper_coin, #gallery #G_gold_coin, #gallery #G_paper_money { --depth:0.7; z-index:7; }
#gallery #G_bottle_top, #gallery #G_bottle_middle, #gallery #G_bottle_bottom { --depth:0.7; z-index:7; }
/* 摆台面物件 - 前景 */
#gallery #G_microscope { --depth:1.2; z-index:8; }
#gallery .layer[id^="G_diorama_"] { --depth:1.2; z-index:9; }
#gallery #G_crown, #gallery #G_telescope, #gallery #G_thinker { --depth:1.2; z-index:8; }
/* 飞行器 - 最前,从天花板垂下 */
#gallery #G_flying_machine { --depth:2.0; z-index:10; }

.hotspot { position:absolute; cursor:pointer; }
.hotspot[data-type="approach"] { z-index:40; }
.hotspot[data-type="zone"] { z-index:40; }
.hotspot[data-type="item"] { z-index:50; }
.hotspot[data-type="board"] { z-index:50; }
.hotspot[data-type="goto-gallery"], .hotspot[data-type="goto-study"] { z-index:55; }

#hud { position:absolute; top:max(20px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%); z-index:100; text-align:center; pointer-events:none; transition:opacity 0.3s; }
#hud h1 { font-family:'Crimson Pro',Georgia,serif; font-weight:300; font-style:italic; font-size:16px; color:#d4b87a; letter-spacing:4px; text-shadow:0 2px 12px rgba(0,0,0,0.95); opacity:0.85; }
#hud p { font-family:'Crimson Pro',serif; font-size:9px; color:#8a7050; letter-spacing:3px; margin-top:3px; text-transform:uppercase; opacity:0.55; }
#hud.hide { opacity:0; }

#walkLabel { position:absolute; bottom:max(20px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:100; font-size:11px; color:#d4b87a; letter-spacing:2px; text-shadow:0 1px 4px rgba(0,0,0,0.95); opacity:0; pointer-events:none; font-style:italic; transition:opacity 0.4s; white-space:nowrap; }
#walkLabel.show { opacity:0.7; }

#hint { position:absolute; bottom:max(20px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:99; font-size:11px; color:#8a7050; letter-spacing:1.5px; text-shadow:0 1px 4px rgba(0,0,0,0.95); opacity:0.55; white-space:nowrap; pointer-events:none; font-style:italic; transition:opacity 0.5s; }
#hint.hide { opacity:0; }

#backBtn { position:absolute; top:max(20px,env(safe-area-inset-top)); left:16px; z-index:110; background:rgba(20,14,8,0.75); border:1px solid rgba(212,184,122,0.4); color:#d4b87a; font-family:'Crimson Pro',serif; font-size:13px; padding:9px 16px; border-radius:20px; cursor:pointer; letter-spacing:1px; font-style:italic; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); opacity:0; transform:translateX(-20px); pointer-events:none; transition:opacity 0.4s,transform 0.4s; }
#backBtn.show { opacity:1; transform:translateX(0); pointer-events:auto; }

#doorOverlay { position:fixed; inset:0; background:#000; z-index:300; opacity:0; pointer-events:none; transition:opacity 0.35s ease; }
#doorOverlay.show { opacity:1; }

#boardMode { position:fixed; inset:0; background:rgba(8,6,4,0.97); z-index:250; opacity:0; pointer-events:none; transition:opacity 0.4s; display:flex; flex-direction:column; }
#boardMode.open { opacity:1; pointer-events:auto; }
.board-head { display:flex; align-items:center; justify-content:space-between; padding:max(20px,env(safe-area-inset-top)) 16px 14px; border-bottom:1px solid rgba(212,184,122,0.15); flex-shrink:0; }
.board-head h2 { font-family:'Crimson Pro','Noto Serif SC',serif; font-style:italic; font-weight:400; font-size:18px; color:#d4b87a; letter-spacing:2px; }
.board-content { flex:1; position:relative; overflow:hidden; }
#boardCanvas { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
.board-layer { position:absolute; image-rendering:pixelated; }
.board-layer img { width:100%; height:100%; image-rendering:pixelated; image-rendering:crisp-edges; }
.board-hotspot { position:absolute; z-index:60; cursor:pointer; border-radius:4px; }

#panel { position:fixed; inset:0; background:rgba(8,6,4,0.97); z-index:400; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity 0.4s ease; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
#panel.open { opacity:1; pointer-events:auto; }
.panel-head { display:flex; align-items:center; justify-content:space-between; padding:max(20px,env(safe-area-inset-top)) 20px 14px; border-bottom:1px solid rgba(212,184,122,0.15); flex-shrink:0; }
.panel-head h2 { font-family:'Crimson Pro','Noto Serif SC',serif; font-style:italic; font-weight:400; font-size:20px; color:#e8d5a3; letter-spacing:1px; }
.close-btn { background:none; border:1px solid rgba(212,184,122,0.3); color:#c4a65a; font-family:'Crimson Pro',serif; font-size:12px; padding:6px 14px; border-radius:20px; cursor:pointer; letter-spacing:1px; }
.panel-body { flex:1; overflow-y:auto; padding:18px 20px; -webkit-overflow-scrolling:touch; }
.zoom-img-wrap { width:100%; background:rgba(20,14,8,0.5); border:1px solid rgba(212,184,122,0.12); border-radius:8px; padding:14px; margin-bottom:18px; text-align:center; }
.zoom-img-wrap img { max-width:100%; max-height:40vh; image-rendering:pixelated; }
.essence { background:linear-gradient(135deg,rgba(50,38,22,0.45) 0%,rgba(35,26,16,0.55) 100%); border:1px solid rgba(212,184,122,0.12); border-radius:10px; padding:14px 16px; margin-bottom:10px; position:relative; overflow:hidden; }
.essence::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(to bottom,#d4b87a 0%,#8a7050 100%); }
.essence h3 { font-family:'Crimson Pro','Noto Serif SC',serif; font-weight:500; font-size:15px; color:#dcc070; margin-bottom:5px; line-height:1.35; }
.essence p { font-size:13px; color:#b09a78; line-height:1.7; }

#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(20,14,8,0.92); color:#d4b87a; font-size:12px; letter-spacing:1px; padding:8px 16px; border-radius:20px; border:1px solid rgba(212,184,122,0.25); font-style:italic; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:350; white-space:nowrap; }
#toast.show { opacity:1; }

/* ============= LOADING SCREEN ============= */
#loadingScreen {
  position:fixed; inset:0; background:#050302;
  z-index:9999;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:#d4b87a;
  font-family:'Crimson Pro','Noto Serif SC',serif;
  transition:opacity 0.8s ease;
}
#loadingScreen.hidden { opacity:0; pointer-events:none; }
#loadingScreen .lt-title { font-size:24px; letter-spacing:6px; margin-bottom:14px; font-style:italic; font-weight:300; }
#loadingScreen .lt-sub { font-size:11px; letter-spacing:4px; opacity:0.5; margin-bottom:40px; font-style:italic; }
#loadingScreen .lt-bar { width:160px; height:1px; background:rgba(212,184,122,0.15); overflow:hidden; }
#loadingFill { width:0%; height:100%; background:rgba(212,184,122,0.85); transition:width 0.3s ease; }
#loadingScreen .lt-progress { font-size:10px; letter-spacing:3px; opacity:0.35; margin-top:14px; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<div id="loadingScreen">
  <div class="lt-title">Scholar's Study</div>
  <div class="lt-sub">· unfolding ·</div>
  <div class="lt-bar"><div id="loadingFill"></div></div>
  <div class="lt-progress" id="loadingProgress">0 / 47</div>
</div>
<div id="app">

<!-- ===== STUDY ===== -->
<div class="room" id="study">
  <div class="layer" id="L_bg"><img src="./L_bg.png"></div>
  <div class="layer" id="L_papers"><img src="./L_papers.png"></div>
  <div class="layer" id="L_wall_cosmos"><img src="./L_wall_cosmos.png"></div>
  <div class="layer" id="L_wall_elements"><img src="./L_wall_elements.png"></div>
  <div class="layer" id="L_wall_earth"><img src="./L_wall_earth.png"></div>
  <div class="layer" id="L_wall_evolution"><img src="./L_wall_evolution.png"></div>
  <div class="layer" id="L_wall_human"><img src="./L_wall_human.png"></div>
  <div class="layer" id="L_wall_civilization"><img src="./L_wall_civilization.png"></div>
  <div class="layer" id="L_bookshelf"><img src="./L_bookshelf.png"></div>
  <div class="layer" id="L_psychology_book"><img src="./L_psychology_book.png"></div>
  <div class="layer" id="L_sociology_book"><img src="./L_sociology_book.png"></div>
  <div class="layer" id="L_philosophy_book"><img src="./L_philosophy_book.png"></div>
  <div class="layer" id="L_chair"><img src="./L_chair.png"></div>
  <div class="layer" id="L_celestial"><img src="./L_celestial.png"></div>
  <div class="layer" id="L_desk"><img src="./L_desk.png"></div>
  <div class="layer" id="L_world_map"><img src="./L_world_map.png"></div>
  <div class="layer" id="L_chandelier"><img src="./L_chandelier.png"></div>

  <!-- Approach: anywhere in the room (lower z, items override) -->
  <div class="hotspot" data-type="zone" data-zone="upper" style="left:0%;top:0%;width:90%;height:55%"></div>
  <div class="hotspot" data-type="zone" data-zone="desk" style="left:0%;top:50%;width:90%;height:50%"></div>

  <!-- Items -->
  <div class="hotspot" data-type="item" data-key="celestial" style="left:77%;top:72%;width:18%;height:17%"></div>
  <div class="hotspot" data-type="item" data-key="psychology" style="left:50.5%;top:47%;width:5.5%;height:5%"></div>
  <div class="hotspot" data-type="item" data-key="philosophy" style="left:59%;top:47%;width:5.5%;height:5%"></div>
  <div class="hotspot" data-type="item" data-key="sociology" style="left:67%;top:47%;width:5.5%;height:5%"></div>

  <!-- Boards -->
  <div class="hotspot" data-type="board" data-board="wall" style="left:2%;top:25%;width:38%;height:32%"></div>
  <div class="hotspot" data-type="board" data-board="map" style="left:26%;top:68%;width:26%;height:9%"></div>

  <!-- Door to gallery -->
  <div class="hotspot" data-type="goto-gallery" style="left:90%;top:0%;width:10%;height:100%"></div>
</div>

<!-- ===== GALLERY ===== -->
<div class="room hidden" id="gallery">
  <div class="layer" id="G_bg"><img src="./G_bg.png"></div>
  <div class="layer" id="G_arch"><img src="./G_arch.png"></div>
  <div class="layer" id="G_top_lights"><img src="./G_top_lights.png"></div>
  <div class="layer" id="G_left_lamp"><img src="./G_left_lamp.png"></div>
  <div class="layer" id="G_mona_lisa"><img src="./G_mona_lisa.png"></div>
  <div class="layer" id="G_cave_painting"><img src="./G_cave_painting.png"></div>
  <div class="layer" id="G_flag"><img id="img_flag" src="./G_flag.png"></div>
  <!-- Furniture (mid-ground) -->
  <div class="layer" id="G_double_cabinet"><img src="./G_double_cabinet.png"></div>
  <div class="layer" id="G_corner_cabinet"><img src="./G_corner_cabinet.png"></div>
  <div class="layer" id="G_work_table"><img src="./G_work_table.png"></div>
  <div class="layer" id="G_long_display"><img src="./G_long_display.png"></div>
  <div class="layer" id="G_test_tube_shelf"><img src="./G_test_tube_shelf.png"></div>
  <!-- In-furniture items -->
  <div class="layer" id="G_warfare"><img src="./G_warfare.png"></div>
  <div class="layer" id="G_shell"><img src="./G_shell.png"></div>
  <div class="layer" id="G_knife_coin"><img src="./G_knife_coin.png"></div>
  <div class="layer" id="G_copper_coin"><img src="./G_copper_coin.png"></div>
  <div class="layer" id="G_gold_coin"><img src="./G_gold_coin.png"></div>
  <div class="layer" id="G_paper_money"><img src="./G_paper_money.png"></div>
  <div class="layer" id="G_bottle_top"><img id="img_bottle_top" src="./G_bottle_top.png"></div>
  <div class="layer" id="G_bottle_middle"><img id="img_bottle_middle" src="./G_bottle_middle.png"></div>
  <div class="layer" id="G_bottle_bottom"><img id="img_bottle_bottom" src="./G_bottle_bottom.png"></div>
  <!-- Foreground items on furniture surfaces -->
  <div class="layer" id="G_microscope"><img src="./G_microscope.png"></div>
  <div class="layer" id="G_diorama_oxygen"><img src="./G_diorama_oxygen.png"></div>
  <div class="layer" id="G_diorama_cambrian"><img src="./G_diorama_cambrian.png"></div>
  <div class="layer" id="G_diorama_dinosaur"><img src="./G_diorama_dinosaur.png"></div>
  <div class="layer" id="G_diorama_agriculture"><img src="./G_diorama_agriculture.png"></div>
  <div class="layer" id="G_crown"><img src="./G_crown.png"></div>
  <div class="layer" id="G_telescope"><img src="./G_telescope.png"></div>
  <div class="layer" id="G_thinker"><img src="./G_thinker.png"></div>
  <!-- Foremost: hanging from ceiling -->
  <div class="layer" id="G_flying_machine"><img src="./G_flying_machine.png"></div>

  <!-- Approach: anywhere in the room (avoiding the door area on the far left) -->
  <div class="hotspot" data-type="zone" data-zone="left" style="left:8%;top:0%;width:26%;height:100%"></div>
  <div class="hotspot" data-type="zone" data-zone="center" style="left:32%;top:0%;width:36%;height:100%"></div>
  <div class="hotspot" data-type="zone" data-zone="right" style="left:66%;top:0%;width:26%;height:100%"></div>

  <!-- Door back to study -->
  <div class="hotspot" data-type="goto-study" style="left:0%;top:8%;width:8%;height:80%"></div>

  <!-- Item hotspots -->
  <div class="hotspot" data-type="item" data-key="flag" data-variant="flag" style="left:9.5%;top:28%;width:11%;height:55%"></div>
  <div class="hotspot" data-type="item" data-key="microscope" style="left:18%;top:48%;width:16%;height:18%"></div>
  <!-- 3 bottles individually clickable, plus fallback group hotspot -->
  <div class="hotspot" data-type="item" data-key="bottles" data-variant="bottles" style="left:25%;top:36%;width:7%;height:14%"></div>
  <div class="hotspot" data-type="item" data-key="diorama_oxygen" style="left:32%;top:36%;width:10%;height:30%"></div>
  <div class="hotspot" data-type="item" data-key="diorama_cambrian" style="left:42.3%;top:40%;width:8%;height:22%"></div>
  <div class="hotspot" data-type="item" data-key="diorama_dinosaur" style="left:50.2%;top:40%;width:8.2%;height:22%"></div>
  <div class="hotspot" data-type="item" data-key="diorama_agriculture" style="left:58.3%;top:40%;width:7.7%;height:22%"></div>
  <!-- Currency items individually -->
  <div class="hotspot" data-type="item" data-key="shell" style="left:67.5%;top:38%;width:5%;height:13%"></div>
  <div class="hotspot" data-type="item" data-key="knife_coin" style="left:72.5%;top:38%;width:4%;height:13%"></div>
  <div class="hotspot" data-type="item" data-key="copper_coin" style="left:76.8%;top:38%;width:4%;height:13%"></div>
  <div class="hotspot" data-type="item" data-key="gold_coin" style="left:81%;top:38%;width:4%;height:13%"></div>
  <div class="hotspot" data-type="item" data-key="paper_money" style="left:85%;top:38%;width:6%;height:13%"></div>
  <!-- Warfare as a group -->
  <div class="hotspot" data-type="item" data-key="warfare" style="left:68%;top:50%;width:23%;height:18%"></div>
  <div class="hotspot" data-type="item" data-key="mona_lisa" style="left:70%;top:16%;width:7%;height:16%"></div>
  <div class="hotspot" data-type="item" data-key="cave_painting" style="left:79%;top:16%;width:10%;height:16%"></div>
  <div class="hotspot" data-type="item" data-key="flying_machine" style="left:36%;top:0%;width:34%;height:30%"></div>
  <div class="hotspot" data-type="item" data-key="crown" style="left:93%;top:43%;width:4%;height:9%"></div>
  <div class="hotspot" data-type="item" data-key="telescope" style="left:96%;top:55%;width:4%;height:14%"></div>
  <div class="hotspot" data-type="item" data-key="thinker" style="left:93%;top:54%;width:4%;height:11%"></div>
</div>

<!-- HUD -->
<div id="hud">
  <h1 id="hudTitle">Scholar's Study</h1>
  <p id="hudSubtitle">·  unfolding  ·</p>
</div>
<div id="hint">tap area to walk · tap object for essence</div>
<div id="walkLabel"></div>
<button id="backBtn" onclick="walkBack()">← step back</button>

<div id="doorOverlay"></div>

<div id="boardMode">
  <div class="board-head">
    <h2 id="boardTitle"></h2>
    <button class="close-btn" onclick="closeBoard()">close</button>
  </div>
  <div class="board-content"><div id="boardCanvas"></div></div>
</div>

<div id="toast"></div>

<div id="panel">
  <div class="panel-head">
    <h2 id="panelTitle"></h2>
    <button class="close-btn" onclick="closePanel()">close</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

</div>

<script>
// ============================================================
// DATA
// ============================================================
const objectData = {
  // 主厅
  celestial:{title:'Celestial Sphere · 天体仪',img:'./detail_celestial.png',cards:[
    {h:'宇宙的尺度',s:'太阳系→银河系→本星系群→室女座超星系团→拉尼亚凯亚。每往外一层，我们就更小。'},
    {h:'我们身上的元素来自恒星',s:'碳、氧、铁——你身体里的每一个比氢氦重的原子，都是某颗死去恒星抛出来的。'}
  ]},
  psychology:{title:'心理学 · Psychology',img:'./detail_psychology.png',cards:[
    {h:'阶段5 · 内在透镜',s:'心理学是看穿"人为什么这样选"的工具。'},

const STUDY_W = 941, STUDY_H = 1672;
const GALLERY_W = 1774, GALLERY_H = 887;

function applyRoomSize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  // STUDY: fit by height
  const sr = STUDY_W/STUDY_H, vr = vw/vh;
  let sw, sh;
  if (vr > sr) { sh = vh; sw = sh*sr; }
  else { sw = vw; sh = sw/sr; }
  studyEl.style.width = sw+'px';
  studyEl.style.height = sh+'px';
  
  // GALLERY: fit by width (top/bottom letterbox)
  const gw = vw;
  const gh = gw * (GALLERY_H/GALLERY_W);
  galleryEl.style.width = gw+'px';
  galleryEl.style.height = gh+'px';
}
applyRoomSize();
window.addEventListener('resize', applyRoomSize);

// ============================================================
// TRANSFORM
// ============================================================
function applyTransform() {
  const room = currentRoom === 'study' ? studyEl : galleryEl;
  const s = roomState[currentRoom];
  const layers = [...room.querySelectorAll('.layer')];
  const easing = '0.7s cubic-bezier(0.25, 0.1, 0.25, 1)';

  function depthToZ(depth) {
    if (depth <= 0)    return 0;
    if (depth <= 0.2)  return 30;    // 贴墙，稍突出
    if (depth <= 0.6)  return 160;   // 独立家具：与墙拉开明显距离
    if (depth <= 0.7)  return 200;   // 柜中物件：明显前突(+40)，凸出感跟桌面物件相当
    if (depth <= 0.8)  return 200;   // 书桌
    if (depth <= 1.2)  return 210;   // 桌面物件：贴着桌面(仅+10)
    if (depth <= 1.6)  return 340;   // 吊灯：悬空，明显前突
    return 430;                       // 飞行器：最近
  }

  if (s.mode === 'walked' && s.zone) {
    const zone = zoneConfig[currentRoom][s.zone];
    const P = 1000;
    const WALK = 280;
    const pctX = zone.pctX;
    const pctY = zone.pctY;

    room.style.transformOrigin = `${pctX}% ${pctY}%`;
    room.style.transform = `translate(-${pctX}%, -${pctY}%) scale(${zone.scale})`;
    room.style.transition = `transform ${easing}`;

    layers.forEach(l => {
      const depth = parseFloat(getComputedStyle(l).getPropertyValue('--depth')) || 0;
      const Z = depthToZ(depth);
      const baseRatio = P / (P - WALK);
      const layerRatio = (P - Z) / (P - Z - WALK);
      const extraScale = layerRatio / baseRatio;

      l.style.transformOrigin = `${pctX}% ${pctY}%`;
      l.style.transform = `scale(${extraScale})`;
      l.style.transition = `transform ${easing}`;
    });

  } else {
    room.style.transformOrigin = 'center center';
    room.style.transform = `translate(-50%, -50%) scale(${pinchScale})`;
    room.style.transition = `transform ${easing}`;

    layers.forEach(l => {
      l.style.transformOrigin = 'center center';
      l.style.transform = 'none';
      l.style.transition = `transform ${easing}`;
    });
  }
}

function walkInto(zoneId) {
  const s = roomState[currentRoom];
  if (s.mode !== 'overview') return;
  if (!zoneConfig[currentRoom][zoneId]) return;

  s.mode = 'walked';
  s.zone = zoneId;
  applyTransform();

  const label = zoneConfig[currentRoom][zoneId].label;
  const walkLabel = document.getElementById('walkLabel');
  walkLabel.textContent = label;
  walkLabel.classList.add('show');

  document.getElementById('hud').classList.add('hide');
  document.getElementById('hint').classList.add('hide');
  document.getElementById('backBtn').classList.add('show');
}

function walkBack() {
  const s = roomState[currentRoom];
  if (s.mode !== 'walked') return;
  s.mode = 'overview';
  s.zone = null;
  applyTransform();
  document.getElementById('hud').classList.remove('hide');
  document.getElementById('hint').classList.remove('hide');
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('walkLabel').classList.remove('show');
}

  if (target === currentRoom) return;
  const overlay = document.getElementById('doorOverlay');
  overlay.classList.add('show');
  
  setTimeout(() => {
    roomState[currentRoom] = { mode:'overview', zone:null };

      currentRoom = 'gallery';
      document.getElementById('hudTitle').textContent = 'The Gallery';
      document.getElementById('hudSubtitle').textContent = '·  the unfolding world  ·';
    } else {
      galleryEl.classList.add('hidden');

      currentRoom = 'study';
      document.getElementById('hudTitle').textContent = "Scholar's Study";
      document.getElementById('hudSubtitle').textContent = '·  unfolding  ·';

    document.getElementById('backBtn').classList.remove('show');
    document.getElementById('hud').classList.remove('hide');
    document.getElementById('hint').classList.remove('hide');
    document.getElementById('walkLabel').classList.remove('show');
    
    pinchScale = 1;
    applyTransform();
    setTimeout(() => overlay.classList.remove('show'), 100);
  }, 350);
}

// ============================================================
// TOUCH
// ============================================================
let touchStartX=0, touchStartY=0, touchMoved=false;
let pressTimer = null, pressVariantKey = null, touchIdentifier = null;
const MOVE_THRESHOLD = 8;
const LONG_PRESS = 500;

function getDist(t) {
  const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

document.addEventListener('touchstart', (e) => {
  if (document.getElementById('panel').classList.contains('open')) return;
  if (document.getElementById('boardMode').classList.contains('open')) return;
  
  if (e.touches.length === 2) {
    initialDist = getDist(e.touches);
    pinchBaseScale = pinchScale;
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    e.preventDefault();
    return;
  }
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
    touchIdentifier = e.touches[0].identifier;
    
    const target = e.target.closest('.hotspot');
    if (target && target.dataset.variant && target.dataset.type === 'item') {
      pressVariantKey = target.dataset.variant;
      pressTimer = setTimeout(() => {
        if (!touchMoved) {
          swapVariant(pressVariantKey);
          pressTimer = 'fired';
        }
      }, LONG_PRESS);
    }
  }
}, { passive: false });

document.addEventListener('touchmove', (e) => {
  if (document.getElementById('panel').classList.contains('open')) return;
  if (document.getElementById('boardMode').classList.contains('open')) return;
  
  if (e.touches.length === 2) {
    const dist = getDist(e.touches);
    const ratio = dist / initialDist;
    pinchScale = Math.max(1, Math.min(1.6, pinchBaseScale * ratio));
    applyTransform();
    document.getElementById('hud').classList.add('hide');
    document.getElementById('hint').classList.add('hide');
    e.preventDefault();
    return;
  }
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
      touchMoved = true;
      if (pressTimer && pressTimer !== 'fired') {
        clearTimeout(pressTimer);
        pressTimer = null;
      }
    }
    e.preventDefault();
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (document.getElementById('panel').classList.contains('open')) return;
  if (document.getElementById('boardMode').classList.contains('open')) return;
  
  if (e.touches.length === 0 && Math.abs(pinchScale - 1) > 0.005) {
    animatePinchBack();
  }
  
  if (pressTimer === 'fired') { pressTimer = null; pressVariantKey = null; return; }
  if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  
  if (!touchMoved && e.changedTouches.length > 0) {
    const t = e.changedTouches[0];
    if (t.identifier === touchIdentifier) {
      handleTap(t.clientX, t.clientY, e.target);
    }
  }
  pressVariantKey = null;
});

let pinchAnimId;
function animatePinchBack() {
  cancelAnimationFrame(pinchAnimId);
  function step() {
    pinchScale += (1 - pinchScale) * 0.15;
    applyTransform();
    if (Math.abs(pinchScale - 1) > 0.005) pinchAnimId = requestAnimationFrame(step);
    else {
      pinchScale = 1; applyTransform();
      const s = roomState[currentRoom];
      if (s.mode === 'overview') {
        document.getElementById('hud').classList.remove('hide');
        document.getElementById('hint').classList.remove('hide');
      }
    }
  }
  step();
}

document.addEventListener('click', (e) => {
  if ('ontouchstart' in window) return;
  if (e.target.closest('.close-btn') || e.target.closest('#backBtn')) return;
  if (document.getElementById('panel').classList.contains('open')) return;
  if (document.getElementById('boardMode').classList.contains('open')) return;
  handleTap(e.clientX, e.clientY, e.target);
});

document.addEventListener('contextmenu', (e) => {
  const t = e.target.closest('.hotspot');
  if (t && t.dataset.variant) {
    e.preventDefault();
    swapVariant(t.dataset.variant);
  }
});

// ============================================================
// TAP HANDLER
// ============================================================
function handleTap(x, y, target) {
  const s = roomState[currentRoom];
  
  const elementsAtPoint = document.elementsFromPoint(x, y);
  const hotspots = elementsAtPoint.filter(el => el.classList && el.classList.contains('hotspot'));
  
  const priority = { 'item':4, 'board':3, 'goto-gallery':2, 'goto-study':2, 'zone':1 };
  hotspots.sort((a, b) => (priority[b.dataset.type] || 0) - (priority[a.dataset.type] || 0));
  
  const hot = hotspots[0];
  
  if (s.mode === 'overview') {
    if (!hot) return;
    const t = hot.dataset.type;
    if (t === 'item') {
      const key = hot.dataset.key;
      if (objectData[key]) openPanel(key);
    } else if (t === 'board') {
      openBoard(hot.dataset.board);
    } else if (t === 'goto-gallery') {
      gotoRoom('gallery');
    } else if (t === 'goto-study') {
      gotoRoom('study');
    } else if (t === 'zone') {
      walkInto(hot.dataset.zone);
    }
  } else {
    // walked state
    if (!hot) {
      walkBack();
      return;
    }
    const t = hot.dataset.type;
    if (t === 'item') {
      const key = hot.dataset.key;
      if (objectData[key]) openPanel(key);
    } else if (t === 'goto-gallery' || t === 'goto-study') {
      gotoRoom(t === 'goto-gallery' ? 'gallery' : 'study');
    } else {
      walkBack();
    }
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

function swapVariant(key) {
  const list = variants[key];
  if (!list) return;
  variantState[key] = (variantState[key] + 1) % list.length;
  const newSrc = list[variantState[key]];
  const img = document.getElementById('img_' + key);
  if (img) img.src = newSrc;
  showToast('换一个 · variant ' + (variantState[key] + 1));
}

function openBoard(boardKey) {
  const config = boardConfig[boardKey];
  const boardCanvas = document.getElementById('boardCanvas');
  document.getElementById('boardTitle').textContent = config.title;
  boardCanvas.innerHTML = '';
  
  const vw = window.innerWidth, vh = window.innerHeight - 80;
  const ratio = config.cropW / config.cropH;
  const viewRatio = vw / vh;
  let dw, dh;
  if (viewRatio > ratio) { dh = vh*0.92; dw = dh*ratio; }
  else { dw = vw*0.94; dh = dw/ratio; }
  boardCanvas.style.width = dw+'px';
  boardCanvas.style.height = dh+'px';
  
  const scaleX = dw / config.cropW, scaleY = dh / config.cropH;
  
  config.layers.forEach(src => {
    const layer = document.createElement('div');
    layer.className = 'board-layer';
    layer.style.left = (-config.cropX * scaleX) + 'px';
    layer.style.top = (-config.cropY * scaleY) + 'px';
    layer.style.width = (config.canvasW * scaleX) + 'px';
    layer.style.height = (config.canvasH * scaleY) + 'px';
    const img = document.createElement('img');
    img.src = src;
    layer.appendChild(img);
    boardCanvas.appendChild(layer);
  });
  
  config.hotspots.forEach(hs => {
    const ho = document.createElement('div');
    ho.className = 'board-hotspot';
    if (hs.x_pct !== undefined) {
      ho.style.cssText = `left:${hs.x_pct}%;top:${hs.y_pct}%;width:${hs.w_pct}%;height:${hs.h_pct}%;`;
    } else {
      const x = (hs.x - config.cropX) * scaleX;
      const y = (hs.y - config.cropY) * scaleY;
      ho.style.cssText = `left:${x}px;top:${y}px;width:${hs.w*scaleX}px;height:${hs.h*scaleY}px;`;
    }
    ho.addEventListener('click', () => {
      if (objectData[hs.key]) openPanel(hs.key);
    });
    boardCanvas.appendChild(ho);
  });
  
  document.getElementById('boardMode').classList.add('open');
}

function closeBoard() {
  document.getElementById('boardMode').classList.remove('open');
}

// ============================================================
// PANEL
// ============================================================
function openPanel(key) {
  const data = objectData[key];
  if (!data) return;
  document.getElementById('panelTitle').textContent = data.title;
  const body = document.getElementById('panelBody');
  body.innerHTML = '';
  body.scrollTop = 0;
  if (data.img) {
    const wrap = document.createElement('div');
    wrap.className = 'zoom-img-wrap';
    const img = document.createElement('img');
    img.src = data.img;
    wrap.appendChild(img);
    body.appendChild(wrap);
  }
  data.cards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'essence';
    div.innerHTML = `<h3>${card.h}</h3><p>${card.s}</p>`;
    body.appendChild(div);
  });
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// ============= LOADING SCREEN: 追踪所有layer图片加载进度 =============
(function() {
  const layerImgs = document.querySelectorAll('.layer img');
  const total = layerImgs.length;
  let loaded = 0;
  const progressEl = document.getElementById('loadingProgress');
  const fillEl = document.getElementById('loadingFill');
  const screenEl = document.getElementById('loadingScreen');

  progressEl.textContent = '0 / ' + total;

  function markLoaded(img) {
    if (img._counted) return;
    img._counted = true;
    img.classList.add('loaded');
    loaded++;
    progressEl.textContent = loaded + ' / ' + total;
    fillEl.style.width = (loaded / total * 100) + '%';
    if (loaded >= total) {
      // 全部加载完，淡出loading screen
      setTimeout(() => screenEl.classList.add('hidden'), 400);
    }
  }

  layerImgs.forEach(img => {
    if (img.complete && img.naturalWidth > 0) {
      markLoaded(img);
    } else {
      img.addEventListener('load', () => markLoaded(img));
      img.addEventListener('error', () => markLoaded(img)); // 出错也算，避免卡死
    }
  });

  // 兜底：8秒后无论如何关闭loading screen
  setTimeout(() => screenEl.classList.add('hidden'), 8000);
})();
