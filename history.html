但是， 有一个幸存者（应该不止一个 ，但是其中有一个幸存者 ）他活了下来，他的名字叫做维里亚托斯，他回到他的部落 ，各个部落知道了那三万人的遭遇，他成了联军领袖。他用自己的战术打赢了4届罗马的将军。罗马的将军实在是拿他没办法，又不想颜面扫地，找到了他身边的三个亲信，贿赂他们杀害他。那三个人成功把维里亚托斯杀死，当第二天他们去领奖的时候，罗马人说 罗马，不向弑君者付钱。 当维里亚托斯死后，卢西塔尼亚的联盟很快就瓦解了，罗马人平定了大部分的地方。在北部的山区又坚持了一百多年，直到 奥古斯都的到来。
奥古斯都是罗马的第一任皇帝，他原本是一个将军，公元前19年他带兵来最后征服了西部的山区，这篇地方正式被罗马收服。 罗马掌管里400年的伊比利亚 奥古斯都把罗马分成了三块，并且给伊比利亚建设了一条长长的路（银之路），这条路贯穿整个伊比利亚的从南到北，这条路的作用是金属运输，连接矿区、城市和港口，沿着这条路周围慢慢生出了一座又一座的城市（围绕着经济），在这条路旁边长出的一堆城市里，最大的一座城市就是梅里达，梅里达有两条支线路，一条通过大西洋的港口-里斯本，一条通往北部山区（之前又打了一百多年的那个山区）的行政中心-布拉加。罗马人把自己的城市系统复制了过来，在这些城市里建设了罗马广场、神庙、剧场和浴场。那么罗马是怎么让伊比利亚罗马化的呢？ 很简单。 罗马的文明更有吸引力，人们自愿加入，你愿意让你孩子在村里放牛放羊 还是让他学习罗马的语言 穿罗马的衣服 读罗马的学校？
罗马和属于罗马的伊比利亚，在这样繁荣的城市里，人口不断增长，伊比利亚成了罗马的葡萄酒和橄榄油产区，因为伊比利亚非常适合种植这两种植物。罗马给伊比利亚带来了文明、技术、建设、商业，宗教也进来了，基督教传教来了伊比利亚。
伊比利亚有点像是罗马的后院，这里也是罗马，不过是副罗马。副罗马不断的往外输出着资源。军队资源、银 铜 金 锡 橄榄油 葡萄酒 小麦 盐、知识 有才华的人士在伊比利亚出了很多 ，在公元98年，伊比利亚迎来了第一次伊比利亚出生的罗马皇帝-图拉真。 图拉真是怎么当上罗马皇帝的， 图拉真的爸爸是也是一个军队官员，从小带着他四处跑，他对军队非常有兴趣，得到了很多军队的心，当时罗马的那一任皇帝 他身边的人都不喜欢他 他疑心很重 把身边的人都杀死了 ，后来被他的妻子和身边的人密谋把它给杀害了以后，皇位就真空了 ，元老院把位置给了一个老人，但是那个老人是一个文官，他不得军心，他也猜到自己可能很可能就会被谋杀 架空，结局不会太好，因为他的能力担不起他的位置，所以他想到了一个人，图拉真， 他把 图拉真收为样子，然后把皇位继承给了他。 在罗马有两个让人们最喜欢的皇帝，第一个是奥古斯都，第二个就是图拉真。 从图拉真做皇帝开始，伊比利亚不再是副罗马，而是罗马总部的一份子。
图拉真是在公元58年出生的，在公元98年1月成为皇帝的，我很少在意历史的时间，但是这个时间很重要，因为这是一个黑白分明的时间点，从图拉真开始之后的几个皇帝统治下罗马都很好，是从他这开始的，图拉真做皇帝做了十九年半，将近20年的时间，在他64岁的时候去世了，他是差不多44岁的时候成为皇帝的。 图拉真死后，把皇位传给了他的一个侄子（他妻子说的 现在历史学家还在争论）但我觉得极大有可能，是图拉真决定的，因为首先普罗蒂娜跟哈德良的关系非常好，图拉真无论去哪里，普罗蒂娜都陪着他。 图拉真一辈子只有普罗蒂娜一个老婆，她对图拉真的称呼也是很亲昵（显示他们的关系亲密度很高），关于图拉真是gay的可能性我觉得不太高，因为gay不太会跟妻子的关系这么亲密，当然我不确定啊。可是我感觉如果他真的喜欢男的话他去边境可以跟那么多男士兵呆在一起肯定不想带上他老婆的。 大概率就是他们两个人其中一人不孕，但是你想想他老公是皇帝，如果只是为了形婚的话肯定会再找女人生孩子的，所以如果不是感情 我觉得不太可能。这么说吧 如果图拉真是形婚的人 那他不可能只找一个女的。还有一点很重要就是普罗蒂娜是一个很有自己思想的女人，所以他们觉得哈德良做皇帝很适合，难道真的是盲选吗？ 你觉得盲选有这么容易吗？ 首先当时罗马确实很稳固 所以继承起来管理难度没那么大，这是一个，但是皇帝能不能做好皇帝这件事真的不容易，所以不太会是盲选选出来的，结合起来 哈德良适合做皇帝 她们夫妻应该也看出来也讨论过， 然后普罗蒂娜那么爱图拉真 她也有很好的品德应该是会尊重图拉真的选择的。
哈德良做皇帝的风格是维稳，做自己能力范围的事 ，从图拉真到哈德良到传位给安东尼·庇护——再传给马可·奥勒留。 这几位算上之前把位置给图拉真的那个皇帝，被称为罗马五贤帝。虽然我觉得把皇位给图拉真的那个不太算得上。因为如果不是他没有兵权他肯定会一直当皇帝下去。
马克奥勒留是写沉思录的那位罗马国王，我很久以前就有听过这本大名鼎鼎的书，他是五贤帝里的最后一位。这五个皇帝都有一个共同的模式，他们都不是把皇位继承给自己的儿子，而是寻找最适合皇帝这个职位的人收养为养子，把皇位传递给他。
但是到 马克奥勒留这里断了，我还没看过他的书，这引起我的思考， 关于知行合一的力量。 有空我需要去看看他的书，了解他写了什么 ，了解他的思想是什么？ 但是我看到了他的行为是什么。
他的儿子是一个怎么样的人？ 他继位的时候只有18岁，马克奥勒留是怎么死的，他是在军营里死的，他是在边境病死的，他死之前在跟日耳曼人打仗，想再把罗马扩张两个省。打了十多年，他儿子继位后6个月直接跟日耳曼人和谈，撤军，回罗马。 之前十年的仗 死的人 一切都白费了，军队会怎么看他？很快就可以打赢了 再坚持几年。 他的理由是什么？ 想回罗马享受，做皇帝。他上位后事务都给有能力的大臣去处理了，他上位两年后 就被他亲姐姐和亲信安排刺杀，差点成功，就是刺杀的人太笨了 杀的时候还说了句话 这是元老院送你的 。被他身边的护卫兵反应过来，没有刺杀成功。他活下来后把他姐姐和所有参与的元老都杀了，并且清洗了元老院。 其实他清洗的人可以理解为真的能为国家做事的人，因为他们看到这样一个皇帝，实在堪忧罗马的未来，他们是有勇有谋的人，他们死了，剩下唯命是从的人。他杀死了元老院，他设置了一系列的制度 给钱 给福利 免费浴场免费娱乐 给百姓。 他把罗马毁了。但同时他其实不是一个蠢材 一个没有头脑的人，但是他走歪了。 我很讨厌他，我觉得他很像我身边的某一个人。他继位了12年，把罗马空心化。 国家经过十二年的 喂蜂蜜，大家习惯了吃蜂蜜了。 康茂德死的第二天——元老院选了一个人做皇帝。禁卫军杀掉了他，并且拍卖皇位。 我觉得这十二年对罗马的影响很大， 因为原来他们是有一个框架一个组织，奖罚分明。但是康茂德继位这些年让军队吃够了甜头，他们不想在听谁的，他们就想有钱，他们觉得谁做皇帝无所谓， 给我钱，我保护你，这个国家被黑社会笼罩了。 是康茂德把这些人变成了保护他的黑社会，是他把罗马变成了这样的结构。 挥霍祖上的国库 给钱给保护自己的军队（培养黑社会） 给钱给底层免费娱乐免费食品 。做这一切只是为了扭曲变形的得到 自己是王 和随心所欲。
有一个元老出钱最多，买到了这个皇位，这个人他是个老钱，他喝多了 壮壮胆 拍下了罗马的皇位，做了六十天的皇帝，就死了。因为这城里几百个护卫队就能把皇位拿来拍卖，边疆的那些几万士兵呢？ 所以同时三个君队都说自己的将军是王。塞维鲁这个将军离罗马最近 也是这三个将军里最有能力的，他成了罗马的新王。他当了十八年的皇帝。塞维鲁做王以后比较重视军队。之后就一直很乱 可以说 其实从马克奥勒留死后 罗马就乱了， 越来越乱。乱到理不清这部分，理的我都犯困，想想也没必要理，这部分压根不重要，总之就是乱七八糟， 这就是没有中央集权的后果。 自由有时候也会导致乱了套，这也是 创造的共识的重要性。因为没有这个后天虚幻的系统，人们想怎样就可以怎样，世界的本质很简单，你在牛也打不过一群人，一群人再牛也打不过一大帮人，这件事可以从正面看可以从反面看，黑人奴隶被卖了上千万， 他们加起来完全可以打死葡萄牙，但是他们在这个系统里，被系统创造的规则绑住了、所以共识真的很厉害 ，我这里的表述有一点乱，其实我想形容的是我觉得弱肉强食是真正的共识，我觉得人想过更好的生活也是真正的共识。
罗马从那个角斗士疯儿子上位后，开始走向衰亡，但崩塌是缓慢的——接近 300 年。为什么是接近三百年的时间，简单来说 罗马有点像茅台，他的罗马文化到整个国家的硬件设施、路、规划、城市建设等 让这个地方能够不断换ceo 公司还没被折腾死。在这个过程中也遇到了还不错的国王 又慢慢把罗马恢复好，给了罗马一定的喘息期。 角斗士儿子是在公元2世纪左右，之后有一个皇帝是一个管理很强的皇帝，但是他担心基督教会分散权力，所以禁止基督教，到公元4世纪的时候，君士坦丁让基督教合法化 自己也皈依了基督教 而且把基督教定为国教， 在公元2世纪到公元4世纪的时候，是几个比较强的国王 和军权统治撑住了罗马。 4-5世纪 是教会接住了罗马的权力真空。`,
  pt3: `公元409年 当时有三个蛮族跑去伊比利亚占领，罗马也没办法 已经四分五裂乱七八糟，就求助西哥特过去帮他们，西哥特去赶走了两个，然后自己就在伊比利亚待下来了，这是个好地方他们发现， 一开始是西哥特和苏维汇一人一半，差不多公元六百年的时候西哥特吞并了苏维汇，整个伊比利亚都成了西哥特的了。统治了两百年不到 在公元711年的时候 被穆斯林给占了这地盘，本质原因是 西哥特的王位继承跟罗马的老毛病一样，他们每次上台都要不断的清洗内部，我突然想到中国的政治也是这样子吗？ 每次换领导都要洗掉之前的人 ，很多大公司也会这样吗？ 阿拉伯人因为穆斯林很团结，他们不断的扩张扩张到伊比利亚了，由于阿拉伯的团结和西哥特的实力不断因为皇位继承的原因削减，势力分散，阿拉伯轻而易举的拿下了西哥特。当时西哥特在内斗，内斗的一方请阿拉伯人来帮自己，阿拉伯直接来把他们都端了。阿拉伯占领了伊比利亚800年 。 阿拉伯人占领了伊比利亚以后我对他们的了解没有前面深了，但是这时候的伊比利亚又慢慢回到了之前罗马的辉煌，在10世纪的时候是欧洲最大最富裕最有文化的城市。
但是伊比利亚的土地上除了有阿拉伯人的统治了一大片土地外，还有另外一小片土地 伊比利亚北部的山林地区没有沦陷，这里是没有放弃抵抗的基督教徒幸存者，在公元11世纪的时候经过三百年的拉锯战，北部基督教王国扩张成几个比较大的王国、莱昂和卡斯蒂利亚王国 后来合体了。十一世纪后期莱昂卡斯蒂利亚国王阿方索六世在边境拿下了一块领地，也就是后来的葡萄牙。
他打下了葡萄牙这片地但没自己管，把它交给了女儿特蕾莎和法国来的女婿亨利。亨利死得早，特蕾莎找了一个加利西亚的情人想合并两块地盘。她和亨利的儿子阿方索·恩里克斯不愿意，1128年他打败了自己的妈妈和她的情人，自己管葡萄牙。1139年打了一场胜仗后直接宣布"我是国王"，没人授权但他赢了仗别人只能认。1143年莱昂卡斯蒂利亚承认，1179年教皇承认。葡萄牙正式独立。`,
  pt4: `这个人一辈子都在打仗往南推穆斯林。他活到80多岁，死的时候葡萄牙已经从北部一小块地扩到中部。接下来几代国王继续打，1249年拿下最南端的阿尔加维，葡萄牙国土定型，800年没变过。这在欧洲极其少见，因为英法德波兰的边境几百年里变了无数次。葡萄牙为什么这么稳定？因为它被卡住了，西边南边都是大西洋，北边东边是打不过的西班牙。没法在陆地扩张。这个"被卡住"后来反而成了命运，只能往海上看。
定型以后的葡萄牙只有30多万人，是个不折不扣的小国。南部因为穆斯林撤退后大量人口流失，很多地方变成了空地。北部和南部的差异从这时候就很明显了，北部潮湿多雨人口密，像凯尔特世界；南部干燥平坦，像地中海世界。这种南北差距到今天都在。
接下来166年（1249-1415）是"积蓄期"，教科书一般跳过这段但其实发生了很多决定命运的事。阿方索三世迁都里斯本（从内陆推到海边，从面对陆地推到面对大西洋），迪尼斯一世在位46年，他用葡萄牙语写诗并且把葡萄牙语定为官方语言（没有他葡萄牙语可能被西班牙语同化成方言），建了科英布拉大学，在南部种了一大片松树林（莱里亚松林），他种树的时候不知道这些松木200年后会成为造船的关键资源。佩德罗一世和伊内斯·德·卡斯特罗的悲剧，她被国王（佩德罗的爸爸）派人在修道院杀了，佩德罗继位后把杀手的心挖出来，还把伊内斯的尸体挖出来穿上王后礼服加冕。他给自己和伊内斯造了两座面对面的石棺，脚对脚相对，说末日审判时睁开眼第一眼就要看到对方。这两个石棺今天还在阿尔科巴萨修道院，已经面对面躺了658年。这件事让我感受到人的感情可以走到多远的地方。
1383-1385年是葡萄牙的"决定性时刻"，差点被西班牙吞并。国王死了没有儿子，唯一的女儿嫁给了西班牙国王，如果她继位葡萄牙就被吞并了。一个私生子若昂站出来，里斯本商人和工匠起义支持他，这不是贵族政变是平民主导的运动。然后1385年阿尔茹巴罗塔战役，6500对30000，一个叫努诺的25岁年轻将军用英国人在百年战争中的战术打败了西班牙人。战斗不到一小时，卡斯蒂利亚军队崩溃。没有这场胜利就没有葡萄牙这个国家。若昂一世开创了新王朝，和英国结盟签了温莎条约，这个同盟到今天640年没断过。他娶了英国公主菲利帕，菲利帕生了三个改变历史的儿子，其中一个叫亨利，就是后来的"航海家亨利"。`,
  pt5: `1415年亨利21岁的时候跟着爸爸和哥哥们去打北非的休达，这是欧洲历史上第一次跨海征服非欧洲城市。亨利在休达看到了穆斯林商人的地图和黄金贸易的信息，他意识到如果从海上绕过去直接到西非买黄金，省掉所有中间商，这会是一笔巨大的生意。他回葡萄牙后在南端的萨格里什搞了一个航海研究中心，召集意大利制图师、犹太地图学家、阿拉伯天文学家、葡萄牙造船工程师，改良了船型，发明了卡拉维尔帆船（可以逆风航行，这是革命性的）。他花了42年直到1460年死，自己几乎不出海但一艘一艘派船去探索非洲海岸。1444年他们把第一批235名非洲黑奴运回葡萄牙拍卖，亨利王子亲自在场，这是跨大西洋奴隶贸易的开端。他同时是航海事业的组织者和奴隶贸易的奠基人，两件事都是真的。
1488年迪亚士绕过好望角，1498年达伽马到印度，1500年卡布拉尔"意外"撞上巴西。短短12年葡萄牙把船开到了地球四个角落。然后一个叫阿尔布开克的人用极端军事手段在印度洋建立了葡萄牙帝国，他的战略是控制"咽喉点"（霍尔木兹、果阿、马六甲），不占领大片土地只卡住贸易路线收过路费。1510年他攻下果阿的时候屠杀了城里的穆斯林然后让葡萄牙士兵和印度教女人通婚，这是殖民史上第一次有计划的种族混血政策。他发明的"港口帝国"模式后来被荷兰人英国人法国人模仿，所有现代殖民帝国本质上都是他的发明的延续。
葡萄牙的"经济模式"从一开始就有一个致命的问题，和西班牙的白银经济一样，它是"过路的财富"。香料从亚洲到葡萄牙到欧洲，黄金从非洲到葡萄牙到欧洲，但葡萄牙本身不制造什么。钱来了又走了，流向了荷兰的银行、英国的工厂、意大利的奢侈品。葡萄牙本土没有发展制造业，没有工厂，没有纺织，靠的是从殖民地抽资源然后转卖，当中间商。这和西班牙的白银故事一模一样。100万人口的小国管着半个地球的贸易但自己什么都不生产，这种模式注定不可持续。`,
  pt6: `1578年24岁的塞巴斯蒂昂国王脑子一热带着几乎所有的贵族去摩洛哥打仗，全军覆没，国王战死，整个精英层被掏空。葡萄牙人不愿意相信他死了，传说他会回来拯救葡萄牙，这种"塞巴斯蒂昂主义"持续了300多年。两年后1580年西班牙吞并葡萄牙，60年。这60年里荷兰人抢走了葡萄牙在亚洲的大部分据点。1640年葡萄牙趁西班牙忙于加泰罗尼亚叛乱时造反独立了，但已经回不到从前。`,
  pt7: `独立以后的葡萄牙越来越依赖巴西。17世纪后期巴西发现了大量黄金，估计运到欧洲大约800吨，比西班牙美洲的还多。但和西班牙的白银一样这些黄金没有留在葡萄牙，流向了英国。1703年的梅修因条约让英国产品自由进入葡萄牙市场，葡萄牙用巴西的金子买英国的布。葡萄牙变成了一个"黄金中转站"，钱从巴西经过葡萄牙流到英国，英国用这些钱发展工业革命，葡萄牙什么都没留下。这是殖民经济最讽刺的地方，拥有全球帝国的国家反而成了另一个国家的经济附庸。
1755年里斯本大地震，万圣节上午正在做弥撒，8.5-9级地震+海啸+大火，城市80%被毁，死了几万到十几万人。这件事在欧洲思想史上极其重要，伏尔泰用它质疑上帝的存在，为什么虔诚的人在最神圣的日子被毁灭？加速了欧洲的世俗化。庞巴尔侯爵重建里斯本，用方格街道和抗震建筑，这是世界上第一次大规模抗震城市规划。他也驱逐了耶稣会、改革教育，但他同时是一个铁腕独裁者。`,
  pt8: `1807年拿破仑入侵，葡萄牙王室做了全世界独一无二的事，把整个政府搬到巴西。1808-1821年里约热内卢是葡萄牙帝国的首都，一个殖民地变成了帝国中心。若昂在巴西开放港口、建银行、建大学，把巴西从殖民地升级为王国。1821年他回葡萄牙，留下儿子佩德罗。1822年佩德罗在巴西宣布独立，"独立或死亡"，巴西几乎不流血就独立了，和西班牙美洲20多年的血腥独立战争完全不同。为什么不同？因为葡萄牙王室在巴西住了13年已经"巴西化"了，佩德罗自己就把自己当巴西人，这几乎是"家族内部和平分家"。
失去巴西以后葡萄牙变成了真正的欧洲小国，只剩几个非洲据点（安哥拉、莫桑比克等）和亚洲残余（果阿、澳门、东帝汶）。19世纪的葡萄牙经历了兄弟内战（自由派vs绝对派）、1890年被英国盟友用最后通牒逼退非洲，"我们500年的盟友背叛了我们"，国民对君主制的信任崩溃。1908年国王和王太子在里斯本街头被刺杀。1910年共和革命，最后一个国王流亡英国。
第一共和国16年换了45届政府，欧洲最不稳定的政府之一。普通人对"民主"和"共和"产生了深深的厌恶，这种厌恶为独裁铺平了道路。1926年军事政变，1928年一个叫萨拉查的经济学教授被请来管财政，他一年就让预算平衡了，然后他待了36年。
萨拉查和佛朗哥有一个很重要的区别，佛朗哥是军人出身从战场上来的，萨拉查是大学教授从教室里来的。佛朗哥用军队和恐怖维持权力，萨拉查用行政和官僚维持权力。佛朗哥至少搞了1960年代的经济开放让西班牙工业化了，萨拉查刻意不让葡萄牙工业化，他要葡萄牙"保持简单和虔诚"，他把国家冻在了过去。萨拉查终身未婚、生活极度简朴，不喝酒不社交不旅行，他不腐败但他也不允许任何改变。秘密警察PIDE监控所有人，政治犯集中营在非洲的佛得角群岛，文盲率1960年还有30%以上。到他1968年中风倒下的时候，整个西欧都在经济奇迹和文化革命，葡萄牙还停在1930年代。他的助手给他读"假报告"让他以为自己还在统治，他就这样在半幻觉中又活了两年，1970年死了。
1961年非洲殖民地开始独立战争，葡萄牙同时在安哥拉、莫桑比克、几内亚比绍打三场战争，13年，派了100多万士兵，军费占预算40%以上，把国家拖垮了。这场战争最终压垮了独裁体制，年轻军官们在非洲看到了真相，不愿意再为这个政权流血。1974年4月25日凌晨，电台播了一首被禁的歌，军队行动，几个小时就结束了，一个卖花的女人把康乃馨插进士兵的枪管，康乃馨革命，48年独裁结束，几乎没流血。比起西班牙的民主转型（从体制内部拆，苏亚雷斯让议会投票消灭自己），葡萄牙用的是军事政变的方式，但两者的结果一样，独裁结束民主开始。区别是西班牙的转型更"精密"更"设计过"，葡萄牙的更"干脆"更"直接"。`,
  pt9: `革命后殖民地立刻独立，50-80万"返回者"从非洲逃回葡萄牙，一个800万人口的国家突然要吸收这么多人。东帝汶最惨，葡萄牙撤了但印尼马上入侵，24年里20-30%的人口被杀，是20世纪比例最高的种族屠杀之一，直到2002年才独立。殖民主义的"撤退"也可以是悲剧，不只是"占领"是悲剧。
1986年加入欧盟，和西班牙同一年，这是两个国家共同的"回到欧洲"时刻。欧盟的钱涌入修路建桥。但和西班牙一样，葡萄牙没有用这些钱建立自己的产业，钱来了又走了，老问题。1999年加入欧元区，2008年金融危机打击极重，2011年不得不接受欧盟和IMF的救助，几年紧缩，年轻人大量移民到德国法国英国。
葡萄牙今天的经济，GDP大约2700亿美元（西班牙的大约五分之一），人均GDP大约2.7万美元，在西欧属于较低。经济结构和西班牙有相似之处，过度依赖旅游（占GDP约15%）和服务业。没有像德国那样的制造业基础，没有像英国那样的金融业。葡萄牙的出口强项是橄榄油、葡萄酒（尤其是波特酒）、软木（全球50%以上的软木来自葡萄牙）、纺织品、汽车零件。软木这一条很有意思，葡萄牙南部的阿连特茹有大片的栓皮栎树林，这些树的树皮就是软木，全世界的酒瓶塞子大部分来自这里。这是一个腓尼基人种下橄榄、罗马人规模化、一直延续到今天的"土地的馈赠"。
2010年代以后旅游业爆发，里斯本和波尔图变成了欧洲最热门的旅游目的地，廉价航空、数字游民、黄金签证吸引了大量外国人。里斯本的房价在几年里翻了倍，本地人被挤出市中心，年轻人买不起房。这和西班牙巴塞罗那的问题一样，旅游业带来了钱但也带来了"谁的城市"的问题。
葡萄牙经济的"大叙事"和西班牙惊人地相似，从大航海到今天，一次又一次依赖"外部输入"而不是"内部创造"。香料→黄金→巴西资源→英国贸易→欧盟资金→旅游业，每一次繁荣都建立在某个外部来源上，来源枯竭就穷了。几百年来缺少的是"自己的引擎"。但葡萄牙比西班牙更早认识到这个问题也许没有解，也许一个小国的命运就是依赖外部，也许接受这一点本身就是一种成熟。
1999年澳门回归中国，584年的葡萄牙海外帝国正式结束。葡萄牙人有一个词叫saudade，"对失去的东西的怀念"，带着甜美的、诗意的、温暖的悲伤。一个花了600年从小公国变成全球帝国又花了400年失去一切最后变回安静小国的国家。他们没有怨恨只是带着怀念继续生活。这种"接受自己不再是中心"，也许是一种国家的成熟，成熟到这种程度大概要500年。`,
};


const esFullText = {
  es1: `伊比利亚这片半岛这里有史前文明，矿产资源丰富，腓尼基人、希腊人先后来伊比利亚贸易做生意，公元814年迦太基人崛起，迦太基花了300年的时间从一个小小的殖民地发展为独立的海上帝国，迦太基人是腓尼基人的后人，所以继承了腓尼基人的商业和航海技术，但比腓尼基更军事化，建立了常备军和强大的舰队，统治了很多地方，包括北非沿岸的岛屿和伊比利亚南部。迦太基的统治主要为商业控制（后葡萄牙的港口统治的前身）。
于此同时 罗马从意大利半岛中部的一个小城邦慢慢变成意大利半岛的霸主，公元264年-布匿战争，罗马打赢了，迦太基损失惨重 不仅失去了最重要的粮仓西西里岛，赔一大笔钱 还失去了几乎所有的海军。迦太基此时有一个救星家族-巴卡家族，家族的领头人，哈米尔卡·巴卡，他是迦太基最有才能的将军之一，他在西西里战场上一直都没有被罗马击败，合约是迦太基本国因为政治原因而签的，哈米尔卡的战略是要挽救迦太基，需要找到新的财源，伊比利亚就是那个宝箱。出发去伊比利亚之前，他带着9岁的儿子到神坛让他发誓，这辈子要永远和罗马为敌。
哈米尔卡到伊比利亚后把伊比利亚从商业附庸变成迦太基直辖殖民地， 对当地伊比利亚和凯尔特人直接征兵，所有矿场开采都归迦太基管理，直接的军事控制。汉尼拔在这片土地长大。
来到伊比利亚的十年后，哈米尔卡在一次和当地部落的战斗中，为了让自己的儿子们逃跑，亲自断后，被淹死在一条河里，他的女婿（汉尼拔姐夫）继承了领导位置。他的女婿的策略更政治化，通过外交、联姻、谈判为主。他建立了一座新的城市-新迦太基（在伊比利亚）。 新迦太基 左边是天然港口、右边是大银矿。汉尼拔爸爸死后的七年，他的姐夫也死了（被奴隶刺杀），汉尼拔26岁继位。
罗马发展顺风顺水，在公元前三世纪初罗马统一了意大利（我好奇 意大利到底有多大呀？意大利在哪里呀?这个问题留着我下一步去学意大利这片土地的历史中了解）。

汉尼拔接班以后，伊比利亚已经是迦太基的军事和经济基地，他们有10万的兵力和银矿带来的巨额财富，还有职业常备军和40头巨象，在伊比利亚有一个地区叫萨贡托，这个地区地理上是属于迦太基的，政治上属于罗马，汉尼拔从这里入手，直接围城，围困了8个月，城里的人宁死不屈，他们饿的吃树皮 吃人，最后他们决定把一切都烧了，包括自己。 几个月后，罗马打过来了。
于此同时，汉尼拔决定直接打去罗马，这是一个不可能完成的任务，1500公里，带着10万的兵（步兵加骑兵）37头战象 前往，留下了大概2万兵力和20头战象给弟弟留守西班牙迎接罗马战队。 汉尼拔做到了不可能，但是到达的时候损耗了百分之75的兵力。到达后他打了几场仗，都打赢了，但是他没有乘胜追击，想等周围的罗马其他城邦反水自己，才能势在必得。 但是他预估错了，这也是他和他的克星最大的区别，他太自满，但也确实因为他能力出众。他没有做情报工作，最终大部分都没有反水，罗马在知道他直接来罗马的时候就派兵切断他的后援补剂，他在罗马呆了十多年、越打越疲惫，越打人越少，罗马不跟他打正面战争。 罗马在西班牙的军队和迦太基打的不分输赢 ，直到一个战略失误出现， 罗马两个将军 一个是克星的爸爸，一个是克星的叔叔 把军队分成了两队想速战速决，分头让两个军队被各自攻破。罗马在西班牙失败了，他们考虑要不要继续派兵，但是没人愿意去，只有一个人站了出来 ，24岁的克星。 他带了3万新兵 到伊比利亚，他准备主攻新迦太基城，这是之前将军不会做的，因为这很难攻 ，但是克星做了情报工作，找到了背后的入口，用了调虎离山计 兵分两路 从正面吸引前面的兵，自己再带兵从后面包抄，一天就拿下了新迦太基，他在这里找到了大量的金银和几百名新迦太基贵族（都是附近城邦部落的亲属 作为人质待在新迦太基），克星把他们放了 让他们回去报信 “罗马是来跟你们做盟友的”。新迦太基拿下后，克星前往迦太基总城 ，迦太基战败。汉尼拔被紧急呼叫回迦太基总城守家，克星和汉尼拔正面对决，克星赢了，汉尼拔逃跑，迦太基投降。 三次布匿战争，我觉得汉尼拔失败的很可惜，他有勇无谋。差点意思。但他依然是我很敬佩的人，汉尼拔和克星都是值得我学习的榜样。 汉尼拔的勇气 魄力 解决问题的能力 。 克星的细致 勇敢 情报工作这些值得我学习。
罗马拿下伊比利亚以后经历了两百年的波折，这部分在葡萄牙写过，不过多赘述。`,
  es2: `罗马化主要的原因是经济整合带来的当地居民的经济好处，罗马打开了伊比利亚巨大的市场，他们可以生产销售到罗马。 在此期间西班牙除了橄榄油和葡萄酒还出口一个昂贵调味料，用鳀鱼或者沙丁鱼的内脏和海盐一起放进大罐里腌制，发酵后得到一种深褐色、咸鲜的液体 叫做garum ，闻起来很臭加进菜肴里很鲜的一种产品，类似于鱼露。这几种产品加上伊比利亚的金银铜铅锡铁都在这里大量开采，这些都为当地带来了大量的经济。罗马时代的几个城市-梅里达、塔拉戈纳、伊塔利卡
讲了几个人物，塞内卡（泡着热水静脉流血死去的老人）、图拉真（第一个伊比利亚出生的罗马皇帝）、哈德良（环游罗马12年，在埃及爱上了一个同性小男孩的皇帝）。
马提亚尔（超好笑的古罗马版段子手），昆体良（世界上最早的"国立教授"）、圣雅各（耶稣里到伊比利亚传教的十二使者之一）、戴克里先皇帝（下令基督教大迫害的皇帝）、君士坦丁大帝（基督教合法化结束破坏皇帝）、狄奥多西大帝（把基督教定为国教东罗马皇帝 莫名其妙做了皇帝的隐退将军，还把东西罗马又统一了、基督教化欧洲之父）。
409年，汪达尔人（Vandals）、苏维汇人（Suevi）、阿兰人（Alans），一起越过比利牛斯山，进入伊比利亚。这三群人，加在一起大约 10 万-20 万人，因为他们的领土也被别人占了，所以他们被迫来到伊比利亚。409-416 年，伊比利亚的罗马秩序基本崩溃，罗马没有足够的军队来对付入侵者，伊比利亚的罗马精英和日耳曼人达成协议，给他们土地和粮食，换取他们不破坏自己的城市和庄园，这样的妥协让日耳曼人快速定居下来，这对罗马是个悲剧，一旦地方精英直接和"蛮族"打交道，不再向罗马中央政府交税、不再服从罗马法律、不再依赖罗马军队，罗马帝国的存在就失去了意义。这就像一个公司，如果每个分部都开始"独立运营"，和供应商直接谈判、不向总部汇报，总部就没用了。
罗马没有足够的军力集结来伊比利亚打日耳曼人，只能找到之前已经入侵了罗马后和罗马达成协议的蛮人 西哥特人，借西哥特人的力量帮罗马清理西班牙，作为回报他们可以在伊比利亚某些地方定居。416-419这三年西哥特人开始进入伊比利亚打汪 兰 汇人，成功赶走阿兰人，汪达尔人吸收了残余的阿兰人 429年的时候从伊比利亚渡海到了北非，苏维汇人退缩到伊比利亚西北部，建立了苏维汇王国 维持到585年被西哥特人灭掉，这时 这片土地住下了苏维汇人和西哥特人（另外巴斯克地区，基本独立
这个民族基本没有被任何征服者管制过）。西哥特人本来是帮罗马打蛮族，他们渐渐取代罗马变成伊比利亚真正的统治者。
476 年，西罗马帝国正式灭亡。伊比利亚的罗马时代结束了。`,
  es3: `西哥特人长得很高，金发碧眼，他们的价值观更接近于今天的牛仔。公元三世纪匈人（一百年后就消失了的民族）抢占西哥特人的地盘，为什么匈人抢占西哥特人的地盘呢，因为匈人从那个方向过来的时候 西哥特人是最先遇到的-相比于罗马人，其次西哥特人也是游牧民族 没有城邦 相对好攻击，相当于打野。 匈人南下把西哥特人逼成难民，20万西哥特人去罗马求收留，愿意为罗马打仗，罗马考虑后收留了西哥特人，然而 内部官员腐败，扣留西哥特人的武器作为押金，他们给西哥特人粮食很少很少，高价卖食物给西哥特人，西哥特人到要卖孩子才换吃面包，两年后西哥特人实在忍受不了了 378年西哥特人起义，攻陷罗马城镇，罗马皇帝亲自带军队镇压结果惨败。亲自带军队镇压的皇帝本人失踪了。接下来三十年西哥特人在罗马帝国的境内流浪，罗马没办法消灭他们只能安抚他们，后来新罗马皇帝跟西哥特人协商 给他们自治权，但是要为罗马打仗。 395年 狄奥多西（把基督教定为国教东罗马皇帝 莫名其妙做了皇帝的隐退将军，还把东西罗马又统一了、基督教化欧洲之父）死亡，罗马再次分裂为东西两半，这一年新的西哥特领袖出现了，叫阿拉里克，阿拉里特从小在西哥特的部落里长大，年轻的时候为罗马打仗 立下了很多功劳，但是罗马不接纳他，每次说好给他升官 给他土地但常常不兑现，他决定 要为自己的人民争取他们本应得的。 接下来15年 从395年-410年 他多次入侵罗马希腊 意大利北部等。罗马每次都被迫给出更多的金子 土地 官职，他不想毁掉罗马，他想要西哥特人成为罗马的一部分，但罗马一次次拒绝。他越来越愤怒，410年8月他带着军队围困罗马城，洗劫罗马城。攻陷罗马三个月后他生病死去，他的小叔继承王位。 接下来一百年西哥特人在罗马帝国流浪，意大利、法国、西班牙边境。后来罗马给他们在法国安了个家，之后他们把领土扩张到西班牙。西哥特人和罗马人住在一起，但是他们之间一直有一道鸿沟，那就是宗教。 他们属于同宗不同教，他们的教是阿里乌派，罗马人、伊比利亚人是天主教。当时伊比利亚有一个皇帝很有远见，一个识图试图统一一切的国王（利乌维吉尔德）他看到了王国的撕裂下决心要修复，他进行了军事整合、经济整合、文化整合、都成功了，但是唯独 宗教撕裂 ，他当时意识到宗教分裂在伤害王国，所以他尝试解决宗教撕裂，他自己是阿里乌派，他做一个一个尝试，让阿里乌改革偏向天主教，但失败了，天主教徒拒绝接受，他们要完全的天主教。他有两个儿子，大儿子的老婆是法兰克天主教公主，他老婆不愿意改信，后来他大儿子改信了天主教并且开始组织宗教叛乱，这个国王亲自带军队攻打自己的儿子，后来他儿子在监狱里被杀。到快585年，他病重快死了，临终前和他的小儿子说，我做错了我杀了你哥哥为了一个不能修复的分裂，你接管王国后你应该做我没勇气做的事，结束这个分裂，让全王国信同一个上帝，那意味着 你自己改信天主教。他小儿子第二年继位时27岁，他改信了天主教。花了三年的时间秘密准备（包括争取阿里乌派的贵族支持），589年他宣布 阿里乌派为异端。宣布西哥特和罗马人一起接受天主教信仰，从这天起 西哥特王国只有一个信仰一个上帝。这件事对西班牙历史意义重大，因为这件事解决了 他们和伊比利亚之间的分裂再也没有了。西哥特人和罗马本地人有了共同身份，西班牙的身份和天主教深深绑定。
改宗后，有一类人显现了出来，在此之前西哥特是阿里乌派 他们不管犹太人，但是他们统一后 犹太人就显得突出了 是这个统一身份的威胁，一个国家越是追求宗教统一就越是不能容忍宗教少数群体。公元600-700年 犹太人的迫害开始了，西班牙是系统性反犹立法的源头，他们要求所有犹太人必须改信或者离开，不准犹太人和基督徒通婚 强制把犹太儿童给天主教家庭抚养等 。694 年，国王埃吉卡（Egica）的敕令，把所有犹太人定为"国家敌人"，他们的财产被没收，他们被强制成为奴隶，他们的孩子被强迫接受天主教教育 这道敕令，是西哥特王国最极端的反犹措施，也是欧洲历史上最早的"全面奴役一个少数民族"的法律。711年 西哥特最南端（对面直布罗陀）的一个伯爵（根据传说，国王强奸了他女儿），他写信给阿拉伯人说帮助他们征服西班牙 。国王（不是上一届国王的儿子 而是通过内部斗争得来的王位）当时正在跟巴斯克人（一直独立的那个民族）打仗，听到消息后赶回来（一个月后） 阿拉伯将军（柏柏尔人）和国王相遇，战斗在一天内就结束了，最后一个西哥特的国王在战场上也是消失了没有找到他的尸体。`,
  es4: `被阿拉伯人征服后的伊比利亚有6方势力，是一个多元化的土地，有少数阿拉伯人、柏柏尔人、改信穆斯林的伊比利亚人、未改信但阿拉伯化的伊比利亚人、犹太人和未阿拉伯化的伊比利亚人人。阿拉伯人继承后的第一个五十年里，伊比利亚只是阿拉伯帝国的一个边境省份，阿拉伯的首都在大马士革（今天的叙利亚）离西班牙几千公里，50年内 派去伊比利亚的总督换了20多个，每两年一换，大马士革的统治者不了解伊比利亚不懂得如何治理，来到了伊比利亚的阿拉伯人开始觉得自己是伊比利亚人而不是哈里发的远方臣民。本来阿拉伯是倭马亚王朝，后来阿拔斯家族（先知穆罕默德的叔叔）认为倭马亚王朝世俗化、不够虔诚，他们要建立"真正的伊斯兰国家"，于是发动夺权，革命成功，建立了阿拔斯王朝，继承人上位后做了一件很残忍的事，他想把倭马亚王朝的贵族王子后代灭族，于是他弄了一顿晚餐，把倭马亚的贵族王子们都邀请过来，晚餐的时候 士兵进来把所有人都杀了，两个王子逃跑，经过一条河的时候弟弟回去了，被杀了，哥哥毅然决然的走过那条河。一路往北非逃亡，五年后他到了直布罗陀海峡的对岸，托人带话问伊比利亚倭马亚的老贵族势力愿不愿意帮助扶持他，大家同意了，于是他到了伊比利亚，他建立了一个新的王朝（科尔多瓦埃米尔国），他的政治手段很聪明，他不叫自己哈里发，给自己起了一个相对低一点的称号，这样不显得自立山头想称王，伊比利亚在他的统治下是独立于阿拔斯王朝的。他统治了32年 把货币统一了，把科尔多瓦变成首都，在科尔多瓦建清真寺 宫殿 市场，还原大马士革版的伊比利亚。 平定了所有的内部叛乱，他自己任命所有官员，自己制定法律，并且建造了科尔多瓦大清真寺，后代花了200年时间建造完成，是伊斯兰建筑史上最伟大的建筑之一。他临终前还在思念他的故乡叙利亚，尽管他在另一片土地创建了属于自己的王朝，但是他想念那个他长大，有他家人 一切回忆的地方。他死（788年）后，他的后代接手统治，慢慢出现了几个问题，第一个问题 在9世纪的时候，保留了基督教但是被阿拉伯化的本地人 --莫扎拉布人，他们发现一个文化危机，他们的后代精通阿拉伯语，他们更喜欢阿拉伯的文化，他们很焦虑拉丁语和基督教文化在被慢慢同化消失。他们通过一种极端的方式想要引起注意，恢复基督教的文化。 他们到大街上高喊穆罕默德是骗子，伊斯兰教是假的！按照法律他们会被处死，但他们希望被处死成为殉道者。第二个问题是贵族的权力越来越大 他们有自己的城堡 军队 农奴 对中央服从的越来越少。第三个问题是之前到北部山区的那帮基督徒开始了收复失地运动 从几百人开始 慢慢建立了几个王国（莱昂 阿拉贡 卡斯蒂利亚）。这时候这个国家需要一个强大的领袖。 这个人出现了，他22岁登基 ，就是之前那个逃亡王子隔了6代的“多代孙”。他镇压了所有叛乱省，击退基督徒、给了的柏柏尔人和莫扎拉布人当官、削弱阿拉伯贵族权力。大功告成后，他宣布自己是哈里发，还给自己建造了一个比梵蒂宫还大两倍大哈里发行政宫殿。但是这座城市只存在了不到一百年，一百年后这个国家灭亡的时候被洗劫烧毁了，好可惜。
10世纪的时候，这个国家达到了鼎盛时期，人口50w，是西欧人口最多的国家，有石头路、晚上街道还有照明的路灯，英国500年后才有路灯，下水道系统、伦敦19世纪才有，大学 、图书馆、公共浴场、市场 。在8-10世纪，科尔多瓦把古希腊和罗马的著作都翻译成阿拉伯语（包括数学医学天文学哲学等）。我们今天读到的很多著作都是那时候翻译才被保存下来了。并且阿拉伯学者不仅是翻译还对所有的学科进行了创新，科尔多瓦的图书馆有四十多万本书，整个西欧加起来不到一万本。在科尔多瓦的学生能读到世界的所有知识，他们国家还有专门的书籍采购员，负责从世界各地采购书籍。很多欧洲的 “勇敢的”基督徒学者来这里学习，他们把阿拉伯知识带回欧洲，成为了12世纪文艺复兴的起源。 这么强大的国家，按照常理他会一直繁荣昌盛很久很久，因为强者恒强。但强者国王死了，换的新国王很弱，本身这片土地的人种 信仰成分就很复杂，有很多人虎视眈眈。 强者死了，大家马上开始瓜分， 分裂成了三十多个小国家（泰法王国）。短期这些小国家的文化更加繁荣昌盛，因为每个国家都想把自己的小国变成小科尔多瓦，但是有个问题 他们的分裂让他们一直在相互打仗，而且他们很分散也没有能力抵抗北部的基督教王国。 接下来的50年里，基督教国家一步一步推进 拿下一个又一个的阿拉伯城市。莱昂、卡斯蒂利亚、阿利贡等这些都是北部山区基督徒慢慢扩张建立的王国。他们虽然都是基督徒国家，但也会互相打，但他们发现了一个漏洞，勒索泰法王国。我率军去你的地盘（挑选那些没有兵力的）做出要打你的姿势，也可以给贡金，给钱就不打了，而且以后我还保护你。那时候大部分泰法王国在向基督徒小国交保护费。这些黄金,让卡斯蒂利亚和莱昂变得越来越富有,可以维持更大的军队,反过来给泰法王国更大的压力。在1065年卡斯蒂利亚的国王费尔南多去世，去世前把卡斯蒂利亚瓜分给了他五个子女，大哥桑乔二世分的是卡斯蒂利亚，二哥阿方索六世分的是莱昂，弟弟加西亚得到的是加利西亚，姐姐乌卡拉得到的是萨摩拉，还有一个姐姐埃尔维拉得到的是陀罗，1071年桑乔二世和阿方索六世联合起来对付弟弟，拿到了加西亚，弟弟出局后，大哥再扭头对付二哥，阿方索被迫逃走去了托莱多，1072年大哥去对付大姐的时候被刺杀，大哥没有合适的继承人，于是阿方索六世从托莱多回来，继承了大哥的所有土地和权利。1085年 阿方索六世攻陷了托莱多（也是之前阿拉伯人在伊比利亚半岛的首都），一开始他说穆斯林可以保留财产和宗教，但是几年后他的妻子和一个法国修道士说服他违背承诺，把托莱多大清真寺改成基督教大教堂，引起了穆斯林的愤怒，也让他在穆斯林世界里名声变臭。托莱多陷落后，基督徒学者进入城市发现了大量的阿拉伯语书籍，这些书里保存着古希腊的科学、哲学、医学以及阿拉伯的学者们自己几百年来的创新。于是在接下来的一百多年中 托莱多变成中世纪欧洲最重要的翻译中心，他们把亚里士多德的《物理学》《形而上学》、欧几里得的《几何原本》、托勒密的《天文学大成》、伊本·西那的《医典》，通过托莱多大学进入了拉丁语世界。1085年阿方索六世攻下了托莱多让泰法国王们害怕，泰法国王们意识到如果不联合起来，他们会被小豆豆一样一个一个被吃掉。他们面临两个选择，联合起来或者求助外援，他们选择了后者，选择了北非的阿尔莫拉维德人（觉得伊比利亚穆斯林腐败的沙漠穆士林苦行战士），这帮人来了先把基督教国打回老家（他们在战场上还会使用非洲战鼓 基督徒的马被吓得失控 扭头就跑 阿方索六世的腿也被长矛刺伤骑马逃走），接着就觉得这帮伊比利亚的穆斯林太软弱太世俗化，于是“接管”了他们的国。那个一开始说宁可在非洲放骆驼也不要在卡斯蒂利亚养猪，他印证了自己的预言。他被俘被流放，1095年死在摩洛哥南部，54岁，一个曾经统治西班牙最富裕城市的国王，死在北非的一间破房子里。沙漠穆士林苦行战士（阿尔摩拉维德人）的管理在军事上有秩序，但在文化上倒退，限制哲学、音乐、诗歌、葡萄酒。但是六十年后沙漠战士的后代们也变成了城市贵族。1147年，阿尔摩哈德人来了（更严厉的穆斯林），他说沙漠战士背离了真正的伊斯兰教，他要建立一个纯粹的伊斯兰国家。阿尔摩哈德的创始人叫伊本·图马尔特，是一个宗教学者。他的继承人阿卜杜·穆明征服了整个北非然后渡海进入伊比利亚半岛，征服了沙漠战士。可以说他们是更极端版的沙漠战士，他们不容忍任何异教。强制犹太和基督改信不然就流放或者杀死，打击哲学和自由思想。犹太人大规模逃离到北部的基督教国家和东部的伊斯兰世界。有几个有意思的人物，第一个是伊本·鲁世德（欧洲人叫他阿威罗伊），他的祖父、爸爸都是法官，他是法官世家。从小就在法律宗教政治的核心圈子里长大，非常博学。他系统的翻译和注释了亚里士多德的全部著作，中世纪欧洲最伟大的基督教哲学家在他的著作里引用阿威罗伊超过500次。他的危险思想包含：理性和信仰可以分开。宗教和哲学是两条通向真理的路，世界可能是永恒的。我觉得他是理性的。在这期间更严厉版的沙漠战士虽然在文化上压制了这片土地，但在军事上暂时阻止了基督徒扩张，从1086年到1212年，基督徒的收复运动停滞了。
1212年，罗马教皇英诺森三世号召了一场的西班牙十字军，由卡斯蒂利亚、阿拉贡和纳瓦拉的国王领导，加上法国和葡萄牙的骑士总共大约6万人。最终胜利了，更严厉版沙漠战士从此一蹶不振，接下来50年他们的领土迅速萎缩（包括北非领土也是），这个帝国在这场战役后慢慢崩溃。基督徒的收复运动加速，卡斯蒂利亚的费迪南三世在1230年把莱昂跟卡斯合并了（之后都没分开了），带着这个统一的王国往南打。葡萄牙和阿拉贡也在推进，葡萄牙攻陷下了阿尔加维。但葡萄牙的领地到底为止，和今天的葡萄牙版图基本一致。到1250年的时候，伊比利亚的版图彻底改变了。卡斯蒂利亚-莱昂、阿拉贡、葡萄牙、纳瓦拉（阿拉贡第二大），穆斯林只剩下一个地方，半岛最南端的格拉纳达（被基督国家包围的穆斯林小王国，多存活了250年，因为纳斯里王朝非常擅长在几个大国之间游走，在夹缝中反复找到生存空间）。格拉纳达是浓缩版的阿尔安达卢斯，每次基督徒征服一座，随林城市，哪里的穆斯林知识分子、艺术家、工匠 一部分改信，一部分逃走，逃走的很多都去了格拉纳达。所有其他穆斯林城市的文化精华，最后汇聚在这里，一个正在被压缩的文明把所有精华浓缩在最后一个角落，我感受到心碎。他们建造伊斯兰建筑最高成就之一的建筑 阿尔罕布拉（这里面没有奢华的大理石，但设计和一切都花费了大量的心思，这就像一个穷人家，没钱买昂古的家具，但用旧木头手工做了一个极其精美的书架--技艺本身弥补了材料的不足），我也想去这里看看。这250年不安静，产生过23个国王，其中很多被自己的亲属废掉或者杀死，每次卡斯蒂利亚内部稳定下来就会打格拉纳达一下，夺一些边境城市，然后卡斯蒂利亚又内乱，格拉纳达又喘口气。这样打一下 停一下 再打一下的节奏持续了200年，到15世纪后期，格拉纳达的生存空间已经非常小了。1451年一个女孩出生了叫做伊莎贝拉。她有个哥哥，但是别人都说她哥哥是性无能，所以怀疑他哥哥的女儿不是他的血缘，她跟哥哥协议好她结婚要经过哥哥的同意，皇位可以给她继承，但是她秘密的跟阿拉贡国王的儿子结婚了，阿拉贡国王的儿子有军事牌、政治牌、狡猾和务实，听说是马基雅维利写的《君主论》的原型。他哥哥知道她秘密结婚后震怒（因为他哥哥想她跟葡萄牙那边结婚，葡萄牙那边看她结婚了，就想跟他哥哥的女儿结婚合并葡西）1471年哥哥恩里克四世死了以后，内战了四年，伊莎贝拉赢了，哥哥的女儿被送到了修道院度过余生。阿拉贡国王死了以后他儿子也继承了，他们夫妻一个是卡斯蒂利亚女王一个是阿拉贡国王，女的擅长信仰牌、宗教牌，男的擅长军事牌、政治牌。是一对很强的组合。他们还发明了宗教裁判所，酷刑 羞辱 烧死改信的犹太人（被举报假信的话），这个宗教裁判所存在了356年，15万人被审判，几千人被烧死，几万人被罚款、流放、终身监禁。19542年，他们两个带着大军围困格拉纳达城，这里有个小故事，当时这个国王有个正妻和小老婆，他更喜欢小老婆和她的孩子 想把王位给她，她大老婆很强悍，不能接受自己儿子被废，所以她组织了一场宫廷政变，在1482年的时候他儿子推翻了他爸，他爸逃去格拉纳达的另一边找他弟弟，抵抗他儿子，这时候格拉纳达已经分裂成两半了，费迪南德（老公）看到内战果断出手，他先让这个儿子帮自己一起打他爸爸和他叔叔，就让他做国王。一边自己也在攻陷格拉纳德的其他城市。他在帮别人削弱自己的国家，到1491年他爸爸死了，叔叔提偶像了，他是唯一的剩下的纳斯里国王，但是他只剩下一个城了，夫妻两就带着大军围困了他们城几个月，最后他派人出来谈判，给他一小块南部山区的领地，离开这里。 他交出了城的钥匙，骑马离开 往他被分配的小山区走。走到一个山口的时候，他回头最后看了一眼格拉纳达，他看到阿尔罕布拉宫在阳光下发红，他哭了。他妈妈艾莎骑马在他旁边对他说:"你做得对，为你没能像男人一样守住的东西像女人一样哭泣吧。"（"Llora como mujer lo que no supiste defender como hombre"，"像女人一样哭你不能像男人一样守住的东西"）。这一天，781年的伊斯兰统治结束了。博阿卜迪尔觉得天看着自己失去的格拉纳达太痛苦，他卖掉了自己的领地带着家人渡海去了北非的摩洛哥。1942年是人类历史上最重要的年分之一，因为三件改变世界的事在同一年发生，第一件事，格拉纳达投降。第二件事驱逐犹太人，他们夫妻命令所有西班牙犹太人四个月内改信天主教或离开西班牙不能带走金银。违反者死。大约十五万到二十万犹太人面对这个选择，一半改信了天主教，一辈子被宗教裁判所监视。一半离开 他们去了葡萄牙（几年后葡萄牙也驱逐他们）、奥斯曼帝国（他们的国王苏丹巴耶济德二世欢迎他们，他说费迪南德是个傻子，让自己的国家变穷，让我们国家变富）北非意大利和荷兰。为什么伊莎贝拉要这样做，因为他们刚刚结束了781年的穆斯林的占领，她想要一个纯粹的天主教国家，所以犹太人必须走。从她的角度来说没问题，她在完成她想要的，她在建造她自己心中理想的国度。第三件事事哥伦布发现美洲。伊莎贝拉就是那个女王。 哥伦布找葡萄牙国王，若昂二世拒绝了他，若昂二世认为他的地球尺寸计算是错的，他又去了西班牙找他们夫妻，但双王正忙着打格拉纳达，没空理他，他等了六年。 格拉纳达投降后双王终于有空了，女王心情好，就资助了他的航海行动。1月格拉纳达投降，4月签署了赞助哥伦布的协议，8月出发，10月发现新大陆。伊莎贝拉的的愿景是纯粹的天主教国家，这篇土地的多元化死去。她们跟穆斯林签的投降条约里说可以保留信仰，但是他们违反了，1502年所有穆斯林被强制改信，1609年最后一批穆斯林的后代被全部驱逐大约30万人，犹太人也赶干净了。西班牙社会变成一个血统纯洁的执念社会。犹太人被驱逐后,"血统纯洁"的执念渗透到西班牙社会的每一个角落。血统纯洁的制度要求一个人必须证明自己没有犹太或穆斯林祖先才能获得某种权利，例如读大学、加入某些教会、当官等。这个制度，制造了一种全社会的"互相监视"文化，每个人都在查别人的血统，每个人都在担心自己的血统被查。`,
  es5: `哥伦布在美洲呆了几个月在1493年3月回来了，他一路北上去见巴塞罗那见夫妻两，这段路走了一个月，路上他变成一个移动的展览，把带回来的泰诺人穿上欧洲的衣服像动物一样被展示，还带了一些鹦鹉 玉米穗 烟草叶，他回来以后进行了他的“推销”，哥伦布说美洲到处是黄金，那里的原住民像羊一样温顺，很容易被控制和皈依。哥伦布在伊斯帕尼奥拉岛开始暴政管理，1500年西班牙派人去调查，把哥伦布带回国，但是女王看到故意带着镣铐见她的哥伦布哭了，她释放了哥伦布给了他一些钱，让他在宫廷附近住，她觉得哥伦布管理能力不行，但是他的发现是伟大的，她感谢哥伦布。之后伊斯帕尼奥拉岛就从之前的哥伦布家族统治变成国家管理了，西班牙派了奥万多（职业官员）去接管。他比哥伦布更高效和更残忍，2502年他带着2500殖民者和30艘船到达岛上，建立了西班牙美洲殖民的标准模式，因为他的这个模式很“高效”，后来这个模式后来被复制到整个美洲。早期的恩科米恩达制度在女王的理论层面是 每个值得奖励的西班牙殖民者被分配一定数量原住民（数量取决于地位），殖民者有义务保护、给泰诺人住所、教他们天主教。原住民有义务为殖民者工作，接受天主教教育。但是在实际的实施中殖民者把原住民当奴隶使用，每天工作12-16小时，传教士每周来念几句西班牙经文就算完成了教育义务。这让我警惕理论、想法和事实之间的鸿沟，一方面是各方利益的不同，还有理解本身的差距，所以理想的方案还要有行之有效的监察 反馈 管理系统。
1492年这个岛上泰诺人有25-100万，到1550年后基本灭绝。主要死于疾病（天花等）强制劳动、暴力、自杀。拉斯卡萨斯后来写说当他第一次来到这个岛时，这片土地像花园一样美丽，到处是人，几年后，变成了沙漠，只剩下骨头。
泰诺人快速死亡，没有人力。伊莎贝拉批准了非洲奴隶被运到美洲，一开始是有限制的运，后面限制很快被取消。西班牙的奴隶贸易跟葡萄牙不同，葡萄牙的直接在非洲沿岸有据点，他们先自己抓人卖，后面跟非洲酋长买。 西班牙因为1943年教皇划分的线，非洲是归葡萄牙，所以西班牙发明了一个asiento的制度，王室卖许可证，商人买许可证后去找葡萄牙买非洲人，把奴隶（货品）运到加勒比海后在那里进行分销到哥哥殖民地。西班牙社会一开始对他们对美洲的行为觉得很厉害，在15世纪中期争议开始出现，一些西班牙的知识分子和传教士开始质疑他们在美洲做的事真的是上帝想要的吗？ 这时有一个人出现了，拉斯卡萨斯，他是中等商人家庭，他爸爸跟着哥伦布一起去过第二次航行，带回来了一个泰诺小孩给他做奴隶，他18岁的时候就去了伊斯帕尼奥拉岛，他从来没有质疑过这个系统，是一个标准的殖民者，12年后在他30岁的时候，在一次圣诞弥撒他遇到了蒙特西诺斯的布道，这个修士控诉了他们对印第安人残酷的奴隶，他说这些殖民者都在犯致命的罪，他们活在罪里，在罪里死去，因为他们对待无辜的人的残忍和暴虐。这个种子在他的心里蔓延，他回到西班牙面见国王，报告美洲的暴行，出版了印第安人毁灭简短报告，参与了巴利亚多利德辩论（这个辩论是查理五世下令暂停美洲新征服直到这个辩论的问题被回答 西班牙人对美洲原住民的战争在道德上和法律上是正当的吗？），他赢了，1542年的新法律给了原住民更多的保护，但是殖民者拒绝执行，在米路南他们还因此发动了叛乱，派人杀了王室派去的总督，最后法律被大幅修改，变得温和，殖民者基本上继续做他们原来做的事。这让我意识到原来法律 正义 正确的事 不是不可被妥协的、原来原则、正义之事是可以被妥协和修改的。拉斯卡萨斯同情原住民，但他想到的替代方案是用更强壮的非洲人替代。而且他向红衣教主（1516）提议每个殖民者应该被允许进口12个黑人替代原住民劳动。加速了跨大西洋奴隶贸易。在他晚年著作里他写：我不知道我的无知和良心的疏忽-对黑人所遭受的不公平的奴役-能不能在上帝面前为我辩护-我后悔了-但一切太晚了。我感到很难过。。我相信他是一个“善良”的、“正义”的人。我看到人在一种习惯的背景下的理所当然包括我自己。我能做些什么？从我自己做起。屁股坐的很舒服的人很难把自己的屁股抬起来，该怎么逃脱这种自我的欲望的禁锢？怎么能努力不去发生会让自己后悔的事？1545年秘鲁发现了世界历史上最大的银矿，一个矿的产量超过世界其他所有银矿的总和，同时墨西哥也发现了大量的银矿，这些银用原住民和非洲奴隶的劳动开采，用一种提取方式提取纯银，这个过程对工人有剧毒，很多矿工在几年内死亡。大量的白银涌入西班牙导致通货膨胀，和葡萄牙一样，金银像水一样流过伊比利亚这篇土地没有留下，因为有钱他们没有像英国、荷兰那样发展手工业和制造业，它从从美洲得到白银然后用白银买英国的布、荷兰的船、意大利的奢侈品、德国的武器。同时也为当地的经济带来了通货膨胀，16世纪的时候西班牙的物价涨了4-5倍。西班牙的白银最后流向了荷兰和英国，荷兰人和英国人拿到了白银后投资手工业、贸易、造船他们的经济真正的发展起来了。美洲的银矿工人流血流汗用生命为代价挖出银，最终这些流向了英国荷兰的制造业。他们夫妻两有一个孩子叫做胡安娜,她不是继承人但后来别的继承人死了,17岁的时候被嫁给了今天比利时(当时佛兰德斯)的统治者-腓力.腓力长得很帅,金发碧眼高大是当时欧洲最有魅力的王子之一,胡安娜一见到腓力就爱上了他,但是腓力对胡安娜纯粹政治联姻,他有很多情妇而且都是公开的,胡安娜很嫉妒她做出很多过激的反应,就开始有一个说法说她疯了,伊莎贝拉死后按遗嘱把卡斯的王位给了她 ,但是胡安娜的儿子和她爸爸都说她疯了把她软禁起来(46年),他爸爸是卡斯实际的摄政王.接下来十年(1506-1556) 她爸爸统治整个西班牙.在这十年里他发动了意大利战争,跟法国争夺那不勒斯王国和其他领地.在北非派军队攻陷了几个沿海据点,防止穆斯林再入侵西班牙的缓冲区,吞并了纳瓦拉(伊比利亚最后一个独立基督教国家除葡萄牙外),在他52岁的时候他娶了18岁的法国公主日耳曼那,想跟她生一个儿子,他想把王位传给他的儿子而不是外孙(胡安娜的孩子),怀上过一次但是孩子出生后几个小时离世了.1516年费迪南也多死了.
费迪南多死后,他没有继承人,按照合法性,继承人是胡安娜或者胡安娜的孩子查理五世.查理五世在今天的比利时出生的(1500)胡安娜在他出生后没多久就开始"不正常",妈妈和爸爸的关系越来越糟,6岁的时候爸爸突然死了,妈妈崩溃 被送去"疗养"-软禁.从六岁起他就是个孤儿,他是他的姑姑玛格丽特养大的,个嘛力特是一个非常有能力的不认她一边做佛兰德斯的摄政一边养大了查理,给他找了最好的老师教他法语 拉丁语 骑马打仗政治,他最在乎的是我的家族荣耀要我做什么.他觉得自己背负着哈布斯堡家族和西班牙王室两个家族的命运,他不能让祖先失望,所以他从小就有一种责任感的重压 .在他15岁的时候被宣布成年,所以亲自开始接管爸爸腓力的领地.17岁的时候外公死了,他过去从来没来过西班牙,现在他要继承这个国家,1517年他坐船到西班牙北部海岸,他和他的顾问穿着北欧式的衣服,说着法语和荷兰语,他召开了议会,需要议会承认他为国王,议会提了几个条件学西班牙语不把西班牙职位给外国人等,他勉强接受了,1519年他的祖父去世了,他的祖父是神圣罗马帝国皇帝马克西米利安一世,但是这个不是继承制的,是候选制的,他拿西班牙的银子贿赂选帝侯,最后当选.他继承了人类历史上一个人同时拥有最大领土的人.同时是美洲殖民地的主人,神圣罗马帝国皇帝(德国、奥地利、捷克、瑞士、低地国家、意大利北部部分地区等 名义范围很大但不是他的私人领土),卡斯蒂利亚国王,阿拉贡国王,奥地利那不勒斯佛兰德斯和荷兰的统治者(今天比利时 荷兰 卢森堡),西班牙人对此不高兴,他们不希望自己强大的西班牙王国变成庞大帝国的一个省,他们也不希望查理五世拿他们西班牙的钱去给别的国家用,1520年 查理要离开西班牙去德国加冕,并且要钱更多的钱,议会很不爽但被贿赂和压力逼着给了,查理拿了钱去德国加冕了,一个月后 卡斯蒂利亚爆发了西班牙近代史第一次大规模的城市起义.起义的原因主要是查理带了很多他长大地方的官员来西班牙做主教、法官、财务官，西班牙人觉得这是我们的国家凭什么外人来当我们的官。而且查理从卡斯收的税拿去德国用，用来贿赂选帝侯或者打德国的仗，西班牙人觉得干嘛要用我们的钱花在跟我们国家没关系的事情上。而且议会也被无视，传统上议会是可以拒绝税收的但是查理的人用贿赂和威胁让议会通过了他的要求，议会觉得自己被强奸了。最后 他们感到更深的焦虑，西班牙人正在失去自己，以前他们是一个独立的强国，现在他们变成庞大帝国的一个省，钱被抽走外国人来当官 他们成什么了？起义的主要目的不是为了推翻二世为了让国王满足他们的要求。他们要求国王必须住在西班牙，不能吧西班牙官职给外国人，不能把西班牙的钱带出西班牙，议会必须有真正的权利，国王不在的时候摄政必须是西班牙人。 这些要求很合理。起义的人还去找胡安娜签起义文件，这样就有了合法性，但是胡安娜不签。起义持续了一年，但是他们没有得到高级贵族的支持，最终他们选择了站在查理这边，结果是战斗了，但是起义军被击败，三个首领被斩首。起义被镇压后，查理改变了，他吸收了他们的要求，1522年回到西班牙后他开始说西班牙语，任命西班牙人当官，开始在西班牙待的更多，西班牙人特别是卡斯人慢慢接受了他，他们还感觉有一种骄傲感，我们的国王是世界上最有权利的人，我们是帝国的中心。
查理这一生过得很辛苦，他同时面对太多的敌人和挑战，而且帝国太大，不可能靠他一个人，他没有真正固定的首都。他像一个移动的君主，不停穿梭在西班牙、尼德兰、德意志、意大利之间。他管理帝国的方法，是把不同地区交给不同代理人。西班牙靠王室委员会和摄政者管理；尼德兰由姑姑玛格丽特、后来由妹妹匈牙利的玛丽管理；奥地利和德意志事务大量交给弟弟斐迪南；意大利由总督和将军管理；美洲则由印度事务委员会和副王制度远程统治。他的一生几乎都在处理战争。法国、奥斯曼、新教诸侯、美洲殖民、财政危机，每一个方向都在烧钱、不断需要决策。在查理55岁的时候宣布退位（1556），痛风让他及其痛苦，手指疼到有时候握不了笔签字。很多事情也做失败了，他没有真正休息过，他的人生像一场永不会结束的会议，所以他选择退位。把西班牙荷兰意大利南部和美洲给他的儿子腓力。神圣罗马帝国、奥地利给他的弟弟费迪南德。退位后他去了一个小修道院生活了两年，58岁的时候去世了，去世前他有个小爱好，修钟表。
腓力二世从小在西班牙长大，12岁的时候妈妈就去世了，查理也因为一直在打仗很少在西班牙，所以腓力小时候几乎没见过爸爸，他的教育极其严格，从早学到晚，查理是一个行动者，腓力是一个管理者。爸爸去世后 他继承的不是一个普通王国，而是一个全球帝国。腓力二世最重要的决定之一，是在1561年把宫廷固定在马德里。从此，马德里逐渐成为西班牙的政治中心。这个决定改变了西班牙的空间结构：西班牙不再是一个国王到处巡行的王国，而开始变成一个围绕固定首都、官僚机构和文件系统运转的国家。腓力二世每天阅读大量文件，来自西班牙本土、美洲、尼德兰、意大利和菲律宾。他喜欢亲自批示，亲自决定，这让帝国看起来更集中，但也让行政变得迟缓。一个在美洲发生的问题，报告送到马德里，再等腓力批示，再送回美洲，可能已经过去一年。在1557年圣昆廷战役后腓力二世决定修建埃斯科里亚尔宫，1563年开工，1584年完成。埃斯科里亚尔宫是理解腓力二世的钥匙。它不是一座单纯享乐的宫殿，而是宫殿、修道院、教堂、图书馆和王室陵墓的结合体。它灰色、对称、严肃、几乎没有柔软的装饰，像一座石头做成的祈祷机器。在腓力二世眼里，西班牙不只是一个王国，而是天主教世界的前线。他相信自己的使命是保护天主教，阻止新教、伊斯兰和异端扩散。因此，他统治下的西班牙越来越强调宗教统一。宗教裁判所继续监控思想，摩里斯科人和改宗犹太人的后代始终被怀疑，任何新教思想都被视为国家安全威胁。荷兰是西班牙最富的领地之一，但也是最难管的地方。它城市自治强、商业发达、新教传播快，和卡斯蒂利亚式的天主教王权完全不同。腓力二世试图用西班牙式的宗教统一和中央控制去管理荷兰，结果引发叛乱。荷兰叛乱对西班牙的意义，不只是“一个地方造反了”。它意味着西班牙最富的海外欧洲领地变成了一个长期流血口。腓力为了镇压荷兰，不断派军队、加税、借钱；而荷兰人越反抗，西班牙就越用暴力，暴力越重，反抗越深。最后，这场战争从1568年一直拖到1648年，成为压垮西班牙财政的重要原因。1580年，葡萄牙王位危机爆发。腓力二世凭借母系血缘声称葡萄牙王位，并派兵进入葡萄牙。之后，他成为葡萄牙国王，西班牙和葡萄牙进入同君联合时期。这是西班牙帝国的最高点。因为葡萄牙不只是一个半岛王国，它还有巴西、非洲、印度洋和亚洲贸易据点。腓力一夜之间得到的不只是葡萄牙，而是另一个全球帝国。但这不是现代意义上的统一国家。葡萄牙保留自己的法律、语言和行政系统。它只是和西班牙拥有同一个国王。对西班牙来说，这是帝国巅峰；对很多葡萄牙人来说，这是被外来王朝控制的开始。1588年，腓力派无敌舰队进攻英格兰，因为英国女王伊丽莎白一世是新教徒，而且一直在暗中支持荷兰叛军给他们钱和武器甚至派军队帮忙。英国的私掠船一直在大西洋和加勒比海抢西班牙的银船，其中有个人叫德雷克，他1577-1580的时候环球航行，一路上抢了大量西班牙船，回英国的时候穿上装满了西班牙的银子，伊丽莎白封他做爵士，而且伊丽莎白还囚禁了一个苏格兰女王玛丽（天主教徒）19年，1587年把她处死了，腓力觉得 英国是异端国家应该恢复天主教，要切断英国对荷兰叛军的支持，封强盗做爵士腓力觉得这是国家行为的海盗。以上的一切必须付出代价！ 但结果是 130艘船只有大约67艘回到西班牙。 3万人大约1.5万人死亡，大部分不是死于战斗是死于风暴和沉船。第一次在全欧洲高度关注下，西班牙的海上远征大规模失败，打破了西班牙在海上和天主教帝国形象上的神话。
在查理时代通货膨胀已经开始了，西班牙拥有越来越多白银，却没有变成一个更健康的国家。美洲白银推高物价，战争吞掉财富，外国商人和银行家赚走利润，卡斯蒂利亚承担沉重税负。王室多次财政破产，农村衰弱，制造业不足。人口也开始下降 40年减少了一百万人，瘟疫死了几十万人， 每年几千人移民去美洲，跟荷兰、法国、英国的战争不断需要士兵。卡斯蒂利亚的农村很多村庄开始被废弃，年轻人走了，去城市、去美洲。留下的都是老人。腓力二世在位期间，西班牙王室多次宣布暂停偿债/破产。但在西班牙经济衰退的同时，文化却进入黄金时代，埃尔·格列柯在托莱多画出奇异而神秘的宗教画，塞万提斯在腓力时代生活、参军、被俘、归来，后来写出《堂吉诃德》。腓力二世的一生，就是西班牙帝国命运的缩影：他把西班牙推到权力巅峰，也让西班牙承担了维持全球帝国的沉重代价。他想控制一切，但帝国太大，战争太多，信仰太刚硬，财政太脆弱。腓力死时，西班牙仍然强大，但裂缝已经清清楚楚地出现了。1598年腓力二世死了，他最后几个月极其痛苦，身体彻底崩溃，痛风让他全身关节肿胀变形，他不能动不能翻身，身上长了大量的脓疮，脓疮破了，流脓床单必须反复换，换的时候要把他抬起来，每次抬他都因为疼痛而尖叫。他在这种状态下活了53天。他留下了空的国库、经济衰退人口减少农业萎缩的西班牙、荷兰在叛乱中可能永远不会回来了，敌人法国、英国（新兴海上强国）。`,
  es6: `腓力二世死后，腓力三世继承，他很懒，啥也不想管（他喜欢宫廷生活、宗教仪式、狩猎、娱乐，但不喜欢真正处理政务）。所以他把所有的事务都给莱尔马公爵管，莱尔马特别腐败，谁想见国王、升官、拿资源，都要经过他，但他确实有“管事儿”（他的很多决定短视、腐败、服务于自己和派系），1609年他做了一个决定，驱逐所有莫里斯科人（已经改信天主教的穆斯林）他们是1502年被强制改信的穆斯林后代，到1609年他们在法律身份上已经是天主教徒一百年了，但西班牙社会没有接受他们，莱尔马觉得驱逐他们可以没收他们的财产，充实国库，自己也能从中捞一笔。这招很像一种古老的政治技术，国家出问题了财政不行了，社会焦虑了，那就找一群不够纯的人，让大家相信赶走他们国家就会干净健康重新强大。9月，三世签署驱逐令，执行分地区大概执行了5年，大概30万人被驱逐，他们被带到港口，塞上船，送到北非。很多人在路上死了，有些船沉了，有些人到了北非之后被当地人杀了。北非的穆斯林觉得这些人不是真正的穆斯林，也不懂说阿拉伯语。他们在哪里都不被接受。在西班牙他们不被当做真的基督徒，在北非不被当做真的穆斯林，他们无处可去。
其实这对西班牙影响巨大，尤其是瓦伦西亚和阿拉贡地区，摩里斯科人是这两个地区最好的农民，他们继承了阿拉伯人几百年的农业知识，养蚕做丝绸、灌溉技术、种水稻甘蔗，这些技术老基督徒农民不会。贵族突然发现他们的庄园没人干活了，土地荒了很多贵族破产。在几十年内 瓦伦西亚从一个繁荣的农业区变成一个经济萧条区。在文化上，西班牙的天主教纯化已经走到最后一步了，他们彻底得到了他们想要的“纯净天主国。
在经济上16世纪的时候白银大量涌入，但是到了17世纪产量开始下降了，因为美洲的银矿最容易开采的部分已经被挖完了，要挖更深的成本会更高，原住民劳动力死的太多 非洲奴隶供应也跟不上，荷兰和英国的海盗越来越多越来越猖狂， 1600年每年的白银大概200-300吨，1650年降到100吨以下，17世纪的时候更少了。 当白银减少的时候，荷兰和英国还有工厂，他们的经济可以自我维持，西班牙没有工厂，白银一少 就买不起东西了。为什么西班牙之前一直都在买别人的东西而没怎么发展自己的工业呢？ 在西班牙的社会价值观是鄙视动手干活的，所以一个体面的人应该是贵族、军人、法律学者，而不应该是商人、工匠，工厂主。在西班牙有一个笑话是一个卡斯蒂利亚贵族宁愿饿死，也不愿意被人看到在干活。 很多低级的贵族穷的要死但拒绝工作。其实本身西班牙人养羊 卡斯蒂利亚有很好的羊毛，但很多时候卖的是原材料，而不是加工后的布匹。羊毛被运到佛兰德斯、英国或荷兰，在那里织成布，再卖回西班牙。利润最高的加工和贸易环节，被别人拿走了。西班牙有羊，但是没有建织布厂，建织布厂需要投资、技术、管理，这些都是商人的技能，西班牙的贵族不屑学习 他们有钱但是不愿意投资制造业。普通人即使想做，也缺少资本、技术和市场支持。原本在金融、贸易、手工业和农业技术上很重要的犹太人、摩里斯科人都被赶走了。而且西班牙的通货膨胀厉害，导致西班牙工匠的产品比英荷的贵，产品没有竞争力。
腓力四世1605年出生，16岁的时候继位，他和爸爸有一个共同点，都不太像管国家，但原因跟爸爸不一样，爸爸是因为懒，他是更喜欢做别的事。他有两个爱好，第一个是艺术，他是一个真正的艺术爱好者，收藏画、看戏剧、写诗，花大量时间看戏。另一个爱好是女人，据说他有30多个私生子，有些历史学家说更多，他跟宫廷里的女仆、演员、贵族都有关系。一个沉迷艺术和女人的国王，他把权利交给了他的宠臣-奥利瓦雷斯伯爵-公爵（胖子）。 这个伯爵是17世纪西班牙最有意思的政治人物。他出身贵族但不是最高等的，及其聪明、精力充沛，野心也很大，他是真心想做事的，每天工作十几个小时。他有一个明确的目标-让西班牙重新强大。但同时性格固执暴躁强硬，树敌很多。卡斯蒂利亚承担了帝国大部分的负担，出钱出人打仗，欧洲战争越来越贵，法国要打、荷兰要打，阿拉贡、加泰罗尼亚、瓦伦西亚、那不勒斯各自有自己的法律不愿意交税和出兵，全部负担都压在卡斯蒂利亚，尽管卡斯的农民没钱也依然要交税，卡斯的农民最怕干旱，第二怕的就是看到税官。所以这个胖子伯爵绞尽脑汁想出一个方案“联合武装计划”，要求帝国每个部分按比例出钱出兵，分担帝国的负担，从逻辑上很合理，但是阿拉贡，加泰罗尼亚，葡萄牙的贵族和议会把不交税不出兵当做他们的权利，所以他们觉得胖子伯爵在侵犯他们的自治。西班牙确实需要更同意的财政和军事体系，但他的做法太硬，他想用命令解决一个需要协商的问题。以及卡斯的军队驻扎在加泰罗尼亚跟法国打仗的时候，士兵被拖欠军饷，惩罚不了真正欠他们工资的人，把怨气、敌意、支配欲转嫁给最容易伤害的人身上。1640年，加泰罗尼亚农民起义，叫“收割者战争”。他们杀了卡斯的总督，宣布脱离西班牙，投靠法国，请求法国国王路易十三当他们的保护者。同年，葡萄牙趁西班牙忙于加泰罗尼亚叛乱和法国战争的时候，也发动政变（因为合并后西班牙的敌人变成葡萄牙的敌人、荷兰、英国攻击葡萄牙海外殖民地和贸易据点，葡萄牙觉得自己被拖进西班牙的战争。葡萄牙贵族觉得：我们为什么要为卡斯蒂利亚的战争买单？），于是推翻了西班牙总督，拥立若昂四世为国王。（葡萄牙花了28年打了几次试图收回都失败了，1668年正式承认葡萄牙独立），1643年的时候，罗克鲁瓦战役里法国军队击败了西班牙军队，击败了曾经非常可怕的西班牙步兵方阵。欧洲人看到西班牙可以被打败，法国正在上升，欧洲霸权开始从哈布斯堡西班牙，慢慢转向波旁法国。腓力四世把胖子伯爵流放到他的庄园了（1643），两年后他死了，临死前精神状态已经不太正常。1648年，西班牙正式承认北部尼德兰独立（荷兰）。签署了威斯特伐利亚和约。 荷兰叛乱从腓力二世打到腓力四世，打了八十年。一个人出生、长大、老死，这场仗都还没打完。为了保住尼德兰，花了无数钱、死了无数人，拖垮了财政，最后还是没保住尼德兰北部-荷兰。 荷兰独立后变成17世纪最有活力的国家之一，有商业、银行、海军、东印度公司、全球贸易、城市自治、宗教相对宽容。西班牙赶走异教追求宗教纯洁，荷兰吸收商人、工匠、资本、难民，追求商业效率。 在不同维度里，他们得到的不同，荷兰更适合17世纪全球贸易网络。一种新型的国家正在超过旧帝国。1659年，西班牙和法国签了比利牛斯条约，把更多的领土割给法国。其实胖子伯爵下台后，腓力四世也试着自己多管事，但局面已经很难挽回，一堆坏消息，他的私人生活也越来越悲剧。第一任妻子伊莎贝拉死了，他又再娶了玛丽安娜（自己的侄女奥地利公主）。但又是近亲，哈布斯堡家族为了保持王朝利益，不断和亲戚结婚，短期可以保住领地、继承权。 同时遗传风险也在一代一代积累。腓力四的很多孩子都夭折，最后终于有一个活下来的儿子-查理二世。看到这个孩子，虚弱的、畸形的、他可能已经知道这个孩子不太对，但他别无选择（尽管他孩子很多但是合法继承活下来的就这一个）但是他也亲口承认过一个私生子，而且他的私生子从小接受的是王子级别的教育，后来还被安排军事和政治任务，所以腓力四世在1642年就正式承认唐胡安是自己的私生子（他妈妈是出名女演员），1665年，腓力四世去世，据说临死前他说：上帝给了我这么大一个帝国，但我没有一刻不再为他受苦。
17世纪中期的卡斯蒂利亚农村已经明显变穷了。很多村庄人口减少，年轻人去了城市、军队或美洲，留下老人、女人和孩子。农民主要种小麦，但小冰期带来寒冷和歉收，土地也越来越贫瘠。他们要给国王、地主和教会交税，收成被拿走很多，剩下的只够勉强生活。普通人吃面包、鹰嘴豆、橄榄油，偶尔喝葡萄酒，很少吃肉。他们最怕的是瘟疫、收税人和干旱。城市里，塞维利亚也开始衰落。1600年前后它还是美洲贸易中心，但17世纪瘟疫严重、白银减少、贸易变少，人口和商业都下降。后来因为河道淤积，大船进不来，美洲贸易中心转到海边的加的斯。塞维利亚从帝国贸易中心变成普通地方城市。
查理二世1661年出生，1665年4岁的时候就继位了，2岁才开始学走路，8岁还不能自己穿衣服，瘦弱、经常生病。而且他的下巴夸张到变形，下颌骨极度突出嘴巴合不上，所以不能正常咀嚼食物，他的食物需要被切成极小块或者捣成泥吞下去，胃疼是他一辈子的问题。爸爸去世后，他继承了位置，妈妈玛丽安娜做摄政。宫廷里所有人都知道"这个孩子可能活不长"，他太虚弱了，每次生病，全西班牙都在紧张，因为他没有兄弟姐妹，如果他死了，哈布斯堡家族在西班牙就断了，会引发一场争夺西班牙王位的大战。他没有受到父辈们从小的系统教育，因为不想让他太累太焦虑都在保护他，所以他只是能读能写。 大家给他起了一个外号，叫做被施了魔法的人。他妈妈是摄政王太后，权利很大，但他妈妈不是伊莎贝拉那种强势的女王，她依赖宠臣-尼塔尔德神父，西班牙贵族很不爽觉的凭什么让一个神父管。慢慢形成了反对派，其中最重要的人物就是魔法王子的私生子哥哥，唐胡安，他有野心有战绩，健康、有军事经验、政治魅力。在查理二世时期，西班牙最大的外部压力是法国。当时法国的国王是路易十四，路易十四看西班牙就像一只受伤了但很大的动物，他不会一下子吃掉，而是一口一口地咬。查理刚继位，法国就发动战争，理由是他老婆是腓力四世的女儿，所以法国有权继承一部分西班牙尼德兰。法国开始进攻尼德兰，西班牙打不过，守得很吃力，丢了一些边境城市。1670年，腓力四世去世五年后，法国打荷兰，西班牙也卷进去，站在反对法国的一方，但是西班牙已经没有足够的实力去跟法国正面对抗，战争的结果很糟，《奈梅亨条约》签订，西班牙又割地给法国，16世纪的时候西班牙在欧洲到处有地，在这个趋势下，法国要一块一块拿走。西班牙不是一天失去欧洲霸权，而是慢慢被法国扒剥皮。宫廷的内斗还在继续，1677年，胡安终于掌权了，他逼走魔法国王妈妈的宠臣，成为王宫里最有权势的人，很多人对他有期待，觉得终于来了一个强人。但他也救不了西班牙，两年后死了，官方说法是病死。1979年魔法国王结婚了，第一个老婆17岁嫁给他，是法国的玛丽路易斯公主，路易十四的侄女。她嫁到西班牙后非常不开心，离开了凡尔赛的繁华，来到一个灰暗的、衰败的、充满宗教仪式的宫廷，她的丈夫不能正常说话、不能正常吃饭，她很孤独。结婚十年没有孩子，26岁的时候死了（据说是被人毒死 因为像让查理娶一个更能生育的新妻子），第二个老婆是一个德国的公主，家族以多产出名，妈妈生了23个孩子，宫廷选她希望她的基因能多生。又是一个十年，还是没有孩子。问题几乎可以确定在查理这边了。最后几年，所有人开始等遗嘱。
查理二世的时代不是完全摆烂，西班牙内部有些大臣试图修补国家，尤其是财政和货币政策，17世纪的西班牙货币混乱，财政信用很差，有些大臣想要整理财，控制通货膨胀，减少王室的开支，恢复一点经济的秩序，到查理二世晚年的时候，西班牙某些经济指标有一些恢复迹象。1680-1690，路易十四继续通过收复政策来扩张边界。西班牙被迫让步，1688-1697年，欧洲爆发了九年战争，很多国家联合起来对抗法国（西班牙、荷兰、英格兰、奥地利），这次西班牙已经不是主角了，97年的时候法国攻占了巴塞罗那，但因为这时候9年战争打了快十年了，法国虽然很强，但财政、粮食、社会压力都很大，双方需要和平，而且法国更在意的是边境安全，虽然巴塞罗那很有价值，但是这样会刺激反法联盟继续打，所以他们签约了《赖斯韦克和约》，把很多占领地还回去，包括巴塞罗那。用和平换喘息（但打了九年保住了地理位置很关键的斯特拉斯堡，法国也证明了自己强到需要整个欧洲联合才能挡住）`,
  es7: `1700年，可怜的魔法国王死了，他没有孩子，哈布斯堡王朝绝嗣了，他死前在遗嘱里把王位留给了法国国王路易十四的孙子腓力·德·安茹（他姐姐的孙子），魔法国王大臣的考虑是法国是欧洲最强的国家，如果西班牙国王是法国王子，法国就会保护我们，不会吞并我们。但是英国、荷兰、奥地利不同意不肯承认腓力五世的合法性，西班牙的遗产太大了，他们担心如果法国和西班牙由同一个家族控制的话，法国就太强了，变成欧洲超级巨兽控制整个欧洲。结果西班牙王位继承战又打了14年，这是一个博弈游戏-多人防止超级玩家出现。主要玩家法国、西班牙波旁派、奥地利哈布斯堡、英国荷兰葡萄牙等海上国家。他们每个国都有自己的目的，魔法国王死后人人都想拿到这个遗产大礼包，这个遗产包太大，谁全拿谁就有可能成为超级玩家，所以博弈的关键是谁拿了会破坏均衡？法国的理想收益是自身强➕西班牙变友军=欧洲优势巨大。西班牙波旁派策略是让最强的法国保护西班牙的完整。英国、荷兰葡萄牙的最优策略是组织联盟，打到法国接受限制。奥地利觉得西班牙哈布斯堡绝嗣了，但我们也是哈布斯堡，所以西班牙应该给查理大公。一开始法国很强，但海上联盟国联手后战争变成长期消耗战。1704年 英国名将跟奥地利名将联手击败了法国的军队，这一年英国还拿下了直布罗陀直到现在扔是英国海外领土。过了两年法国又在意大利受挫，1709年，法国虽然被打得很惨，但是没有崩，反法联盟在战术上赢了，但是伤亡巨大。这时候英国和荷兰都开始怀疑继续打下去值不值，为了把腓力五世下去还要死多少人花多少钱？1711年，神圣罗马皇帝死了，查理大公继承王位，英国荷兰突然懵了，打这场仗是为了防止法国和西班牙合体，但是查理大公如果做了奥地利的皇帝和西班牙皇帝 也是一样会变成超级帝国很危险、局势反转，英国改变策略，不一定要查理赢 ，只要腓力五世放弃法国继承权，西班牙割让出一些欧洲领地就可以停战。最后的均衡解是腓力五世做胡西班牙皇帝，但是法国和西班牙王位不得合并，西班牙割掉欧洲部分领地，英国拿到直布罗陀和贸易特权，奥地利拿到西属尼德兰和意大利领地。最后英国赢到了最符合自己战略的东西：别让法国一家独大；同时让英国海军和贸易吃到最大红利。
虽然英、荷、葡等国不承认腓力五世的国王位置，但他在17岁这年还是来到了西班牙成为西班牙国王，和查理五世一样，一个外国人说着外国的语言带着外国的顾问来统治一个他不了解的国家。他属于法国波旁王朝，波旁家族继承西班牙后为西班牙波旁王朝波旁王朝（1700到今天，今天的西班牙国王还是波旁家族），腓力五世也有抑郁症
波旁王朝给西班牙带来了法国式的中央集权改革，统一西班牙所有地区的法律（在波旁王朝来到之前的西班牙不同地方的法律、议会、税收都有自己的系统）、颁布了新基本法，废除了阿拉贡、瓦伦西亚、加泰罗尼亚、马略卡的独立法律，强制推行卡斯蒂利亚的法律和语言。这对泰罗尼亚人来说是文化灭绝，在行政上进行了改革，引入了法国式的“省长”制度，每个省由王室任命的官员管理，取代之前混乱的地方贵族统治。在经济上也改革，波旁王朝试图发展西班牙的制造业，建了一些皇家工厂，生产陶瓷、玻璃、纺织品，模仿法国的科尔贝尔式重商主义（国家要富强 → 要多出口、少进口 → 金银流入国内 → 政府税收增加 → 军队和王权更强），当时建立了塞戈维亚的皇家铸币厂、马德里附近的瓷器厂，这些是西班牙第一次认真的尝试工业化，虽然规模不大。他们来到后还进行了美洲贸易改革，以前的贸易港口被垄断，波旁王朝慢慢开放了更多港口，允许巴塞罗那、瓦伦西亚等港口直接和美洲贸易，这刺激了这些城市的经济。一个世纪里人口增长了几乎一倍，经济呈现不均匀的改善，加泰罗尼亚和巴斯克这两个地区在18世纪开始工业化，加泰罗尼亚发展了纺织业，巴斯克发展了炼铁业，这两个地方成了西班牙最富裕的地区直到今天。但是安达卢西亚和卡斯蒂利亚没怎么恢复，还是以农业为主，少数贵族拥有大量土地的大庄园制度，大量农民是佃农（租别人地自己出劳动力）或无地农民（雇佣农民），贫富差距很大。瓦伦西亚慢慢从摩里斯科人驱逐的打击中恢复，但也没有恢复到之前的水平，这种北部富、南部穷的格局在18世纪形成（地理条件的不断放大）。
腓力五世有严重抑郁症，有时候几个月不下床，躲在黑暗的房间里，不洗澡，不换衣服，不见任何人，会突然的大哭，会拒绝吃饭好几天，有时候他相信自己已经死了或者变成了一只青蛙，这意味着西班牙在很多时候实际上没有国王，国王躺在床上不能做任何事，在腓力到西班牙的这一年（1701），他和14岁的公主玛丽亚·路易莎结婚（意大利和法国边界的王朝），这个女孩比腓力强很多，迅速学会了西班牙语，赢得了西班牙人的好感，实际上代替腓力管理国家，在王位继承战争的期间，这位公主还组织了抵抗，鼓舞卡斯蒂利亚人继续战斗，她骑马巡视军营，和士兵对话，31岁的时候她去世了，生了四个孩子，身体被反复怀孕耗尽了。路易莎公主死后一年，腓力去了意大利帕尔马的公主伊莎贝拉·法尔内塞，她及其强势和有野心，目标明确，要给自己的儿子弄到王位，跟腓力生了几个孩子，但是腓力前妻的孩子排在前面，继承不了西班牙王位，所以接下来三十年，西班牙的外交政策就是为自己儿子找王位的目标驱动，西班牙打了好几场意大利战争为了她的儿子能在意大利当国王，最终她的大儿子查理拿到了那不勒斯和西西里的王位。1746年 腓力五世去世了。王位给了跟第一个公主的孩子斐迪南六世，他遗传了爸爸的精神问题，但他不是抑郁症，他更像一种安静的忧郁，不喜欢冲突，不喜欢战争、争论，想要的只是安静。他在位期间几乎没有打仗。从双王以来西班牙每一代国王都在打仗，和法国打、奥斯曼打、荷兰打、英国打，战争是西班牙的常态，但是这个安静的王子选择不站队，并且在这个和平时代中慢慢修复国家。 西班牙的海军在王位继承战中损失惨重，安静国王建新船、修建造船厂，修建道路，原来西班牙的道路在18世纪中期是欧洲最差之一，他开始建真正的道路来连接主要城市。财政上也进行了整顿，减少了一些浪费，清理了一些腐败，整体来说没有大动作，国家在安静中恢复，对当时的西班牙来说算是难得的喘息吧。安静国王的老婆是葡萄牙公主，他们两个是真正的恩爱，1758年芭芭拉死了，安静国王崩溃了，拒绝离开房间，撕烂自己衣服，第二年去世了。他没有孩子王位给了前面那个强势公主的大儿子查理三世，查理三世来西班牙继承皇位的时候已经在那不勒斯当了25年的皇帝了。他丑的很有特点，但他不在乎，他穿着简单，最开心的事情就是打猎，每天下午风雨无阻，这是他的铁律。不管国家发生了什么事下午他都要去打猎，他不想腓力二世每天看12小时公文把自己累死，他信任大臣，让他们做事，自己做最后决定，然后去打猎。他的性格务实、有条理、不极端、不控制、没有查理五世的责任的重压，不追求伟大，只追求“比昨天好一点”。
那不勒斯在查理三世去做国王的时候，是一个落后、贫穷、被奥地利人管理的很差的城市，查理改革了那不勒斯的行政，打击了一些贵族的特权、改善税收系统，修路建医院，建了圣卡罗格剧院（比米兰歌剧院早了41年，让那不勒斯成了欧洲的音乐中心）--他从小就在音乐中长大，他的爷爷腓力五世抑郁的时候用尽了各种办法治疗都没有用，他们听说有一个人-法里内利，说他的声音是人类能发出的最美的声音，于是让他来给爷爷唱歌，他唱了以后腓力几个月第一次从床上坐起来，要求再唱一遍，从此以后每天同样的四首歌唱了十年，一直留在宫廷里，在他爸爸的时代 法里内利不只是给国王唱歌治病，也是宫廷娱乐的组织者、策划歌剧演出、组织音乐会，把马德里的宫廷变成了一个音乐中心，他还赞助了庞贝和赫库兰尼姆的考古发掘（18世纪最轰动的考古事件 整个欧洲为之富矿新古典主义从这里开始，全欧洲都开始模仿古罗马风格）。
查理到西班牙后，带来了意大利大臣，其中有一个侯爵，他负责财政和内政改革，推行了很多改革，其中有一项是禁止马德里人穿传统的长斗篷和宽帽子，他想让西班牙人现代化，想法国人那样穿短外套和三角帽。然后马德里发生了暴动（1766）他们觉得外国人不要管我们的事，查理被迫逃离马德里，然后他学到了教训，他换了西班牙本地的大臣，他们也支持改革，但他们知道怎么用西班牙人能接受的方式改革。查理从此改变了策略，从意大利式的激进变成慢慢来，他学到了前面一些皇帝没学到的东西--对的事情用错的方式做，比不做更糟。1767年某天深夜，他带军队包围耶稣会，耶稣会士被捕，几天之前把2600个会士赶上船，没收财产 驱逐出西班牙。（因为最好的大学和学校是耶稣会的，他们控制了教育。 而且还拥有大量的土地和财富，经济实力让查理感觉不安，而且耶稣会在南美洲有大量的传教区，耶稣会管理者几十万原住民不受西班牙总督控制他觉得威胁了王室在美洲的权威，而且他还怀疑帽子暴动跟耶稣会有关）。查理把马德里的城市从每天晚上人都会把粪倒到街上 到有排水系统，铺石板路、大道两边种树，建自然科学馆，查理三世被叫做马德里最好的市长。他还支持了美国的独立（但是这会让美洲的西班牙殖民地觉得我们也想独立）。
18世纪的普通人的生活最大的变化就是从美洲来的食物终于进入了普通人的饮食，番茄、土豆、玉米、辣椒从16世纪就到了西班牙，但两百年来西班牙不太吃，觉得奇怪、有毒。18世纪开始被普遍接受（人口增长、他们本身的主食各种麦产量有限），土豆在北部大量被种植，成为穷人的主食之一，番茄开始和橄榄油一起变成西班牙菜的基础。玉米在北部替代了部分小麦和黑麦，因为玉米产量很高，辣椒变成了西班牙香肠的灵魂调料。18世纪的时候法国的启蒙运动产生，伏尔泰、卢梭、孟德斯鸠影响了整个欧洲。西班牙也受到了一些影响，但是比法国弱很多，因为宗教裁判所还在，很多启蒙思想的书在西班牙是禁书，不能公开讨论，但有一些西班牙的知识分子私下读法国的书，他们相信理性、科学、教育。
查理四世是查理三世的儿子，1788年继位(40岁），就在他继位的第二年法国大革命爆发了，这对他来说是一个噩梦，他是一个喜欢打猎、修钟表、做木工的好人。大革命爆发-法国国王路易十六（他亲戚）被法国子民关起来然后砍了他的头，木工国王吓坏了，“他们杀了自己的国王，会不会也来杀我？”，木工国王赶紧关闭和法国的边境，禁止法国的书籍和报纸进入西班牙，宗教裁判所重新激活，检查任何可能的革命思想，他爸改革半天往前推进的一点现代化因为恐惧-让查理四世做出了和进步相反的一切。但对他来说 是更安全和保守的一个选择。他老婆是意大利公主，在1765年就嫁给他了，她精明、有控制欲，在宫廷斗争中游刃有余，戈多伊作为皇家卫队进入宫廷，他年轻英俊有魅力，很快就和王后发生了特殊关系，外国的外交官在信里公开谈论这件事，查理四世没管，可能他不知道，可能他不在乎，历史学家认为他是一个自愿被蒙在鼓里的人。戈雅这个画家是理解这个时代最好的窗口，他画了《查理四世的家族》-1800年。戈多伊的外交政策是让西班牙和法国结盟，和英国为敌，西班牙被拉进了拿破仑（法国新国王）的战争。拿破仑说我们一起去控制英吉利海峡，为入侵英国做准备，他们联合舰队一共有33艘战列舰（15艘西班牙的）在西班牙南部附近海岸遇到了英国舰队，英国指挥官纳尔逊用了一个革命性战术，这个战术极其危险，但是一旦成功自己的优势就可以发挥出来，纳尔逊成功了（但他被法国狙击手射中，死前他说“感谢上帝我尽了我的责任”），上次无敌舰队失败后，西班牙海军恢复了，在1590年建了更大的舰队，西班牙仍然是海上强国又持续了200年，这次的特拉法加海战（1805）后西班牙再也没有重建过真正的海军。西班牙和美洲之间的联系被切断了，英国控制了大西洋，西班牙的美洲殖民地变成了孤岛，母国没办法向他们投射军事力量，无法控制他们的毛利，无法在他们发生叛乱时派军队去镇压，这场海战加速了美洲殖民地的独立，三年后西班牙本土陷入拿破仑战争混乱时，美洲殖民地一个个宣布阻力，但是他们无法阻止，他们没有海军，他们的船都在特拉法加沉没了。斐迪南七世是木工国王的儿子，他恨他爸爸，更恨戈多伊，在他眼里，父亲是个傀儡，母亲是个荡妇，戈多伊毁了西班牙，他才应该当国王。于是他暗中和拿破仑联系像推翻木工国王爹，他写信给拿破仑说：“帮我推翻我爸，我会成为法国最忠实的盟友”，1808年3月木工儿子的支持者在马德里南部的王室宫殿发动了兵变，他们到偷情首相家里，他藏在一卷地毯里，被拖出来，差点被暴民打死-最后被关进监狱，查理四世被迫退位，费迪南七世做了皇帝。这时候，拿破仑的军队已经在西班牙了，他说要去打葡萄牙，借过西班牙的道，但他们借道来到这里后没有走，几万法国士兵驻扎在西班牙主要城市控制道路和要塞。拿破仑不准备让木工儿子做国王，他有自己的计划，他邀请查理和斐迪南去法国首都“谈判”，他们父子两像两只落入陷阱的鸟，都去了，到了法国，拿破仑逼他们退位，然后宣布拿破仑的哥哥约瑟夫·波拿巴是西班牙新皇帝。（这手段 不愧是人民看了国王的头以后还能坐上国王的人），西班牙人一看，我们的国王在法国被关起来，一个法国人来做我们的皇帝，我们国家这是被占领了？ 马德人起义。`,
  es8: `（1808）马德里皇宫前面一群法国士兵准备把查理四世最后留在马德里的两个孩子送到法国去，拿破仑要把整个波旁王室都弄到法国去，马德里人聚集在皇宫前面大喊他们要抢走我们的王子，人群爆发了，屠夫带着切肉刀、马夫带着鞭子、铁匠带着锤子、女人带着剪刀和热锅油，用一切能找得到的东西当武器，冲向法国士兵。这不是一场有组织的起义，没有领导人，没有计划，是自发的愤怒，几百年来被入侵被压迫的记忆爆发了，你们可以抢走我们的国王，但你们不能抢走我们的孩子，法国骑兵冲进人群用弯刀砍人，战争持续了几个小时在马德里不同的街区，人们从窗台往下扔石头和家具，每条小巷里都可能有人拿刀等着，到下午法国人控制了局面，起义被镇压，法国人很愤怒，决定给马德里人一个教训。第二天凌晨，法国军队在几个地方开始处决前一天参与起义和被怀疑参与的人，在今天王子山（今天马德里市中心的一个公园），几十到几百个平民被带到这里排成一排，面对墙，士兵一一射击。戈雅（前面提到的那个）画了两幅画，记录了这两天（艺术是创作者的呕吐物 情感 画面 感受在内在充斥着，创作可以把这些呕吐出来）。
戈雅是这个时代的眼睛，他用画和思考记录了这个时代，他出生在一个小村子，爸爸是镀金匠，不穷不富，年轻的时候去意大利学画，成了宫廷画师，他的画在以前是色彩鲜艳、充满阳光，44岁的时候耳聋了，从此被封闭在一个无声的世界里，不能参加聚会、不能正常社交，不能听音乐，他变得孤独，他开始向内看，看人性的深处，看他以前不愿意看的东西。 1790年末他画了一组板画叫《奇想集》有80幅，讽刺西班牙社会的愚蠢、虚伪、迷信。
戈雅是这个时代的眼睛，他用画和思考记录了这个时代，他出生在一个小村子，爸爸是镀金匠，不穷不富，年轻的时候去意大利学画，成了宫廷画师，他的画在以前是色彩鲜艳、充满阳光，44岁的时候耳聋了，从此被封闭在一个无声的世界里，不能参加聚会、不能正常社交，不能听音乐，他变得孤独，他开始向内看，看人性的深处，看他以前不愿意看的东西。 1790年末他画了一组板画叫《奇想集》有80幅，讽刺西班牙社会的愚蠢、虚伪、迷信。《5月2日》《5月3日》-在马德里普拉多博物馆。戈雅还画了《战争灾难》-82幅版画，死后35年才第一次出版，他不分好人坏人，画了法国人的暴行，西班牙人的暴行，游击队把法国俘虏肢解的场景，吊死的人被挂在树上，剥光了衣服，手臂和腿被挂在树枝上，像屠宰场。饥饿的平民瘦的只剩下骨头，在街角死去没人理会，女人被强奸，一堆尸体被扔进坑里像垃圾一样。戈雅在每幅版画下面写了一句话：我看到了这些、这也是、为什么、无法再看、最后一幅-真相已死 。我很能理解戈雅的画，当我经历过那一次，我重新理解艺术。 很多人把艺术崇高化 ，其实这世间的一切几乎都再普通不过。
于此同时，美洲本身有一些问题需要改革，这时候他们国王被抓走了，最初他们不是想要独立，而是不承认法国王帝，他们成立了委员会，在国王回来之前我们自己管理自己，但一旦开始管理后发现，也许我们自己管的更好，即使木工会忘回来了，我，嗯也不需要他了，1810年到1814年，西班牙本土在打仗，管不了美洲，他们自治了4年。4年的自治经验让他们足够意识到“我们可以做自己的主人”。1810年委内瑞拉和阿根廷首先宣布自治。
拿破仑让自己的哥哥坐上西班牙的王位后，西班牙人给他哥哥起了一个外号，瓶子国王，这个是一个宣传，因为他们想要嘲笑他们的敌人。真实的拿破仑哥哥约瑟夫波拿巴是一个很开明的人，比费迪南七世开明的多，他试图改革西班牙，废除了宗教裁判所，试图减少修道院的数量，把一些教会财富分给穷人，他想建立现代的司法制度和行政制度，但没人听他的，西班牙人宁愿要一个坏的自己人也不要一个好的外国人，西班牙人对外来的改革有一种本能的抵触。法国军队控制了西班牙的主要城市和大路，他们的正规军比西班牙的强，在正面战场上西班牙人打不过，他们发明了一种新的战争方式，guerrilla -小战争，也是游击战这个词的来源。 游击队员是农民拿着猎枪，牧羊人带着刀，逃兵带着偷来的武器，他们知道每一条山路每一个隐蔽的山谷，甚至神父穿着教袍带着十字架指挥攻击，他们不正面对决，只是伏击、骚扰、切断补给（和陈琳、和过去的罗马对迦太基的战略一样），法国军队控制城市和大路，但是每一个山头都可能有伏击、每一个村庄可能都藏着敌人，游击队白天是农民晚上是战士，白天对你微笑卖你面包，晚上拿枪打你。
这种战争产生了一种可怕的循环，法国被伏击→愤怒→他们去最近的村庄→"游击队从这个方向来的→这个村子肯定藏了游击队"→他们烧村子→杀人→强奸→这个村子的幸存者→本来可能是中立的→现在他们充满了仇恨→他们加入游击队→更多法国人被杀→更大规模的报复→更深的仇恨→无限循环。戈雅的《战争灾难》画的就是这个循环，不是站在任何一边的立场，是"这种报复式博弈把所有人变成了怪物"。这时候西班牙人自己也分裂了，西班牙的知识分子、官员，甚至贵族支持-瓶子国王，他们认为拿破仑代表进步，波旁代表落后，他们看到西班牙的落后，相信只有外来的力量才能打破西班牙的旧制度。这群人不是多数但包括了一些西班牙最有教育的人-学者、律师、高级公务员。 第二方是反对法国但是支持改革的自由主义者，他们反对法国占领，但是也不想回到旧制度，想借这个机会建立一个新的西班牙，有宪法、有议会、有公民权利。第三方是反对法国反对革命的绝对主义者，他们要的是旧西班牙，要的是传统说了算。 所以这三波人一波是不想改变的，一波是想改变谁来改的没那么在意，一波是可以改但是必须我们自己改。这三方在战争期间就互相争，战争结束后争斗就变成了19世纪西班牙的主旋律。 很多神父也是这场游击战的核心人物，在西班牙农村，神父是唯一有权威的人，他们不认识将军政治家，他们每周去教堂听神父讲道，他们认识自己的神父。法国人来了以后神父告诉农民，法国人是无神论者，他们在法国杀了国王毁了教堂，他们要来毁掉我们的信仰。保卫西班牙就是保卫上帝，杀法国人就是杀魔鬼的仆人，这是圣战。这场战争对农民来说 是保卫上帝的宗教战争。城市和农村生活在完全不同的信息世界里。这种不同信息和受到不同教育 环境的影响下，城市的人想的"西班牙"是一个需要被"现代化"的国家，需要宪法、议会、教育、工业。农村的人想的"西班牙"是一个需要被"保护"的国家，保护它的信仰、传统、国王，不被"外面的危险思想"污染。1812年 在一个被围困的城市里，来自西班牙各地的代表组成了一个议会，开始起草宪法，他们的敌人的炮火下讨论什么是自由，内容为国家主权属于人民，不属于国王。三权分立，立法、行政、司法。言论自由和出版自由。废除宗教裁判所。限制教会权力。所有公民在法律面前平等。"1813年，英国的威灵顿将军带着英国军队和葡萄牙军队从葡进入西班牙，和西班牙正规军、游击队一起把法国人从西班牙赶出去。1813年，维多利亚战力联军击败了瓶子国王的军队，瓶子国王套出法国，拿破仑在欧洲的其他战场也开始失败，他释放了费迪南七世。费迪南回到西班牙，人们涌出来欢迎他，我们期盼的国王回来了，女人哭，男人欢呼，孩子在路上撒花。他回来第一件事是废除宪法。回来的第二年，试图恢复美洲的控制，派军队去镇压。费迪南别人说他是恶意的精明，这让我想到某人，费迪南知道怎么操纵人，他对自由主义者承诺我会尊重宪法。在回国的路上说了很多和解的话，一到马德里就翻脸，他先让你信任他，然后背叛你。 这是我一直经历的。他建立了一个密探网络，鼓励人们相互举报，举报有奖，一被举报可能被逮捕或者处死，这种互相告密的文化让整个社会充满了恐惧和不信任。他鼓励背叛，惩罚忠诚，如果你忠于你的原则，你会被清洗。（中国文革时期也是这样）。他的宫廷变成一个"谁能最有效地出卖别人"的竞技场，最无耻的人升到最高，最正直的人被赶走或被杀。一个外国外交官写给自己政府的信里说"费迪南七世的宫廷是我见过的最卑鄙的地方每个人都在算计每个人，国王本人是最大的算计者。" 在这个时期，很多被木工儿子清洗的自由主义者流亡到了伦敦和巴黎，他们形成了一个流亡社区，继续写文章、出报纸、策划回国，他们在伦敦的咖啡馆里讨论西班牙的未来，用英国走私到西班牙的小册子传播自由主义思想。共济会是19世纪的秘密会社，很多自由主义军官和政治家是共济会成员，他们通过共济会的网络，跨越国界，保持联系，策划行动。木工儿子极度恐惧共济会，把共济会当成所有问题的根源。1820年，有一个军官里耶戈要带一支军队去美洲镇压殖民地的叛乱，但他不想去美洲送死，他在军队宣传宪法，说服了士兵不该去美洲打那些只是想自由的人，应该在西班牙争取自己的自由，他回头往马德里走，高喊宪法万岁，一开始他的军队很小，消息传来后自由主义者纷纷响应，他试图镇压，但是他自己的军队里军官也共情那个争取自由的军官，（这说明当时自由主义的意识形态像洪水一样 要盖不住了）木工儿子被迫接受，恢复宪法。他说让我们一起坦率地走上宪法之路。1821年，墨西哥独立。1823年，费迪南秘密联络法国。法国国王路易十八决定帮他恢复绝对权利，带了10万大军，这次跟上次法国来不一样，这次几乎没有抵抗，因为法国人不是来征服，是来帮国王恢复权利的，很多农村人一听，支持这个，他们想要教会恢复权利，想要绝对的君主制回到以前，自由主义溃散了，他们支持基础太窄，有学识的城市人跟农村人比起来还是少。费迪南恢复绝对权力被叫做丑恶的十年，自由主义者被逮捕、被流放、被处死，大学被关闭（费迪南说"我们不需要大学，大学是叛乱的温床"）报纸被关，任何形式的政治讨论被禁止。1824年，阿亚库乔战役，南美杜丽君赢了，西班牙在南美最后一支军队投降，1825年除了古巴、波多黎各和菲律宾，剩余所有美洲殖民地都独立了。英国一直也在暗中支持美洲独立，因为独立后的美洲可以自由和英国贸易，对英国的商业利益有巨大的好处。独立后大量美洲的“半岛人”（从西班牙半岛来的人）逃回西班牙，失去了在美洲的一切，土地、财产、地位，回到一个他们已经不认识的国家，成了难民。美洲独立后文化联系没有断掉，他们还说西班牙语，还信天主教，还吃西班牙菜。
1833年这个恶心的皇帝终于死了，他接了四次婚，前三次都没有活下来的孩子，死的时候 留下一个3岁的女儿和一个弟弟。3岁的女儿成了西班牙女王（木工儿子改了法律 恢复卡斯蒂利亚的传统-女性继承权），她的妈妈那不勒斯公主做摄政，但是他妈妈在西班牙没有根基，没有自己的权利网络，她需要盟友，唯一能依靠的盟友就是自由主义者。因为绝对主义者支持卡洛斯（费迪南七世的弟弟），但她本身不是自由主义者，她只是抓住唯一能抓的浮木而已。接下来的卡洛斯战争的两派表面是两个被支持者，实际背后代表的是两种不同的利益。农村人和城市人的利益是不同的，也不是一个维度。他们理解不了彼此。战争主要在巴斯克和纳瓦拉的山区打，弟弟派擅长游击战，山区地形最有利于游击，而且弟弟派有一个巴斯克军官，极其能打，在山里用游击战把三岁派的政府军打得焦头烂额，如果他没死 弟弟派很可能会赢，但是他在1835年的时候被子弹打伤腿（47岁），伤口感染后死亡了，弟弟派再也没找到这么出色的指挥官，弟弟派和政府军谈判，双方和解，卡洛斯派的士兵可以加入政府军，保留军衔，巴斯克和纳瓦拉保留了一些传统特权。今天巴斯克和纳瓦拉税收特权根源就是1839年的谈判。在卡洛斯战争期间，自由主义征服做了一件事，推行了西班牙历史上最大规模的财产没收和拍卖，天主教会拥有全国很多的地，这些地叫死手，死人的手握着不放，不进入市场、不分割、不交税。属于冻结的资产锁在教会手里不参与经济循环。修道院也拥有大量的土地，建筑、图书馆、艺术品，很多修道院极其富裕，修士过得很舒适的生活，周围的农民在挨饿。门迪萨瓦尔没收拍卖，修道院被关闭，修士被解散。理论上像让更多人拥有土地，而且也能给国家弄一笔钱，卡洛斯打仗政府需要资金，而且打破教会的经济基础这样能削弱他的政治影响力，教会的政治权利很大程度是建立在经济权利上的。但是实际上 穷农民买不起，甚至他们都不知道哪里拍卖，拍卖信息是在报纸上的。所以很多律师 商人 已经很富的地址、军官、投机商他们有信息有钱，买走了这些土地，土地的集中更严重了，之前教会拥有大量土地但是教会起码做一些社会服务，修道院给穷人施粥，办学校，做基本医疗，同样的土地被城市资本家拥有他们不做慈善，只想从土地上赚最多的人，雇日工干活，付最低的工资。穷农民的处境更差了，资本家比修士更有效率的剥削他们。教会从此恨自由主义者。1840年-1860年，城市和农村的信息鸿沟不断的扩大。城市识字率在提高，不到50%但比农村高得多。报纸增加了，马德里有十几种报纸，不同政治立场，自由主义的、保守主义的、共和主义的，虽然经常被审查和关闭，但总有新的出现。咖啡馆是城市政治生活的中心，人们在咖啡馆里读报、辩论、密谋，不同政治派系有不同的"据点"咖啡馆，自由主义者去一家，保守派去另一家，共和派去第三家。从法国传来的新思想，社会主义、无政府主义、共和主义，在城市里传播，尤其是在巴塞罗那和马德里。农村几乎没有变：识字率极低，安达卢西亚的很多村子，识字率不到10-15%。报纸到不了，即使到了也没人能读。信息来源和拿破仑时代一样，神父讲道、集市传闻、退伍士兵的故事、酒馆里的读报人、地方地主的解释。他们都没有错，只是他们看到的世界不同，他们都不完整，写到这里我很想哭。我看到了人与人之间的鸿沟。 可是他们都没错。也许他们都是善良的人。律师想的"西班牙"需要宪法、议会、教育、铁路、工厂。日工、农民想的"西班牙"需要下雨、需要地主今天选我去干活、需要神父保佑我的孩子不要生病。他们都选择离自己生活最近的东西。也许国家需要做的是让农民也得到教育，让宪法、议会、教育、铁路、工厂离农民更近。三岁女王13岁开始亲政，统治期间西班牙经历了持续的政治动荡，整个系统坏了，没有稳定的制度，没有真正的民主，没有社会共识。1850年西班牙北部，巴塞罗那和附近开始有了工厂，蒸汽机驱动的纺织厂，几十个家庭挤在一栋楼里住，厕所是公用的在楼道尽头，工厂里蒸汽机的轰鸣噪音巨大，空气里飘满了棉花纤维呼吸困难，很多工人几年后就得了"棉肺"。每天工作12-14小时，周日休息，勉强够养活一家人，能吃饱能有衣服穿，偶尔能喝杯酒。这种生活某种程度上比安达卢西亚的日工好，至少有稳定的收入不用每天早上去庄园门口排队看运气。在工厂里几百个工人一起干活，他们开始意识到"我们是一个群体，我们可以组织起来。1840年代巴塞罗那出现了最早的工人互助会，工人们每月交一点钱如果谁生病或受伤，互助会给他一点补贴，这是最原始的"社会保障"。1850年开始出现罢工。1860年代无政府主义从法国传了过来。无政府主义在欧洲其他国家是边缘思想，在西班牙变成了大众运动，尤其是工人和农民之间。因为西班牙人对"政府"没有信任。他们觉得政府本身就是问题，政党都是骗子，国家是压迫的工具，无政府主义说：我们应该自己阻止起来，工人管理工厂，农民管理土地，不需要任何上面的人来告诉你怎么做。从1868年开始到1939年 无政府主义在西班牙是最强大的工人运动注意，比社会主义、共产主义在西班牙都强，这在欧洲是独特的，因为其他国家的工人运动主要是社会民主主义或共产主义，只有西班牙 ，无政府主义是最大的。在南部，安达卢西亚的生活和中世纪几乎没有什么区别，庄园门口几十个人在等，全是日工，没有土地，没有固定工作，每天来这里碰运气。一天的工资够买几个面包，没被选中就饿着。收获季节每天都被选中的时候工资勉强够吃，非收获季节连续几周没有活，家人靠妻子做缝补和帮别人洗衣服的那点钱活着，或者靠借债，向村子里的小店赊账，等有活干了再还。妻子在家做饭、带孩子、缝补、洗衣，如果有机会去庄园做季节性采摘她也会去，大的孩子在家照顾小的孩子。村里可能有小学，但是负担不起让孩子去上学，孩子如果上学就不能帮忙干活或者带弟弟妹妹，他们的家庭需要每一双手。当无政府主义者说，推翻一切，重新分配土地，日工觉得终于有人说出了我想说的话。安达卢西亚的农村开始出现无政府主义的秘密组织，在没有灯的小屋里一个识字的人念无政府主义的小册子，其他人听，他们不讨论"理论"，他们讨论"什么时候分地"。有时候他们直接行动，放火烧庄园的谷仓杀庄园的牲畜杀管事的，没人出卖，全村人都是同谋。政府派军队来镇压，抓几个人，有时枪毙，但没用，因为根本的问题已经压不住了。北部的工业中心巴斯克有铁矿，在19世纪中期发展炼铁业，出口到英国，英国的钢铁厂需要巴斯克的铁矿，巴斯克的工业家开始累积巨大的财富，建了银行，建了造船厂，建了铁路，是西班牙最早的资本家阶级。北部的工业区觉得马德里的政策永远偏向卡斯蒂利亚的大地主不偏向我们的工厂。西班牙在1848年建了第一条铁路，但是轨宽跟欧洲不同，这样的话到了边境就必须换车，货物要卸下来重新装，让小变压在经济上更加和欧洲隔绝，直到144年后的高铁才用了欧洲标准。
1868年9月一群将军和政治家联合对伊莎贝拉二世做了又一次pronunciamiento，本来之前大家就是像公司里的不同派，去找ceo改来改去，但伊莎贝拉后期名声太差了宫廷腐败；她过度依赖宠臣和神父；选举造假；政府长期被温和派把持；经济危机；铁路和金融泡沫破裂；军队不满进步派长期被排除在权力外；她私生活丑闻很多，削弱了王室威望。将军们觉得你这个女王也别坐了。这次的pronunciamiento不是换驾驶员，而是换车，被叫做"光荣革命"（La Gloriosa）。所有人将军、军队、市民在街上喊伊莎贝拉滚蛋！，伊莎贝拉逃去了法国，新政府把她赶走后，不知道怎么办。 他们不想要共和国，想要一个好的立宪国王，他们在全欧洲"找国王"像找工作一样"谁想来当西班牙国王？条件：立宪、听议会的话、不要太专制。"他们找了好几个人，都拒绝了，西班牙国王这个位置，在欧洲的口碑已经很差了，"那个国家的国王会被政变推翻、会被流放、会被暗杀，谁想去？"最后他们找到意大利王子，成了西班牙国王阿玛迪奥一世，他是个好人，真心想做个好的立宪国王，但没有人听他的，他当了两年受够了，他对议会说：西班牙人不可治理！ 然后他辞职了，回意大利了。 一个外国人来当西班牙国王，两年后得出结论说这个国家无法治理，自己走了，很能说明问题。意大利王子走后，议会投票宣布共和国，西班牙第一共和国，两年换了四个总统。这个过程很混乱，坎顿起义（过程不重要），每个城市自己管自己，不听马德里的，算是无政府主义思想在政治上的一次实验，结果混乱到极点，没有统一的法律，统一的税收，统一的军队，每个城市自己印钞票，自己设关卡。我觉得这就像小孩子过家家，想脱离大人自己去做决定，但问题是他们还不成熟。系统 统治 管理 统一这些历史上几千年的东西有其意义。这提醒我做决定前，以史为鉴，雷军说 这个世界很大，很久，天下没有新的知识，这一帮人 出生 死去，同一个基因，同样的人性。一切都在反复经历中。在历史中你能找到一切答案。没有找到 是还没有看到。1874年有一位将军在打工拖宣布伊莎贝拉的儿子阿方索为西班牙国王，阿方索十二世，波旁家族回来了。回来以后掌权的不是国王，是一个政治家（安东尼奥·卡诺瓦斯·德尔·卡斯蒂略），他设计了一个巧妙的系统，原理就是让保守党和自由党轮流执政，但不是通过真正的选举。马德里的知识分子，知道选举是假的，知道整个系统是一场戏，但也承认"至少没有政变了，至少没有内战了，也许这是西班牙能做到的最好的了"。安达卢西亚的日工，不知道"选举"是什么，只知道"地主叫我去投票，我去了，投了他说的人，然后回去继续干活，什么都没变"军人不用再天天政变，因为精英集团都能轮流分到权力；坏处是，普通人根本没有真正参与政治。西班牙看起来安静了，但这个安静像一层布，把腐烂的东西盖住了。这时候，西班牙最后真正值钱的殖民地就是古巴。大部分美洲殖民地早在19世纪前半已经独立了，西班牙只剩古巴、波多黎各、菲律宾这些地方。古巴尤其重要，因为它有糖，有种植园，有贸易收入，是西班牙最后的钱袋子。对马德里来说，古巴不能丢。丢了古巴，就等于承认帝国真的结束了。
但是古巴人已经不想继续忍了。第一次古巴独立战争之后，西班牙答应改革，可是很多承诺没有兑现。奴隶制虽然在1886年废除了，但黑人和混血人的生活并没有真正变好；种植园经济还在，贫富差距还在，西班牙派来的官员还在控制权力。古巴本地的精英也越来越觉得：我们不是西班牙人，我们是古巴人。这个时候，何塞·马蒂出现了。他不是单纯的军人，而是诗人、思想家、组织者。他想要的不是“换一批人掌权”，而是古巴真正成为一个自己的国家。他还很早就看出，美国也很危险。古巴如果只是从西班牙手里出来，又落到美国手里，那不是真正的自由。
1895年，古巴再次起义。西班牙派韦勒将军去镇压。韦勒面对的是游击战，古巴叛军藏在乡村，靠农民提供食物和情报。韦勒的办法非常残酷：把乡村人口赶进西班牙控制的城镇，集中起来，不让他们帮助叛军。这样做的逻辑是切断游击队和农民的联系。但结果是大量平民被关在缺水、缺粮、缺医疗的地方，饥饿和疾病杀死了很多人。这件事让西班牙在国际舆论里变得非常难看，尤其是美国报纸不断报道古巴人的苦难，把西班牙描绘成残暴的旧帝国。
同一时期，菲律宾也出事了。菲律宾离西班牙很远，过去主要靠教会和修会控制地方。很多菲律宾村庄里，真正有权力的不是西班牙官员，而是神父和修士。到19世纪后期，菲律宾也出现了受过教育的本地知识分子，比如何塞·黎刹。他不是一开始就主张暴力革命的人，他更多是想改革，揭露殖民统治和修会的腐败。但西班牙当局害怕他，把他处死了。结果他的死反而激起了更强的民族主义。也就是说，西班牙不但在古巴失控，在菲律宾也失控。
然后美国介入。1898年，美国军舰“缅因号”在哈瓦那港爆炸，美国舆论立刻把责任推给西班牙。无论真相是什么，这件事给了美国开战的理由。美国对西班牙宣战后，战争很快就变成了一场单方面暴露差距的战争。马尼拉湾海战里，美国舰队几乎像演习一样摧毁了西班牙在菲律宾的舰队；圣地亚哥海战里，西班牙加勒比舰队也被摧毁。西班牙不是只是输了几场战斗，而是被证明它的海军、财政、行政、殖民控制能力都已经跟不上时代了。
战争只打了几个月，但结果极其沉重。西班牙在《巴黎条约》中失去古巴、波多黎各、菲律宾、关岛。古巴名义上独立，但实际上很快落入美国影响之下；波多黎各和关岛直接归美国；菲律宾被美国“买走”，然后菲律宾人又开始反抗美国。对西班牙来说，这不是普通割地，而是帝国最后的外衣被扒掉了。它从此不能再假装自己还是一个世界帝国。
可是这件事对不同阶层的人意义不一样。马德里的知识分子看到的是“西班牙怎么了”。他们开始反思国家、民族、文化、信仰、落后、欧洲化这些问题。乌纳穆诺这种人痛苦地问：西班牙的灵魂到底出了什么问题？科斯塔这种再生主义者则说：别再空谈帝国和荣耀了，西班牙真正需要的是学校、粮食、水利、土地改革。一个更偏精神反思，一个更偏现实改革。
但对普通人来说，1898年不是哲学问题。一个安达卢西亚农民可能根本不知道菲律宾在哪里，也不理解《巴黎条约》是什么。他知道的是，自己的儿子被征去古巴，然后死在那里。有钱人可以交钱免兵役，穷人交不起，所以去热带殖民地送死的大多是穷人家的孩子。他们很多不是被子弹打死，而是死于黄热病、疟疾、痢疾。战争结束后，那些活着回来的士兵瘦弱、生病、残废，像被帝国榨干后扔回来的废人。普通人看到这些人，心里想的不是“国家荣耀失败了”，而是“为什么死的是我们的孩子？”
所以1898年真正重要的地方在这里：它把西班牙所有旧问题都暴露出来了。政治上，复辟体制是假稳定，选举被操纵，普通人没有权力。经济上，西班牙仍然落后，南部大庄园问题没解决，工业只集中在少数地区。社会上，穷人承担战争代价，富人可以逃避。地区上，加泰罗尼亚、巴斯克、安达卢西亚、卡斯蒂利亚对“西班牙”的理解越来越不同。思想上，一部分人想改革、现代化、学习欧洲；另一部分人想守住天主教、王权、传统秩序。`,
  es9: `1898年以后，西班牙表面上还是那个"和平轮替"的体制，保守党和自由党轮流坐庄，选举是假的，cacique控制投票，普通人没有真正的政治权利。但水下面全是暗流。工人运动在崛起，无政府主义工会（CNT）和社会主义工会（UGT）代表了两种不同的反抗方式，无政府主义说不要政府不要政党自己组织起来，社会主义说要建一个工人的政党通过选举拿权力。在西班牙无政府主义比社会主义强，因为选举是假的，投了也白投，工人觉得不如直接罢工。加泰罗尼亚和巴斯克的民族主义也在这个时期兴起，加泰罗尼亚的民族主义建立在经济和文化上，"我们养活了西班牙但马德里不听我们的"，巴斯克的民族主义建立在种族和宗教上，创始人阿拉纳觉得巴斯克人是独特的种族，比西班牙人更纯。
1909年，巴塞罗那爆发了"悲剧周"，政府要从加泰罗尼亚征兵去摩洛哥打仗，工人暴动了，他们烧了大约80座教堂和宗教建筑。不是因为恨上帝，是因为恨教会，教会支持征兵、支持有钱人、控制教育不让穷人学会思考。几十年的阶级愤怒在这一周全部倒出来了。暴动被镇压后，一个无政府主义教育家费雷尔被当替罪羊枪毙了，他的"罪"是教穷人的孩子科学和思考，而不是教义和服从。全欧洲为他抗议，但在西班牙，权力者杀了他，因为他们害怕的正是"会思考的穷人"。
1921年，摩洛哥的安努瓦尔战役，西班牙军队被柏柏尔人打得惨败，几千到上万士兵死亡，指挥官傲慢无能，在沙漠里溃散。消息传回来，全国震惊，"我们连北非的部落都打不过了"。军队内部开始有人说"我们需要一个强人"。1923年，普里莫·德·里维拉将军搞了pronunciamiento，国王阿方索十三世接受了，让他当独裁者。普里莫是一个直率粗犷爱喝酒的人，不是思想家是行动者，他确实做了一些事，解决了摩洛哥问题、修了公路、建了水坝，但他也压制了工会、打压了加泰罗尼亚语、关闭了议会。1930年他失去支持，辞职流亡巴黎，几周后死在旅馆里，孤独地。阿方索十三世试图恢复议会制度但太晚了，没人信任他了，"你当年支持了独裁者"。
1931年4月14日，市政选举共和派在城市大胜，阿方索十三世没有反抗，他说"选举告诉我我已经失去了人民的爱"，然后离开了西班牙。没有流血，三色旗（红黄紫）出现在窗户上阳台上手里，人们在街上拥抱陌生人，一个老人哭了说"我等了一辈子"。第二共和国诞生了。
共和国试图做科斯塔想做的一切，建学校、分土地、改革军队、政教分离、给加泰罗尼亚自治、给女性投票权。最美的是"教育使团"，年轻的大学生志愿者带着书和留声机和电影放映机，骑着驴去最偏远的农村，给从未见过书的农民放电影、教识字、读诗。一个老人听了留声机里的音乐哭了，他说"我活了70年不知道世界上有这么美的声音"。共和国在两年里建了大约7000所新学校。克拉拉·坎波阿莫尔为女性投票权奋斗，最讽刺的是反对她的是她自己的左派同事，他们说女人会听神父的话投右派，坎波阿莫尔说"权利不能因为结果来决定，权利就是权利"，她赢了，但后来被自己的阵营抛弃，流亡死在瑞士，几乎被遗忘。
但改革太快，敌人太多，教会觉得共和国在毁灭信仰，军官觉得在羞辱军队，大庄园主觉得在抢地，卡洛斯派觉得是无神论政权，无政府主义者觉得改得太慢。土地改革极其缓慢，法律程序拖了几年，安达卢西亚的日工等了三年还是没有地。1933年卡萨斯·比耶哈斯，民防军对占地的农民开枪，共和国的警察在杀穷人，一个为穷人建立的政府杀了穷人。1933年右派赢得选举，停止了改革。1934年阿斯图里亚斯矿工起义被军队镇压，负责镇压的将军之一是佛朗哥，他从摩洛哥调来外籍军团和摩洛哥雇佣兵，镇压极其残酷。1936年2月人民阵线赢得选举，恢复改革，但社会已经极度两极化，街头暴力、政治暗杀每天都有，普通人被夹在中间不知道明天还能不能活着。7月13日右派领袖被杀，四天后7月17日摩洛哥的军队叛变了，内战开始了。`,
  es10: `这次政变和之前的pronunciamiento不同，共和国没有倒下。巴塞罗那的工人（主要是无政府主义者）从军营抢到了武器，在街头击败了叛军。如果巴塞罗那也被叛军拿下，战争可能几周就结束了。西班牙被切成了两半，共和派控制了大城市和工业区，叛军控制了农村和最好的军队（摩洛哥的外籍军团）。
佛朗哥在叛军内部怎么成为最高领袖，不是因为他最强或最聪明，是因为其他人都死了。政变的名义领袖桑胡尔霍飞机坠毁死了（据说因为带了太多行李包括他准备当国家元首穿的礼服，行李太重飞机载不动），策划者莫拉后来也死于飞机失事，负责巴塞罗那的戈德德被共和派抓住枪毙了。佛朗哥控制了最好的军队（摩洛哥外籍军团），而且他直接联系了希特勒和墨索里尼请求援助，德国飞机帮他把军队从摩洛哥空运到西班牙本土，这是历史上第一次大规模军事空运。1936年10月，他通过一次模糊的政治操作把"军事总指挥"的头衔变成了"国家元首"，可能是他弟弟在起草公告时偷偷改了措辞，其他将军被蒙了或者太忙于打仗没注意。他还把叛军内部的各个派系（卡洛斯派、长枪党、军队、教会）强制合并到一个组织里，自己当领袖。让每个派系都觉得"他是我们的人"，但实际上他只是自己的人。
德国派了"秃鹰军团"，几千名飞行员和技术人员带着最新的飞机来测试，西班牙的天空成了二战的预演场。意大利派了大约7万士兵直接参战。苏联支持共和国，送了武器和军事顾问，但要求共和国用黄金储备付款，大约510吨黄金被运到莫斯科再也没回来，而且斯大林还在共和区内部搞"清洗"，追杀托洛茨基主义者和一些无政府主义者。英国和法国宣布"不干预"，禁止向双方卖武器，但德国和意大利公开违反，"不干预"实际上只约束了共和国。大约3.5万来自53个国家的志愿者组成国际纵队自愿来西班牙为共和国而战，他们觉得"如果不在西班牙阻止法西斯，法西斯就会吞没全世界"。
1937年4月26日，格尔尼卡，巴斯克的一个小镇，市场日，下午4点半飞机来了，先投高爆炸弹再投燃烧弹，然后战斗机俯冲下来用机枪扫射逃跑的人包括女人和孩子，持续了3个小时，镇中心70%被摧毁。格尔尼卡没有任何军事目标，这是历史上第一次对平民城镇的系统性地毯式轰炸。毕加索用几周画了一幅3.5米高7.8米宽的巨画，黑白灰，没有色彩，因为"颜色太美了配不上这种恐怖"。马德里被围了将近三年（1936-1939），"No pasarán"（他们不会通过）成了口号，市民在轰炸下生活，地铁站变成防空洞，学校在地下上课，食物越来越少，猫和狗消失了，不是跑了是被吃了。乔治·奥威尔在巴塞罗那看到了无政府主义者的"革命"，工人管理工厂、所有人互称同志，然后共产主义者开始追杀他的战友，他差点被杀，逃出了西班牙，后来写了《1984》和《动物农场》，种子是在巴塞罗那种下的。
双方都做了可怕的事。叛军在控制的地区系统性地清洗，几万人在没有审判的情况下被枪毙。共和区也杀了大约7000名神职人员，烧了教堂。但规模和性质不同，共和区的暴行大部分是战争初期"失控的报复"，后来政府恢复了秩序基本停止了；佛朗哥的暴行是系统性的、有组织的、作为政策执行的、贯穿整场战争和战后。1939年初几十万共和派难民逃向法国，冬天，雪，带着孩子走路翻越比利牛斯山，法国把他们关进海滩上的"集中营"，铁丝网围起来，没有帐篷，在沙滩上挖洞躲风，法国对待西班牙难民的方式极其恶劣。1939年4月1日佛朗哥宣布"战争结束了"，大约50万人死亡，几十万人流亡，几十万人被关进监狱。
佛朗哥这个人，矮，大约1.64米，声音又高又细，演讲让人睡着，和希特勒墨索里尼完全不同。他妈妈极度虔诚，爸爸放荡抛弃了家庭，他像妈妈不像爸爸，不喝酒不赌博自律虔诚。他的两个核心特质是运气（在摩洛哥战争中旁边的人一个个死了他没死，他开始相信"上帝在保护我"）和耐心（从不做没把握的事，永远在等，等到别人犯错再出手）。他不是一个意识形态者，他是一个生存者。他统治了36年（1939-1975），方式是在所有派系之间"平衡"，让每个人都不完全满意但都能忍受。晚上他画水彩画，画小船和海景，画得不好但很认真，一个签了几万人死刑令的人晚上在家画小船。
战后他搞了系统性的"白色恐怖"，几万人被处决，几十万人被关进监狱，被怀疑支持共和国的教师被剃光头在街上被迫走让所有人看到，有些女人还被迫喝蓖麻油让她们在公开场合腹泻，这是设计过的、系统性的羞辱。墨西哥总统卡德纳斯向西班牙难民打开大门，大约2万到2.5万人去了墨西哥，知识分子、教师、医生，西班牙失去的人才墨西哥得到了。墨西哥一直拒绝承认佛朗哥政权直到他死后。
二战的时候佛朗哥走钢丝，他欠希特勒和墨索里尼的情但西班牙打不起仗了。1940年他和希特勒见面，希特勒要他进攻直布罗陀，佛朗哥用了他最擅长的武器，拖延，他没说不，他说"我需要条件"然后列了一个不可能满足的清单。希特勒后来说"我宁愿拔掉三四颗牙也不愿再和他谈"。佛朗哥没有正式参战但派了"蓝色师团"去帮德国打苏联，包装成"反共十字军"，不是帮德国是打共产主义。1943年看到德国在输就把人撤回来了，谁赢跟谁谁输就离开。
1940-1950年代是"饥饿的年代"，经济崩溃、国际孤立、配给制、黑市，全国都在违法因为不违法就饿死。1953年美国因为冷战需要军事基地和佛朗哥签了协议，佛朗哥从"国际弃儿"变成了"冷战盟友"，没有改变任何政策只是因为他"反共"。1960年代经济奇迹，旅游业爆发、工业化加速、SEAT 600成了"国民车"、冰箱电视洗衣机进入普通家庭、农村人口大规模进城，你可以买冰箱但不能批评政府，经济自由加政治不自由。佛朗哥禁止加泰罗尼亚语和巴斯克语在公共场合使用，如果你在街上说加泰罗尼亚语警察可能说"说基督徒的话"。ETA就是在这种压制下从文化运动变成了武装组织，"既然你不让我们说自己的语言我们就用炸弹说话"。1973年ETA暗杀了佛朗哥的接班人卡雷罗·布兰科，炸弹把他的汽车炸飞到了五层楼高越过建筑落到另一边，西班牙人用黑色幽默说他是"西班牙第一个宇航员"。`,
  es11: `1975年11月20日佛朗哥死了，83岁，在医院被机器维持了几周。所有人以为接下来会是另一次独裁或内战，但发生了"奇迹"。胡安·卡洛斯，佛朗哥亲手培养的继承人，选择了民主。他装了几十年"忠诚顺从"，等佛朗哥死了才翻牌。他选了苏亚雷斯当首相，一个在佛朗哥体制内长大的人，但苏亚雷斯决定"从内部拆掉这个体制"。苏亚雷斯做了一件不可思议的事，他让佛朗哥的议会投票解散了自己，一个独裁体制的议会以压倒性多数投票消灭了自己。他一个一个地和几百个议员私下谈，了解每个人怕什么，给每个人不同的安慰，"你不会被追究""你可以成为推动民主的人历史会记住你"。1977年他还冒着军队政变的风险让共产党合法化，选在复活节周末宣布因为很多军官放假不在马德里。共产党领袖卡里略也做了让步，接受君主制、放弃三色旗。两边都让了一步。
1977年6月15日，41年来第一次自由选举，一个70岁的老太太走进投票站手在抖，出来的时候哭了，她上一次投票是1936年。1978年宪法通过，立宪君主制、议会民主、人权保障、自治区制度。但和平的代价是"遗忘的协议"，不追究过去，不审判加害者，不打开万人坑，"向前看不向后看"。1981年2月23日，特赫罗中校带兵冲进议会朝天花板开枪喊"所有人趴下"，三个人没有趴下，苏亚雷斯、古铁雷斯将军、卡里略，凌晨1点国王穿军装上电视命令军队回兵营，政变失败了。1982年社会主义工人党通过选举上台，民主被"巩固"了，7年之内从独裁变成了民主，没有革命没有内战。
苏亚雷斯后来得了阿尔茨海默症，那个设计了民主转型的大脑开始遗忘一切，2014年死了，82岁。胡安·卡洛斯晚年陷入丑闻，猎大象、情妇、海外秘密账户，"保卫民主的英雄"变成了"利用王位搞腐败的人"，2020年流亡阿布扎比至今。权力腐蚀了他，几十年没有制衡没有后果，慢慢地从小特权到大腐败。
1986年加入欧洲，不只是经济协议是身份转变，"我们终于是欧洲的一部分了"。1992年巴塞罗那奥运会向世界展示了新西班牙。但旧问题没消失，ETA继续杀人直到2011年才永久停火（829人被杀）。2017年加泰罗尼亚独立公投，根源在1714年，300年的伤口还没愈合。2007年和2022年"历史记忆法"开始打开万人坑，75年来第一次有人在阳光下为被枪毙的亲人哭泣。2019年佛朗哥的遗体从"烈士谷"移走，在门口两群人面对面，一群喊"佛朗哥万岁"一群喊"法西斯主义永不再来"，"两个西班牙"到今天还在。
西班牙经济从1960年代的"经济奇迹"到1986年加入欧洲后大量资金涌入建设基础设施，到1999年加入欧元区后借钱变得极其便宜引发房地产泡沫，西班牙每年建的房子比德法英加起来还多，整个经济建在"砖头"上。2008年泡沫破了，失业率飙到26%，年轻人失业率超过55%，几十万家庭被银行赶出房子，失去房子但没失去债务。恢复很慢，到今天失业率仍然是欧洲最高之一（11-12%），年轻人失业率接近28%。经济过度依赖旅游和房地产，阳光和砖头，没有像德国那样的制造业或美国那样的科技业。从1492年到今天，西班牙的经济一次又一次依赖"外部输入"，白银、旅游、欧盟资金，而不是"内部创造"。几百年的历史，贵族文化鄙视商业、驱逐了有技能的人、大庄园制度、教育不够，决定了它的"经济基因"。`,
};

  { ch:'pt3', year:'1139', title:'葡萄牙宣布独立', tags:['politics'], hi:1, desc:'阿方索·恩里克斯打败自己的母亲后自立为王。1143年被承认，1179年教皇确认。' },
  { ch:'pt4', year:'1249', title:'国土定型', tags:['politics'], hi:1, desc:'拿下最南端阿尔加维。葡萄牙边界从此800年不变——被大西洋和西班牙卡住，只能往海上看。' },
  { ch:'pt4', year:'~1280', title:'迪尼斯一世的远见', tags:['politics','economy'], hi:1, desc:'在位46年。确立葡萄牙语为官方语言，建科英布拉大学，种了松树林——200年后成为造船木材。' },
  { ch:'pt4', year:'1385', title:'阿尔茹巴罗塔战役', tags:['war'], hi:1, desc:'6500对30000。25岁的将军努诺用英式战术击败西班牙。没有这场胜利就没有葡萄牙。温莎条约与英国结盟至今。' },
  { ch:'pt5', year:'1415', title:'征服休达', tags:['war'], hi:1, desc:'欧洲第一次跨海征服非欧洲城市。亨利王子在此看到了穆斯林的贸易地图，决定从海上绕过去直达黄金。' },
  { ch:'pt5', year:'1444', title:'奴隶贸易开端', tags:['society'], hi:1, desc:'第一批235名非洲黑奴被运回葡萄牙拍卖，亨利王子亲自在场。航海组织者和奴隶贸易奠基人，两件事都是真的。' },
  { ch:'pt5', year:'1498', title:'达伽马到达印度', tags:['economy'], hi:1, desc:'绕过好望角直达印度。12年间葡萄牙把船开到地球四个角落。100万人口管着半个地球的贸易。' },
  { ch:'pt6', year:'1578', title:'塞巴斯蒂昂的灾难', tags:['war'], hi:1, desc:'24岁国王带几乎所有贵族去摩洛哥打仗，全军覆没。"塞巴斯蒂昂主义"持续300年。两年后被西班牙吞并。' },
  { ch:'pt6', year:'1640', title:'从西班牙独立', tags:['politics'], hi:1, desc:'趁西班牙忙于加泰罗尼亚叛乱造反独立。但60年里荷兰已抢走亚洲大部分据点，回不到从前了。' },
  { ch:'pt7', year:'1703', title:'梅修因条约', tags:['economy'], hi:1, desc:'英国产品自由进入葡萄牙市场。葡萄牙用巴西的金子买英国的布——黄金中转站，什么都没留下。' },
  { ch:'pt7', year:'1755', title:'里斯本大地震', tags:['society'], hi:1, desc:'万圣节8.5级地震+海啸+大火，80%城毁。伏尔泰质疑上帝。庞巴尔侯爵用抗震建筑重建——世界首次大规模抗震规划。' },
  { ch:'pt8', year:'1808', title:'王室逃往巴西', tags:['politics'], hi:1, desc:'全世界独一无二——把整个政府搬到殖民地。里约热内卢成为帝国首都。巴西化的王室让巴西几乎不流血就独立了。' },
  { ch:'pt8', year:'1928', title:'萨拉查上台', tags:['politics'], hi:1, desc:'经济学教授一年平衡预算后待了36年。不让葡萄牙工业化，要"保持简单和虔诚"。终身未婚极度简朴，不腐败也不允许改变。' },

  { ch:'es4', year:'~950', title:'科尔多瓦鼎盛', tags:['society'], hi:1, desc:'人口50万，西欧最大城市。路灯比英国早500年，下水道比伦敦早900年。图书馆40万册，全西欧加起来不到1万。' },
  { ch:'es4', year:'1085', title:'攻陷托莱多', tags:['war','society'], hi:1, desc:'基督徒发现大量阿拉伯语书籍。托莱多成为中世纪欧洲最重要翻译中心——亚里士多德通过这里进入拉丁世界。' },

  { ch:'es5', year:'1492.1', title:'格拉纳达投降', tags:['war','politics'], hi:1, desc:'最后的穆斯林国王骑马离开时回头看阿尔罕布拉，哭了。他妈妈说："像女人一样哭你不能像男人一样守住的东西。"' },
  { ch:'es5', year:'1492.3', title:'驱逐犹太人', tags:['society'], hi:1, desc:'四个月内改信或离开。15-20万犹太人面对选择。奥斯曼苏丹说：费迪南德是个傻子。' },

  { ch:'es5', year:'1545', title:'秘鲁大银矿', tags:['economy'], hi:1, desc:'世界最大银矿。白银涌入导致通货膨胀，但西班牙不发展制造业。白银像水流过没有留下。' },
  { ch:'es6', year:'1556', title:'腓力二世继位', tags:['politics'], hi:1, desc:'统治全球帝国42年。每天阅读批示文件，建造埃斯科里亚尔宫——石头做的祈祷机器。' },
  { ch:'es6', year:'1580', title:'吞并葡萄牙', tags:['politics'], hi:1, desc:'帝国巅峰——一夜之间得到另一个全球帝国。但对葡萄牙是被控制的开始。' },
  { ch:'es6', year:'1588', title:'无敌舰队失败', tags:['war'], hi:1, desc:'130艘船只约67艘回来。大部分不是死于战斗是死于风暴。打破了西班牙海上神话。' },
  { ch:'es6', year:'1640', title:'双重危机', tags:['politics'], hi:1, desc:'加泰罗尼亚起义投靠法国，同年葡萄牙趁机独立。胖子伯爵用命令解决需要协商的问题的后果。' },
  { ch:'es6', year:'1700', title:'哈布斯堡绝嗣', tags:['politics'], hi:1, desc:'查理二世——近亲结婚的产物，下巴畸形嘴合不上，被叫"被施了魔法的人"。结两次婚都没孩子。' },
  { ch:'es7', year:'1700', title:'波旁王朝入主', tags:['politics'], hi:1, desc:'法国路易十四的孙子继承西班牙。14年王位继承战后确立。波旁家族统治西班牙至今。' },
  { ch:'es7', year:'~1760', title:'查理三世改革', tags:['politics'], hi:1, desc:'"马德里最好的市长"。学到了教训——对的事情用错的方式做比不做更糟。下午雷打不动去打猎。' },
  { ch:'es7', year:'1805', title:'特拉法加海战', tags:['war'], hi:1, desc:'西班牙海军彻底终结。纳尔逊用革命性战术取胜后阵亡。西班牙再也没有重建过真正的海军。' },
  { ch:'es8', year:'1808.5.2', title:'马德里起义', tags:['war'], hi:1, desc:'屠夫带切肉刀、女人带热锅油冲向法国兵。第二天平民被排成一排射杀。戈雅画下了这两天。' },
  { ch:'es8', year:'1812', title:'第一部宪法', tags:['politics'], hi:1, desc:'在被围困的城市里，代表们在敌人炮火下讨论什么是自由。国家主权属于人民，三权分立。' },
  { ch:'es8', year:'1825', title:'美洲殖民地独立', tags:['politics'], hi:1, desc:'除古巴和菲律宾外全部独立。费迪南七世废宪法、关大学——"大学是叛乱的温床"。' },
  { ch:'es9', year:'1898', title:'美西战争', tags:['war'], hi:1, desc:'失去古巴、波多黎各、菲律宾。帝国最后外衣被扒掉。有钱人交钱免兵役，穷人的孩子去热带送死。' },
  { ch:'es9', year:'1931.4.14', title:'第二共和国', tags:['politics'], hi:1, desc:'人们在街上拥抱陌生人。教育使团骑驴去农村教识字。一个老人听了留声机哭了："活了70年不知道有这么美的声音。"' },
  { ch:'es10', year:'1936.7.17', title:'内战爆发', tags:['war'], hi:1, desc:'巴塞罗那工人从军营抢到武器击败叛军——否则战争几周就结束了。佛朗哥成为领袖因为其他人都死了。' },
  { ch:'es10', year:'1937.4.26', title:'格尔尼卡轰炸', tags:['war'], hi:1, desc:'对平民小镇地毯式轰炸3小时。毕加索画了黑白灰巨画——"颜色太美了配不上这种恐怖"。' },
  { ch:'es10', year:'1939–1975', title:'佛朗哥统治36年', tags:['politics'], hi:1, desc:'矮，1.64米，声音又高又细。核心特质：运气和耐心。签了几万人死刑令，晚上画水彩小船。' },
  { ch:'es11', year:'1975.11.20', title:'佛朗哥去世', tags:['politics'], hi:1, desc:'所有人以为接下来是独裁或内战。胡安·卡洛斯——装了几十年忠诚的继承人——翻牌选择了民主。' },
  { ch:'es11', year:'1977.6.15', title:'第一次自由选举', tags:['politics'], hi:1, desc:'苏亚雷斯让佛朗哥的议会投票解散了自己。70岁老太太走进投票站手在抖，出来时哭了。' },
  { ch:'es11', year:'1981.2.23', title:'政变失败', tags:['politics','war'], hi:1, desc:'特赫罗冲进议会开枪——三个人没趴下。国王凌晨上电视命令军队回营。7年从独裁到民主。' },

let countryMode = 'summary';
let activeCountry = null;

function openCountryHistory(key, title, timeRange, chapters, events, fullText) {
  activeCountry = { key, title, timeRange, chapters, events, fullText };
  const page = document.getElementById('country-history-page');
  // Set title
  page.querySelector('.ch-title-text').textContent = title;
  page.querySelector('.ch-time-range').textContent = timeRange;
  page.style.display = 'block';
  document.body.style.overflow = 'hidden';
  countryMode = 'summary';
  document.getElementById('ch-mode-summary').classList.add('active');
  document.getElementById('ch-mode-full').classList.remove('active');
  buildCountryNav();
  renderCountryContent();
  setTimeout(() => setupCountryScrollSpy(), 100);
}

function closeCountryHistory() {
  document.getElementById('country-history-page').style.display = 'none';
  document.body.style.overflow = '';
  // Clear nav stack when manually closing (not when jumping)
  if(!_navStack.length) {
    var btn = document.getElementById('nav-return-btn');
    if(btn) btn.style.display = 'none';
  }
}

function setCountryMode(mode) {
  countryMode = mode;
  document.getElementById('ch-mode-summary').classList.toggle('active', mode==='summary');
  document.getElementById('ch-mode-full').classList.toggle('active', mode==='full');
  renderCountryContent();
}

function buildCountryNav() {
  if(!activeCountry) return;
  const nav = document.getElementById('country-chapter-nav');
  nav.innerHTML = '<div class="usa-nav-label">章节导航</div>' +
    activeCountry.chapters.map((c,i) =>
      `<button class="usa-ch-btn${i===0?' active':''}" data-ch="${c.id}" onclick="scrollToCountryChapter('${c.id}',this)">
        <span class="ch-num">${c.num}</span>${c.title}
      </button>`
    ).join('');
}

function scrollToCountryChapter(chId, btn) {
  const el = document.getElementById('ch-' + activeCountry.key + '-' + chId);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  document.querySelectorAll('#country-chapter-nav .usa-ch-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}


// === GLOSSARY — 有观点的注解 ===
const GLOSSARY = {
  '腓尼基人':'地中海东岸（今黎巴嫩）的航海商人。他们极其纯粹——不建帝国不打仗，只做生意。发明了字母文字让交易更高效。他们是迦太基的祖先，也间接催生了整个大航海时代的商业逻辑。',
  '迦太基':'腓尼基人在北非建的殖民城市，后来变成了海上帝国。继承了祖先的商业基因但加了军事化——可以理解为一个"从贸易公司转型为军事集团"的文明。和罗马打了三次布匿战争，最终被彻底摧毁。',
  '汉尼拔':'迦太基最传奇的将军。9岁在神庙发誓一生和罗马为敌，26岁带10万人和战象翻越阿尔卑斯山。他打赢了每一场仗，却输掉了战争——因为他太自信，不做情报工作，等着别人来投靠而不是主动争取。勇气满分，细致不及格。',
  '克星':'罗马将军西庇阿·阿非利加努斯。24岁时没人愿意去伊比利亚，他站出来了。和汉尼拔最大的区别：他做情报工作。一天攻下新迦太基，靠的不是蛮力而是找到了后门。放走人质不是善良而是战略——"让你的敌人变成你的盟友"。',
  '凯尔特人':'从中欧迁来的民族，带着青铜武器翻过比利牛斯山。他们和本地人慢慢混在一起，住在山顶的被罗马人叫做加利西亚人和卢西塔尼亚人——但这些标签是罗马人贴的，不是他们自己选的。',
  '卢西塔尼亚人':'罗马人给伊比利亚西部部落的称呼。葡萄牙人的祖先之一。用游击战抵抗罗马两百年——打不过你的正规军，但你也抓不住我。',
  '维里亚托斯':'罗马屠杀三万卢西塔尼亚人的幸存者。回去后联合各部落，用游击战打赢了四届罗马将军。最后被自己身边三个被收买的人杀死。罗马拒绝付赏金——"罗马不向弑君者付钱"——杀了人还要占道德高地。',
  '西哥特人':'日耳曼难民变成罗马雇佣兵变成伊比利亚统治者。他们的故事像一面镜子——被匈人逼走求罗马收留，被罗马剥削到要卖孩子换面包，最后起义洗劫了罗马城。在伊比利亚统治了300年，最终因为内斗被穆斯林一天打垮。',
  '阿里乌派':'基督教的一个分支，认为耶稣不等于上帝。就这么一个神学分歧，让西哥特人和本地罗马人隔了一道墙200年。直到一个国王杀了自己改信天主教的大儿子后临终悔悟，让小儿子完成了统一信仰。',
  '莫扎拉布人':'穆斯林统治下保留了基督教但被阿拉伯化的本地人。说阿拉伯语穿阿拉伯衣服但去教堂。他们的焦虑是：我们的后代越来越像阿拉伯人了，我们的文化在消失。有些人用故意去街上骂穆罕默德求被处死的方式来"唤醒"同胞。',
  '摩里斯科人':'1502年被强制改信基督教的穆斯林后裔。改了信100年还是不被接受。1609年30万人被全部驱逐——到了北非也不被当成真穆斯林。在哪里都不被接受的人。瓦伦西亚因此从繁荣变成萧条。',
  '宗教裁判所':'双王建的"信仰纯度检测机"。存在356年审了15万人烧了几千人。本质上是思想控制工具——不是查你信不信上帝，是查你有没有偏离官方版本的上帝。',
  '布匿战争':'罗马和迦太基的三轮终极对决（前264-前146）。第一轮罗马拿了西西里，迦太基被逼去伊比利亚找新基地。第二轮汉尼拔翻阿尔卑斯山。第三轮罗马直接把迦太基城从地图上抹掉。',
  '收复失地运动':'基督教王国用了近800年从穆斯林手里一块一块拿回伊比利亚。不是一场战争，是一种生活方式——打一下停一下再打一下，中间还互相通婚做生意。',
  '泰法王国':'科尔多瓦哈里发崩溃后分裂出的30多个穆斯林小国。每个都想当小科尔多瓦——文化繁荣但军事无能。被北部基督教国家当提款机勒索保护费。',
  '恩科米恩达':'西班牙殖民地的"文明教化"制度。理论上你保护原住民教他们信上帝，实际上是每天工作16小时的奴役。理论和现实之间的距离可以杀死几百万人。',
  '哈布斯堡':'通过联姻拿到半个欧洲的王朝。他们的格言是"让别人打仗吧，你去结婚"。在西班牙统治了184年，最后因为近亲结婚太多——查理二世连嘴都合不上——被遗传学终结了。',
  '波旁王朝':'从法国来的王朝。1700年继承西班牙到今天——现任国王还是波旁家族。带来了中央集权改革，代价是强制取消了加泰罗尼亚等地的自治权。',
  '无政府主义':'在别的国家是边缘思想，在西班牙变成了大众运动。因为西班牙人对"政府"这个概念就没信任过——选举是假的，国王是坏的，教会是骗的，不如我们自己管自己。',
  'pronunciamiento':'西班牙特色的军事政变。不一定推翻政权，更像公司里换CEO——军队站出来说这个不行了换一个。19世纪频繁到像换季一样。',
  '科尔多瓦':'穆斯林时期的伊比利亚首都。10世纪人口50万，路灯比英国早500年，下水道比伦敦早900年，图书馆40万册全西欧加起来不到1万。当欧洲在黑暗中世纪的时候，这里已经是文明的灯塔。',
  '格拉纳达':'最后的穆斯林王国。所有被征服城市的知识分子艺术家逃到这里——一个正在被压缩的文明把全部精华浓缩在最后一个角落。他们建了阿尔罕布拉宫，用最普通的材料做出最精美的艺术。',
  '阿尔罕布拉':'格拉纳达的宫殿群。没有奢华大理石，用旧木头和灰泥做出了伊斯兰建筑最高成就。像一个穷人家的手工书架——技艺弥补了材料的不足。最后一个国王离开时回头看它在阳光下发红，哭了。',
  '图拉真':'第一个伊比利亚出生的罗马皇帝。是"五贤帝"制度的开创者——不传给儿子，选最合适的人继承。这个制度让罗马好了近一百年，直到马可·奥勒留打破它把位置给了自己儿子。',
  '奥古斯都':'罗马第一位皇帝。公元前19年最终征服伊比利亚，建了银之路贯穿南北。沿路长出城市，最大的是梅里达。他把伊比利亚从一堆部落变成了罗马的后院。',
  '查理五世':'同时是西班牙国王、神圣罗马皇帝、尼德兰和美洲的统治者——人类历史上个人领土最大。他的人生像一场永不结束的会议。55岁退位去修道院修钟表——一个掌握过半个地球的人最后的爱好是修钟表。',
  '腓力二世':'查理五世的儿子。每天批阅文件12小时，建了埃斯科里亚尔宫像一座石头祈祷机器。派无敌舰队打英国失败。把西班牙推到巅峰也让它开始衰落。最后几个月全身脓疮换床单时因疼痛尖叫活了53天。',
  '佛朗哥':'矮（1.64米）声音又高又细的独裁者。成为领袖不是因为最强，是因为其他人都死了。核心技能：运气和耐心。统治36年，晚上画水彩小船。希特勒说"我宁愿拔三四颗牙也不愿再和他谈"。',
  '苏亚雷斯':'让佛朗哥的议会投票消灭了自己——一个不可思议的政治操作。一个一个私下谈了几百个议员。后来得了阿尔茨海默症——那个设计了民主转型的大脑遗忘了一切。',
  '亨利王子':'航海家亨利。42年间自己几乎不出海但一艘艘派船探索非洲。同时是航海组织者和奴隶贸易奠基人——两件事都是真的。你不能只记住一半。',
  '伊莎贝拉':'卡斯蒂利亚女王。完成收复失地、驱逐犹太人、资助哥伦布——1492年三件事同一年。她想要一个纯粹的天主教国家，为此不惜消灭一切多元性。从她的角度来说她成功了。',
  '庞巴尔侯爵':'1755年里斯本地震后用方格街道和抗震建筑重建——世界首次大规模抗震城市规划。同时也是铁腕独裁者。做对事的人不一定是好人。',
  '萨拉查':'葡萄牙独裁者。经济学教授出身。刻意不让国家工业化要"保持简单和虔诚"。终身未婚极度简朴不腐败——但也不允许任何改变。把国家冻在了过去。',
  '康乃馨革命':'1974年4月25日。电台播了一首被禁的歌，军队行动几小时结束。卖花女把康乃馨插进枪管。48年独裁终结几乎没流血——历史上最优雅的革命之一。',
  '拉斯卡萨斯':'从标准殖民者变成原住民权利捍卫者——一个修士的布道改变了他。但他同情原住民的替代方案是用非洲人替代。晚年写"我后悔了但一切太晚了"。善良的人也会做出可怕的事。',
  '戈雅':'西班牙画家。44岁耳聋后被封在无声世界里，开始看人性深处。他的《战争灾难》不分好人坏人画了双方的暴行。最后一幅写着"真相已死"。',
  'saudade':'葡萄牙语独有的词。对失去之物的怀念，但不是苦涩的——带着甜美的诗意的温暖的悲伤。一个花600年建成全球帝国又花400年失去一切的国家发明了这个词.',
  '阿方索六世':'莱昂-卡斯蒂利亚国王。1085年攻下托莱多（穆斯林首都），在边境划出一块地交给女儿和女婿——这块地后来变成了葡萄牙。',
  '费迪南德':'阿拉贡国王，伊莎贝拉的丈夫。擅长军事和政治操作，据说是马基雅维利写《君主论》的原型。两人组合：她管信仰，他管打仗。',
  '哥伦布':'找葡萄牙被拒（人家算出他的地球尺寸是错的），找西班牙等了六年。他至死坚信自己到了亚洲。第一眼看到泰诺人就写"用50个人就能征服他们全部"。',
  '拿破仑':'法国皇帝。把西班牙父子骗到法国逼退位，让自己哥哥当西班牙皇帝。入侵伊比利亚催生了游击战这个词，也间接导致了美洲殖民地独立。',
  '银之路':'罗马人建的贯穿伊比利亚南北的运输路线，主要运金属。沿路长出一座座城市，最大的是梅里达。经济动脉决定了城市的位置。',
  '大航海时代':'15-17世纪欧洲人用船探索并殖民全球的时期。葡萄牙和西班牙是先驱，后来被荷兰和英国超越——因为他们只做中间商不搞制造业。',
  '游击战':'guerrilla，西班牙语"小战争"。拿破仑入侵西班牙时农民发明的——白天卖你面包晚上拿枪打你。这个词从此进入了全世界的军事词汇。',
  '托莱多':'穆斯林时期的伊比利亚首都之一。1085年被基督徒攻下后，城里的阿拉伯语书籍被翻译成拉丁语——亚里士多德就是通过这里回到欧洲的。',
  '梅里达':'银之路上最大的城市，罗马人建的行政中心。有罗马广场、神庙、剧场、浴场。从这里分出两条支线——一条去里斯本，一条去布拉加。',
  '巴塞罗那':'加泰罗尼亚的首都。西班牙工业化最早的城市，纺织业中心。无政府主义运动的大本营。1937年奥威尔在这里差点被杀，后来写了《1984》。',
  '加泰罗尼亚':'西班牙东北部。工业最发达最富裕的地区之一，有自己的语言和文化认同。1714年失去自治权，300年后的2017年还在搞独立公投——伤口没愈合。',
  '巴斯克':'伊比利亚北部的民族。几乎没被任何征服者真正管制过。语言和任何已知语言都没关系。ETA武装组织就是在佛朗哥压制巴斯克语的背景下诞生的。',
  '马可·奥勒留':'写《沉思录》的罗马皇帝，"五贤帝"最后一位。讽刺的是——一个写了人类最伟大哲学著作的人，在行为上打破了选贤继承的传统，把皇位给了自己不争气的儿子。',
  '康茂德':'马可·奥勒留的儿子。18岁继位，6个月撤军回罗马享乐。统治12年把罗马空心化——给军队喂蜂蜜、给百姓免费娱乐、培养保护自己的黑社会。他死后禁卫军拍卖皇位。',
  '科尔特斯':'500人征服阿兹特克帝国的西班牙征服者。靠的不是武力而是利用内部矛盾——几万仇恨阿兹特克的部落帮他打仗。加上天花瘟疫。',
  '五贤帝':'罗马连续五位好皇帝（涅尔瓦、图拉真、哈德良、安东尼·庇护、马可·奥勒留）。共同模式：不传给儿子，选最适合的人收为养子继承。这个制度好了近一百年。',
  '倭马亚王朝':'伊斯兰教早期统治王朝。被推翻时遭遇灭族晚餐——一个王子游过河活了下来，五年后到伊比利亚建立了科尔多瓦独立政权。',
  '哈德良':'图拉真之后的罗马皇帝。风格是维稳——做能力范围内的事。环游帝国12年，在埃及爱上了一个男孩。罗马"五贤帝"之一。',
  '阿尔布开克':'葡萄牙印度洋帝国建造者。战略是控制咽喉点——霍尔木兹、果阿、马六甲——不占大片土地只卡贸易路线收过路费。所有现代殖民帝国都是他发明的模式的延续。',
  '若昂一世':'葡萄牙新王朝的开创者。本是私生子，靠里斯本平民起义上位。阿尔茹巴罗塔战役6500打30000保住了葡萄牙的独立。和英国签了温莎条约至今640年。',
  '安达卢斯':'穆斯林统治下的伊比利亚的阿拉伯语名称。鼎盛时期是欧洲最先进的文明，图书馆比全西欧加起来还多。今天西班牙南部的安达卢西亚这个名字就来自这里。',
  '卡斯蒂利亚':'西班牙中部的核心王国。收复失地运动的主力，后来和阿拉贡联合形成了统一的西班牙。承担了帝国大部分的税收和兵源——农民最怕干旱，第二怕税官。',
  '阿拉贡':'西班牙东部的王国。费迪南德的地盘。和卡斯蒂利亚联合后形成统一西班牙，但保留了自己的法律——直到波旁王朝来了强制统一。',
  '戈多伊':'查理四世妻子的情人，从皇家卫队的年轻帅哥变成了西班牙实际掌权者。让西班牙和拿破仑结盟，最终导致了特拉法加海战的灾难。',
  '胡安·卡洛斯':'佛朗哥亲手培养的继承人。装了几十年忠诚顺从等佛朗哥死了才翻牌选择民主。晚年陷入猎象、情妇、秘密账户丑闻——权力腐蚀了他，2020年流亡至今。',
  '迪尼斯一世':'葡萄牙最有远见的国王之一。在位46年。用葡萄牙语写诗定为官方语言，建了大学，种了松树林——200年后这些树变成了造船的木材。种树的人不知道未来会需要船。',
  '伊本·鲁世德':'欧洲人叫他阿威罗伊。法官世家出身，系统注释了亚里士多德全部著作。核心思想：理性和信仰可以分开。被中世纪基督教最伟大的哲学家引用超过500次。',
  '费迪南七世':'西班牙最被厌恶的国王之一。"恶意的精明"——先让你信任然后背叛你。废宪法、关大学、建密探网络鼓励互相举报。把一切进步都推回去。',
  '查理三世':'西班牙"最好的市长"。丑但不在乎，下午雷打不动去打猎。学到了前人没学到的教训——对的事情用错的方式做比不做更糟。不追求伟大，只追求"比昨天好一点"。',
  '查理二世':'哈布斯堡近亲结婚的最终产物。2岁才走路，8岁不能穿衣服，下巴畸形嘴合不上。被叫"被施了魔法的人"。结两次婚没孩子。他的存在本身就是血统纯洁执念的讽刺。',
  '腓力三世':'懒到把所有事务交给宠臣莱尔马公爵。莱尔马极度腐败但确实"管事"。1609年驱逐30万摩里斯科人——找一群不够纯的人赶走好像国家就会重新强大的古老政治把戏。',
  '腓力四世':'喜欢艺术和女人（据说30多个私生子）多过喜欢管国家。临死前说"上帝给了我这么大一个帝国但我没有一刻不在受苦"。他唯一活下来的合法继承人是近亲结婚的查理二世。',
  '比利牛斯山':'欧洲西南部的山脉，是法国和西班牙的天然国界。伊比利亚半岛通过这座山和欧洲大陆相连。历史上无数民族翻过这座山进入伊比利亚——凯尔特人、日耳曼人、穆斯林、拿破仑。',
  '直布罗陀':'伊比利亚半岛最南端的海峡，非洲和欧洲之间只有14公里宽。711年穆斯林就是从这里渡海进入伊比利亚的。1704年被英国占领至今——西班牙一直想要回来。',

  '新教':'16世纪从天主教分裂出来的基督教各派。马丁·路德发起。荷兰叛乱和英西冲突的背景之一——腓力二世视新教为国家安全威胁。',
  '哈里发':'伊斯兰世界的最高宗教和政治领袖，被视为先知穆罕默德的继承人。科尔多瓦的统治者自称哈里发，意味着不承认巴格达的权威。',
  '柏柏尔人':'北非原住民族群。穆斯林征服伊比利亚时的主要军事力量。后来的阿尔莫拉维德和阿尔摩哈德也是柏柏尔人建立的王朝。',
  '通货膨胀':'货币贬值导致物价上涨。西班牙因为美洲白银大量涌入导致16世纪物价涨了4-5倍。有银子但不生产东西——钱多了东西没多，价格就上去了。',
  '大庄园制':'安达卢西亚等南部地区的土地制度。少数贵族拥有巨大的庄园，大量农民是日工（每天排队等被雇）。土地集中→贫富悬殊→社会动荡。这个问题从罗马时代到今天都没完全解决。',
  '神圣罗马帝国':'中欧的松散政治实体（962-1806），包括德国、奥地利、捷克等。伏尔泰说它"既不神圣，也不罗马，更不是帝国"。查理五世当选过它的皇帝。',
  '荷兰叛乱':'尼德兰（今荷兰+比利时）反抗西班牙统治的战争（1568-1648），打了整整80年。荷兰独立后变成17世纪最有活力的国家——接纳了被西班牙赶走的商人工匠和资本。',
  '三权分立':'立法、行政、司法三种权力分开制衡。1812年西班牙宪法写入了这个原则——在被围困的城市里，代表们在炮火下讨论什么是自由。',
  '日耳曼人':'对北欧和中欧多个部落的统称——西哥特人、汪达尔人、苏维汇人等都是日耳曼人。罗马帝国晚期他们大规模迁徙，最终导致西罗马帝国灭亡。',
  '纳斯里王朝':'格拉纳达的统治王朝（1238-1492）。在基督教国家的包围中靠外交游走活了250年。23个国王中很多被自己亲属废掉或杀死。建造了阿尔罕布拉宫。',
  '梅修因条约':'1703年英国和葡萄牙签的贸易条约。英国产品自由进入葡萄牙→葡萄牙用巴西黄金买英国货→黄金流向英国资助工业革命→葡萄牙什么都没留下。经济依附的教科书案例。',
  '法里内利':'18世纪最著名的阉人歌手。被请来给抑郁的腓力五世唱歌——唱了以后国王几个月来第一次从床上坐起来。同样的四首歌唱了十年。',
  '血统纯洁':'驱逐犹太人后西班牙社会的执念。必须证明没有犹太或穆斯林祖先才能上大学、当官、加入教会。整个社会变成"互相查血统"的监视系统。',
  '温莎条约':'1386年英国和葡萄牙签的同盟条约。到今天640年没断过——世界上持续时间最长的军事同盟。阿尔茹巴罗塔战役后签的。',
  '泰诺人':'加勒比海地区的原住民。哥伦布到达时他们人口约25-100万，到1550年基本灭绝。死于疾病、强制劳动和暴力。',
  '埃斯科里亚尔宫':'腓力二世建的宫殿-修道院-教堂-陵墓综合体。灰色对称严肃，像一座石头做的祈祷机器。理解腓力二世的钥匙——他把统治当成宗教义务。',
  '卡拉维尔帆船':'亨利王子时期葡萄牙工程师发明的帆船。革命性创新：可以逆风航行。这意味着船可以去到任何地方然后回来——之前的船只能顺风走。',
};

// Long press handler for notes
let _pressTimer=null, _pressStartY=0;
document.addEventListener('touchstart', e => {
  const para = e.target.closest('.ch-para');
  if(!para) return;
  // Don't trigger if tapping inside an open notebox
  if(e.target.closest('.ch-notebox')) return;
  _pressStartY = e.touches[0].clientY;
  _pressTimer = setTimeout(()=>{ 
    toggleNote(para.id); 
    _pressTimer=null; 
    // Prevent context menu
    e.target.addEventListener('contextmenu', function prevent(ev){ev.preventDefault();e.target.removeEventListener('contextmenu',prevent);});
  }, 500);
}, {passive:true});
document.addEventListener('touchmove', e => {
  if(_pressTimer && Math.abs(e.touches[0].clientY - _pressStartY) > 10) {
    clearTimeout(_pressTimer); _pressTimer=null;
  }
});
document.addEventListener('touchend', ()=>{if(_pressTimer){clearTimeout(_pressTimer);_pressTimer=null;}});
// Close notes on outside tap
document.addEventListener('click', e => {
  if(!e.target.closest('.ch-notebox') && !e.target.closest('.ch-para .ndot')) {
    closeAllNotes();
  }
});
document.addEventListener('touchmove', ()=>{if(_pressTimer){clearTimeout(_pressTimer);_pressTimer=null;}});

    ? cards.map(n => '<div class="ch-np-card"><div class="ch-np-loc">'+n.loc+'</div><div class="ch-np-text">'+n.text+'</div><div class="ch-np-del" onclick="deleteNote(\''+n.pid+'\')">删除</div></div>').join('')

}

const ERA_YEARS = {
  ch1:[-23000,-1400],ch2:[-1400,1607],ch3:[1607,1750],ch4:[1750,1783],ch5:[1783,1820],ch6:[1793,1877],ch7:[1877,1920],ch8:[1917,1945],ch9:[1945,1991],ch10:[1991,2026],
  pt1:[-50000,-300],pt2:[-300,409],pt3:[409,1139],pt4:[1139,1415],pt5:[1415,1578],pt6:[1578,1640],pt7:[1640,1807],pt8:[1807,1974],pt9:[1974,2026],
  es1:[-50000,-206],es2:[-206,409],es3:[409,711],es4:[711,1085],es5:[1085,1556],es6:[1556,1700],es7:[1700,1808],es8:[1808,1874],es9:[1874,1936],es10:[1936,1975],es11:[1975,2026]
};
const ALL_COUNTRIES = {
  us:{name:'美国',chapters:()=>usaChapters,events:()=>usaSummaryEvents,fullText:()=>usaFullText,title:'美国史',range:'23,000 BCE — Present'},
  pt:{name:'葡萄牙',chapters:()=>ptChapters,events:()=>ptSummaryEvents,fullText:()=>ptFullText,title:'葡萄牙史',range:'远古 — 今'},
  es:{name:'西班牙',chapters:()=>esChapters,events:()=>esSummaryEvents,fullText:()=>esFullText,title:'西班牙史',range:'远古 — 今'}
};

function getOverlappingEras(chapterId) {
  var myYears = ERA_YEARS[chapterId];
  if(!myYears) return [];
  // Determine which country owns this chapter
  var myKey = null;
  Object.keys(ALL_COUNTRIES).forEach(function(ck){
    ALL_COUNTRIES[ck].chapters().forEach(function(ch){ if(ch.id === chapterId) myKey = ck; });
  });
  if(!myKey) return [];
  var results = [];
  Object.keys(ALL_COUNTRIES).forEach(function(ck) {
    if(ck === myKey) return;
    var country = ALL_COUNTRIES[ck];
    var chs = country.chapters();
    chs.forEach(function(ch) {
      var yr = ERA_YEARS[ch.id];
      if(yr && yr[0] <= myYears[1] && yr[1] >= myYears[0]) {
        var pk = myKey+'\u2192'+ck;
        results.push({country:ck, name:country.name, ch:ch, pins:_jumpPins[pk]||0});
      }
    });
  });
  results.sort(function(a,b){return b.pins-a.pins;});
  return results;
}

function showEraJump(chapterId) {
  var overlaps = getOverlappingEras(chapterId);
  if(!overlaps.length) return;
  var panel = document.getElementById('ch-jump-panel');
  if(!panel) {
    panel = document.createElement('div');
    panel.id = 'ch-jump-panel';
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:10002;background:rgba(18,15,12,0.98);border-top:1px solid rgba(196,162,101,0.25);border-radius:16px 16px 0 0;padding:16px;max-height:50vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease;';
    document.body.appendChild(panel);
    var ov = document.createElement('div');
    ov.id = 'ch-jump-overlay';
    ov.style.cssText = 'position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,0.4);display:none;';
    ov.onclick = closeEraJump;
    document.body.appendChild(ov);
  }
  var items = overlaps.map(function(o){
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;cursor:pointer;" onclick="doEraJump(\''+o.country+'\',\''+o.ch.id+'\')">'
      +'<div style="font-size:0.8rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(30,25,18,0.85);border-radius:6px;border:1px solid rgba(196,162,101,0.12);font-family:var(--font-mono);color:rgba(138,125,107,1);">'+o.country.toUpperCase()+'</div>'
      +'<div style="flex:1"><div style="font-size:0.8rem;color:#e8dcc8;font-weight:600;">'+o.name+'</div><div style="font-size:0.65rem;color:rgba(138,125,107,1);margin-top:2px;">'+o.ch.title+'</div></div>'
      +(o.pins?'<div style="font-size:0.58rem;color:var(--accent);font-family:var(--font-mono);">\u2605</div>':'')
      +'<div style="color:rgba(138,125,107,0.5);">\u203a</div></div>';
  }).join('');
  panel.innerHTML = '<div style="font-size:0.68rem;color:rgba(138,125,107,1);letter-spacing:0.08em;margin-bottom:10px;font-family:var(--font-mono);">\u540c\u65f6\u671f</div>' + items;
  document.getElementById('ch-jump-overlay').style.display = 'block';
  setTimeout(function(){panel.style.transform='translateY(0)';}, 10);
}

function closeEraJump() {
  var p = document.getElementById('ch-jump-panel');
  var o = document.getElementById('ch-jump-overlay');
  if(p) p.style.transform = 'translateY(100%)';
  if(o) o.style.display = 'none';
}

function doEraJump(targetKey, targetChId) {
  closeEraJump();
  var pk = activeCountry.key + '\u2192' + targetKey;
  _jumpPins[pk] = (_jumpPins[pk]||0) + 1;
  localStorage.setItem('ch_pins', JSON.stringify(_jumpPins));
  
  // Push current state to nav stack
  var scroller = document.getElementById('country-scroll-container');
  _navStack.push({
    key: activeCountry.key,
    title: activeCountry.title,
    range: activeCountry.timeRange,
    chapters: activeCountry.chapters,
    events: activeCountry.events,
    fullText: activeCountry.fullText,
    mode: countryMode,
    scrollTop: scroller ? scroller.scrollTop : 0
  });
  updateReturnBtn();
  
  // Jump to target in SAME mode
  var savedMode = countryMode;
  closeCountryHistory();
  var c = ALL_COUNTRIES[targetKey];
  setTimeout(function(){
    openCountryHistory(targetKey, c.title, c.range, c.chapters(), c.events(), c.fullText());
    // Restore mode
    if(savedMode === 'full') setCountryMode('full');
    setTimeout(function(){scrollToCountryChapter(targetChId);}, 400);
  }, 200);
}

// === NAVIGATION STACK ===
var _navStack = [];

function updateReturnBtn() {
  var btn = document.getElementById('nav-return-btn');
  if(!btn) return;
  if(_navStack.length > 0) {
    var prev = _navStack[_navStack.length-1];
    var name = ALL_COUNTRIES[prev.key] ? ALL_COUNTRIES[prev.key].name : '';
    document.getElementById('nav-return-label').textContent = '返回' + name;
    btn.style.display = 'flex';
  } else {
    btn.style.display = 'none';
  }
}

function navBack() {
  if(!_navStack.length) return;
  var prev = _navStack.pop();
  updateReturnBtn();
  closeCountryHistory();
  setTimeout(function(){
    openCountryHistory(prev.key, prev.title, prev.range, prev.chapters, prev.events, prev.fullText);
    if(prev.mode === 'full') setCountryMode('full');
    setTimeout(function(){
      var s = document.getElementById('country-scroll-container');
      if(s) s.scrollTop = prev.scrollTop;
    }, 300);
  }, 200);
}


function renderCountryContent() {
  if(!activeCountry) return;
  const box = document.getElementById('country-content');
  const {key, chapters, events, fullText} = activeCountry;
  if(countryMode === 'summary') {
    box.innerHTML = chapters.map(c => {
      const chEvents = events.filter(e => e.ch === c.id);
      return `<div id="ch-${key}-${c.id}" class="usa-chapter-block">
        <div class="usa-chapter-head">
          <div class="usa-chapter-num">${c.sub}</div>
          <div class="usa-chapter-title">${c.title}</div>
        </div>
        ${chEvents.map(e => `<div class="usa-event${e.hi?' high':''}">
          <div class="usa-event-year">${e.year}</div>
          <div class="usa-event-title">${e.title}</div>
          <div class="usa-event-tags">${e.tags.map(t=>'<span class="usa-tag '+t+'">'+t+'</span>').join('')}</div>
          <div class="usa-event-desc">${termify(e.desc)}</div>
        </div>`).join('')}
      </div>`;
    }).join('');
  } else {
    box.innerHTML = chapters.map(c => {
      const text = fullText[c.id] || '(内容建设中)';
      const paragraphs = text.split('\n').filter(p=>p.trim()).map((p,pi) => {
        const pid = 'p-'+key+'-'+c.id+'-'+pi;
        const hasNote = _notes[pid] && _notes[pid].trim();
        let processed = termify(p);
        processed = addXLinks(processed, key);
        return `<div class="ch-para${hasNote?' has-note':''}" id="${pid}"><div class="ndot"></div><p>${processed}</p><div class="ch-notebox" id="nb-${pid}"><button class="nb-close" onclick="closeNote('${pid}')">×</button><textarea placeholder="写下你的想法..." oninput="saveNote('${pid}',this.value)">${_notes[pid]||''}</textarea><div class="ch-saved" id="sv-${pid}">已保存</div></div></div>`;
      }).join('');
      return `<div id="ch-${key}-${c.id}" class="usa-chapter-block">
        <div class="usa-chapter-head" style="position:relative;">
          <div class="usa-chapter-num">${c.sub}</div>
          <div class="usa-chapter-title">${c.title}</div>
          <div class="usa-chapter-subtitle">${c.num}</div>
          <div onclick="showEraJump('${c.id}')" style="position:absolute;right:0;top:10px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1px solid rgba(196,162,101,0.15);cursor:pointer;color:rgba(138,125,107,0.6);transition:all 0.3s;" ontouchstart="this.style.borderColor='rgba(107,196,184,0.4)';this.style.color='var(--accent)'" ontouchend="this.style.borderColor='rgba(196,162,101,0.15)';this.style.color='rgba(138,125,107,0.6)'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
        </div>
        <div class="usa-full-text">${paragraphs}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('country-scroll-container').scrollTop = 0;
}

function setupCountryScrollSpy() {
  const scroller = document.getElementById('country-scroll-container');
  if(!scroller || !activeCountry) return;
  scroller.addEventListener('scroll', () => {
    const blocks = scroller.querySelectorAll('.usa-chapter-block');
    let closest = null, closestDist = Infinity;
    blocks.forEach(b => {
      const d = Math.abs(b.getBoundingClientRect().top - 80);
      if(d < closestDist) { closestDist = d; closest = b.id; }
    });
    if(closest) {
      const chId = closest.replace('ch-'+activeCountry.key+'-','');
      document.querySelectorAll('#country-chapter-nav .usa-ch-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.ch === chId);
      });
    }
  }, {passive:true});
}



init();
</script>

<!-- GENERIC COUNTRY HISTORY PAGE (reuses USA CSS classes) -->

  <div class="usa-topbar">
    <button class="usa-back-btn" onclick="_navStack=[];updateReturnBtn();closeCountryHistory()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      <span>返回</span>
    </button>
    <div style="flex:1;text-align:center;">
      <span class="ch-title-text" style="font-family:var(--font-serif);color:rgba(227,217,195,0.85);font-size:1.05rem;letter-spacing:1px;"></span>
      <span class="ch-time-range" style="color:rgba(227,217,195,0.2);font-family:var(--font-mono);font-size:0.6rem;margin-left:10px;"></span>
    </div>
    <div style="display:flex;gap:3px;align-items:center;">
      <button class="term-toggle" id="term-toggle" onclick="toggleTerms()">术语</button>

      <div style="display:flex;gap:3px;background:rgba(107,196,184,0.06);border-radius:16px;padding:3px;">
        <button id="ch-mode-summary" onclick="setCountryMode('summary')" class="usa-mode-btn active">精炼版</button>
        <button id="ch-mode-full" onclick="setCountryMode('full')" class="usa-mode-btn">完整版</button>
      </div>
    </div>
  </div>
  <div class="usa-body">
    <div class="usa-nav" id="country-chapter-nav"></div>
    <div class="usa-scroll" id="country-scroll-container">
      <div class="usa-content-inner" id="country-content"></div>
    </div>
  </div>

<!-- Nav Stack Return Button -->
<button class="nav-return-btn" id="nav-return-btn" onclick="navBack()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
