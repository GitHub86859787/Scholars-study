<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chronicle Map — 世界历史地图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }

:root {
  --bg: #0a0908;
  --panel: rgba(18, 15, 12, 0.96);
  --surface: rgba(30, 25, 18, 0.85);
  --ink: #e8dcc8;
  --ink-dim: #8a7d6b;
  --ink-faint: #5a5040;
  --gold: #c4a265;
  --gold-bright: #e0c88a;
  --gold-dim: #6b5a3a;
  --accent: #6bc4b8;
  --accent-glow: rgba(107, 196, 184, 0.3);
  --accent-dim: rgba(107, 196, 184, 0.08);
  --border: rgba(196, 162, 101, 0.12);
  --border-hover: rgba(196, 162, 101, 0.3);
  --shadow-deep: rgba(0,0,0,0.7);
  --radius: 6px;
  --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
  --font-body: 'Noto Serif SC', serif;
  --font-mono: 'DM Mono', monospace;
}

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  overflow: hidden;
  width: 100vw; height: 100vh;
}

/* ===== Ambient Texture ===== */
.ambient-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.ambient-layer::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 15% 85%, rgba(196,162,101,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 15%, rgba(107,196,184,0.04) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 50%, rgba(196,162,101,0.02) 0%, transparent 70%);
}
.ambient-layer::after {
  content: ''; position: absolute; inset: 0; opacity: 0.35;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
}

/* Vignette */
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  box-shadow: inset 0 0 120px 60px rgba(10,9,8,0.85);
}

/* ===== HEADER ===== */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; z-index: 100;
  background: linear-gradient(to bottom, rgba(10,9,8,0.95) 0%, rgba(10,9,8,0.6) 70%, transparent 100%);
  pointer-events: none;
}
header > * { pointer-events: auto; }

.brand {
  display: flex; align-items: center; gap: 12px;
  opacity: 0; animation: fadeSlideIn 0.8s 0.2s ease forwards;
}
.compass-icon { width: 34px; height: 34px; flex-shrink: 0; }
.compass-icon svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 8px rgba(196,162,101,0.2));
  animation: compassSpin 40s linear infinite;
}
@keyframes compassSpin { to { transform: rotate(360deg); } }

.brand-text h1 {
  font-family: var(--font-display);
  font-size: 1.35rem; font-weight: 700; letter-spacing: 0.22em;
  color: var(--gold);
  text-shadow: 0 1px 12px rgba(0,0,0,0.5);
}
.brand-text p {
  font-size: 0.62rem; color: var(--ink-dim); letter-spacing: 0.15em;
  margin-top: 1px; font-family: var(--font-mono); font-weight: 300;
}

.nav-tabs {
  display: flex; gap: 4px;
  opacity: 0; animation: fadeSlideIn 0.8s 0.4s ease forwards;
}
.nav-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 14px; border: 1px solid transparent;
  background: transparent; color: var(--ink-dim);
  font-family: var(--font-body); font-size: 0.72rem;
  cursor: pointer; transition: all 0.35s ease; border-radius: 20px;
  letter-spacing: 0.04em;
}
.nav-tab:hover { color: var(--ink); background: rgba(196,162,101,0.06); }
.nav-tab.active {
  color: var(--accent); border-color: rgba(107,196,184,0.25);
  background: var(--accent-dim);
}
.nav-tab svg { width: 13px; height: 13px; }

/* ===== MAP STAGE ===== */
#map-stage {
  position: fixed; inset: 48px 0 100px 0;
  display: flex; justify-content: center; align-items: center;
  z-index: 2;
  overflow: hidden;
}
#map-container {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%; height: 100%;
}
#map-image {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  background: #100e0b;
  transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1), transform 0.9s cubic-bezier(0.4,0,0.2,1);
  opacity: 1; transform: scale(1);
  display: block;
}
#map-image.fade-out { opacity: 0; transform: scale(1.02); }

/* Hotspots - positioned dynamically by JS to match actual image bounds */
#hotspots-overlay {
  position: absolute;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
.hotspot {
  position: absolute;
  pointer-events: auto;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  border-radius: 3px;
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  display: flex; align-items: center; justify-content: center;
}
.hotspot::before {
  content: attr(data-name);
  font-family: var(--font-body);
  font-size: 0.68rem; font-weight: 600;
  color: var(--gold-bright);
  opacity: 0; transform: translateY(4px);
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  text-shadow: 0 1px 8px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.8);
  pointer-events: none;
  white-space: nowrap;
  letter-spacing: 0.1em;
  padding: 3px 10px;
  background: rgba(10,9,8,0.7);
  border-radius: 12px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(196,162,101,0.15);
}
.hotspot:hover {
  background: rgba(107,196,184,0.08);
  border-color: rgba(107,196,184,0.3);
  box-shadow: 0 0 30px rgba(107,196,184,0.1), inset 0 0 30px rgba(107,196,184,0.03);
}
.hotspot:hover::before { opacity: 1; transform: translateY(0); }
.hotspot.pulse { animation: pulseGlow 3s ease-in-out infinite; }
@keyframes pulseGlow {
  0%, 100% { box-shadow: none; }
  50% { box-shadow: 0 0 20px rgba(107,196,184,0.08); }
}

/* Polygon hotspots - invisible by default, soft glow on hover */
.hotspots-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.hotspot-poly {
  fill: transparent;
  stroke: none;
  cursor: pointer;
  pointer-events: auto;
  transition: fill 0.5s ease;
}
.hotspot-poly:hover {
  fill: rgba(107,196,184,0.06);
}
.hotspot-poly.selected {
  fill: rgba(107,196,184,0.1);
}


/* ===== LEFT PANEL ===== */
#left-panel {
  position: fixed; top: 0; left: 0; width: 400px;
  height: 100vh;
  background: var(--panel);
  border-right: 1px solid var(--border);
  z-index: 110;
  transform: translateX(-100%);
  transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  backdrop-filter: blur(40px) saturate(1.2);
  box-shadow: 20px 0 80px rgba(0,0,0,0.7);
}
#left-panel.open { transform: translateX(0); }

.panel-header {
  padding: 28px 28px 20px; position: relative;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(196,162,101,0.04) 0%, transparent 100%);
}
.panel-close {
  position: absolute; top: 20px; right: 20px;
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  background: transparent; color: var(--ink-dim); border-radius: 50%;
  cursor: pointer; font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
}
.panel-close:hover {
  border-color: var(--accent); color: var(--accent);
  transform: rotate(90deg);
  box-shadow: 0 0 16px var(--accent-glow);
}
.panel-title {
  font-family: var(--font-display);
  font-size: 1.6rem; font-weight: 700; color: var(--gold-bright);
  letter-spacing: 0.08em; line-height: 1.2;
}
.panel-title-en {
  font-size: 0.75rem; color: var(--ink-dim);
  font-family: var(--font-display); font-style: italic;
  margin-top: 4px; letter-spacing: 0.1em; font-weight: 400;
}

.panel-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

.info-section { margin-bottom: 24px; }
.info-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.62rem; color: var(--ink-faint);
  letter-spacing: 0.18em; margin-bottom: 8px;
  text-transform: uppercase; font-family: var(--font-mono); font-weight: 300;
}
.info-label svg { width: 12px; height: 12px; opacity: 0.5; }
.era-number {
  font-size: 2.2rem; font-weight: 700; color: var(--accent);
  font-family: var(--font-display); line-height: 1;
  letter-spacing: 0.02em;
}
.era-unit { font-size: 0.8rem; color: var(--ink-dim); margin-left: 4px; }
.desc-text {
  font-size: 0.8rem; line-height: 1.9; color: var(--ink-dim);
  text-align: justify;
}

.enter-btn {
  width: 100%; padding: 14px; margin-top: 12px;
  background: linear-gradient(135deg, var(--accent-dim) 0%, transparent 100%);
  border: 1px solid rgba(107,196,184,0.25); color: var(--accent);
  font-family: var(--font-body); font-size: 0.8rem; font-weight: 600;
  letter-spacing: 0.12em; cursor: pointer; border-radius: 8px;
  transition: all 0.35s ease;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.enter-btn:hover {
  background: rgba(107,196,184,0.15);
  box-shadow: 0 0 30px rgba(107,196,184,0.1);
  border-color: var(--accent);
  transform: translateY(-1px);
}

.panel-footer {
  height: 60px;
  background: linear-gradient(to top, rgba(10,9,8,0.9) 0%, transparent 100%);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: var(--ink-faint); letter-spacing: 0.15em;
  font-family: var(--font-mono); font-weight: 300;
}

/* ===== RIGHT PANEL ===== */
#right-panel {
  position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
  width: 190px; background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; z-index: 90;
  backdrop-filter: blur(30px); box-shadow: 0 12px 50px var(--shadow-deep);
  opacity: 0; animation: fadeSlideIn 0.8s 0.6s ease forwards;
}
.layer-title {
  font-size: 0.65rem; font-weight: 600; color: var(--gold); margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: 0.1em; font-family: var(--font-mono);
  text-transform: uppercase;
}
.layer-title svg { width: 14px; height: 14px; opacity: 0.4; }
.layer-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer; transition: all 0.3s;
}
.layer-item:last-child { border-bottom: none; }
.layer-icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04);
}
.layer-info h5 { font-size: 0.7rem; font-weight: 600; color: var(--ink); margin-bottom: 1px; }
.layer-info p { font-size: 0.58rem; color: var(--ink-faint); font-family: var(--font-mono); }
.eye-icon { margin-left: auto; width: 14px; height: 14px; opacity: 0.4; transition: all 0.3s; }
.layer-item:hover .eye-icon { opacity: 1; }

/* ===== TIMELINE ===== */
#timeline-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
  background: linear-gradient(to top, rgba(10,9,8,0.98) 0%, rgba(10,9,8,0.8) 60%, transparent 100%);
  z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0 40px;
  opacity: 0; animation: fadeSlideUp 0.8s 0.3s ease forwards;
}
.timeline-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.6rem; color: var(--ink-faint); margin-bottom: 8px;
  letter-spacing: 0.18em; font-family: var(--font-mono); font-weight: 300;
  text-transform: uppercase;
}
.timeline-label svg { width: 13px; height: 13px; opacity: 0.4; }

.timeline-track-wrap {
  position: relative; width: 100%; max-width: 900px; height: 38px;
  display: flex; align-items: center;
}
.timeline-track {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dim), rgba(196,162,101,0.15), var(--gold-dim), transparent);
  top: 50%; transform: translateY(-50%);
}
.timeline-progress {
  position: absolute; left: 0; height: 2px;
  background: linear-gradient(to right, var(--accent), rgba(107,196,184,0.3));
  top: 50%; transform: translateY(-50%);
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  border-radius: 1px;
  box-shadow: 0 0 8px var(--accent-glow);
}

.timeline-nodes {
  position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
  display: flex; justify-content: space-between; pointer-events: none;
}
.t-node {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; pointer-events: auto; transition: all 0.3s;
  position: relative;
}
.t-node-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg); border: 1.5px solid var(--gold-dim);
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  position: relative; z-index: 2;
}
.t-node:hover .t-node-dot {
  border-color: var(--gold); background: var(--gold);
  box-shadow: 0 0 10px rgba(196,162,101,0.3);
}
.t-node.active .t-node-dot {
  width: 12px; height: 12px; background: var(--accent); border-color: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow), 0 0 40px rgba(107,196,184,0.1);
}
.t-node.visited .t-node-dot {
  background: var(--gold-dim); border-color: var(--gold-dim);
}
.t-node-label {
  font-size: 0.58rem; color: var(--ink-faint);
  font-family: var(--font-mono); font-weight: 300;
  transition: color 0.3s; white-space: nowrap; letter-spacing: 0.06em;
}
.t-node:hover .t-node-label { color: var(--ink); }
.t-node.active .t-node-label { color: var(--accent); font-weight: 400; }

#current-year-display {
  position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
  background: var(--panel); border: 1px solid rgba(107,196,184,0.3); color: var(--accent);
  padding: 4px 16px; border-radius: 14px;
  font-size: 0.75rem; font-weight: 600;
  font-family: var(--font-display); letter-spacing: 0.08em;
  box-shadow: 0 0 20px rgba(107,196,184,0.08);
  pointer-events: none; white-space: nowrap;
  backdrop-filter: blur(12px);
  transition: all 0.4s ease;
}

.timeline-hint {
  margin-top: 8px; font-size: 0.55rem; color: var(--ink-faint); opacity: 0.5;
  letter-spacing: 0.12em; font-family: var(--font-mono); font-weight: 300;
}

/* ===== OVERLAY ===== */
#overlay {
  position: fixed; inset: 0;
  background: rgba(10,9,8,0.5);
  z-index: 105;
  opacity: 0; pointer-events: none;
  transition: opacity 0.45s ease;
  backdrop-filter: blur(2px);
}
#overlay.active { opacity: 1; pointer-events: auto; }

/* ===== ANIMATIONS ===== */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Era Transition Overlay ===== */
.era-transition {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: rgba(10,9,8,0.9);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  backdrop-filter: blur(8px);
}
.era-transition.active { opacity: 1; pointer-events: auto; }
.era-transition-text {
  font-family: var(--font-display);
  font-size: 2.5rem; font-weight: 700;
  color: var(--gold-bright);
  letter-spacing: 0.15em;
  text-shadow: 0 0 40px rgba(196,162,101,0.3);
  transform: scale(0.95);
  transition: all 0.5s ease;
}
.era-transition.active .era-transition-text { transform: scale(1); }

/* ===== RESPONSIVE ===== */
@media (max-width: 1200px) {
  #right-panel { display: none; }
  #left-panel { width: 360px; }
}
@media (max-width: 768px) {
  .nav-tabs { display: none; }
  header { padding: 0 16px; }
  .brand-text p { display: none; }
  #left-panel {
    width: 100%; height: 60vh;
    top: auto; bottom: 0;
    border-right: none; border-top: 1px solid var(--border);
    transform: translateY(100%);
    border-radius: 16px 16px 0 0;
  }
  #left-panel.open { transform: translateY(0); }
  #timeline-bar { padding: 0 20px; }
  .timeline-track-wrap { max-width: 100%; }
  .t-node-label { font-size: 0.5rem; }
  #map-stage { inset: 48px 0 100px 0; }
}


/* ===== USA HISTORY FULLSCREEN PAGE ===== */
#usa-history-page {
  display:none; position:fixed; inset:0; z-index:10000;
  background:#1a1612;
  overflow:hidden;
  animation: usaFadeIn 0.4s ease;
}
@keyframes usaFadeIn { from{opacity:0} to{opacity:1} }

.usa-topbar {
  position:relative; z-index:10;
  background:rgba(26,22,18,0.97); backdrop-filter:blur(16px);
  padding:14px 28px; display:flex; align-items:center; gap:16px;
  border-bottom:1px solid rgba(107,196,184,0.12);
}
.usa-back-btn {
  background:none; border:1px solid rgba(107,196,184,0.25); color:var(--accent);
  padding:7px 16px; border-radius:20px; cursor:pointer;
  font-family:var(--font-mono); font-size:0.68rem;
  display:flex; align-items:center; gap:6px; transition:all 0.3s;
}
.usa-back-btn:hover { background:rgba(107,196,184,0.1); border-color:var(--accent); }

.usa-mode-btn {
  padding:5px 14px; border-radius:14px; border:none;
  font-family:var(--font-mono); font-size:0.63rem; cursor:pointer;
  transition:all 0.3s; background:transparent; color:rgba(227,217,195,0.4);
}
.usa-mode-btn.active { background:var(--accent)!important; color:#1a1612!important; font-weight:500; }
.usa-mode-btn:hover:not(.active) { background:rgba(107,196,184,0.12); color:var(--accent); }

.usa-body { display:flex; height:calc(100% - 54px); overflow:hidden; }

/* Left chapter nav */
.usa-nav {
  width:220px; min-width:220px; background:rgba(26,22,18,0.8);
  border-right:1px solid rgba(107,196,184,0.08);
  overflow-y:auto; padding:16px 0;
}
.usa-nav::-webkit-scrollbar { width:3px; }
.usa-nav::-webkit-scrollbar-thumb { background:rgba(107,196,184,0.12); border-radius:2px; }

.usa-nav-label {
  padding:0 16px 10px; font-family:var(--font-mono); font-size:0.55rem;
  color:rgba(227,217,195,0.25); text-transform:uppercase; letter-spacing:2.5px;
}
.usa-ch-btn {
  display:block; width:100%; text-align:left; background:none; border:none;
  padding:11px 20px; font-family:var(--font-mono); font-size:0.68rem;
  color:rgba(227,217,195,0.45); cursor:pointer; transition:all 0.25s;
  border-left:2px solid transparent; line-height:1.6;
}
.usa-ch-btn:hover { background:rgba(107,196,184,0.04); color:rgba(227,217,195,0.7); }
.usa-ch-btn.active {
  border-left-color:var(--accent); color:var(--accent);
  background:rgba(107,196,184,0.06);
}
.usa-ch-btn .ch-num {
  font-size:0.5rem; color:rgba(227,217,195,0.2); display:block;
  margin-bottom:2px; letter-spacing:1.5px; text-transform:uppercase;
}

/* Main content area */
.usa-scroll {
  flex:1; overflow-y:auto; background:linear-gradient(180deg, #1a1612 0%, #1e1a15 100%);
}
.usa-scroll::-webkit-scrollbar { width:5px; }
.usa-scroll::-webkit-scrollbar-thumb { background:rgba(107,196,184,0.15); border-radius:3px; }

.usa-content-inner {
  max-width:720px; margin:0 auto; padding:40px 48px 120px;
}

/* Chapter blocks */
.usa-chapter-block { margin-bottom:64px; }
.usa-chapter-head {
  margin-bottom:32px; padding-bottom:20px;
  border-bottom:1px solid rgba(107,196,184,0.08);
}
.usa-chapter-num {
  font-family:var(--font-mono); font-size:0.55rem;
  color:var(--accent); letter-spacing:3px; text-transform:uppercase;
  margin-bottom:6px; opacity:0.7;
}
.usa-chapter-title {
  font-family:var(--font-serif); font-size:1.8rem;
  color:rgba(227,217,195,0.9); line-height:1.3; margin-bottom:4px;
}
.usa-chapter-subtitle {
  font-family:var(--font-mono); font-size:0.6rem;
  color:rgba(227,217,195,0.2); letter-spacing:2px;
}

/* Timeline events (summary mode) */
.usa-event {
  position:relative; padding-left:32px; margin-bottom:28px;
  border-left:1px solid rgba(107,196,184,0.1); padding-bottom:4px;
}
.usa-event::before {
  content:''; position:absolute; left:-4px; top:8px;
  width:7px; height:7px; border-radius:50%;
  background:rgba(107,196,184,0.5);
  transition:all 0.3s;
}
.usa-event:hover::before { background:var(--accent); box-shadow:0 0 8px rgba(107,196,184,0.3); }
.usa-event.high::before {
  width:9px; height:9px; left:-5px; top:7px;
  background:var(--gold); box-shadow:0 0 10px rgba(218,165,32,0.3);
}
.usa-event-year {
  font-family:var(--font-serif); font-size:1rem; color:var(--gold);
  margin-bottom:3px; opacity:0.8;
}
.usa-event.high .usa-event-year { font-size:1.3rem; opacity:1; }
.usa-event-title {
  font-family:var(--font-serif); font-size:0.92rem;
  color:rgba(227,217,195,0.85); margin-bottom:6px; line-height:1.4;
}
.usa-event-tags { display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap; }
.usa-tag {
  font-family:var(--font-mono); font-size:0.5rem; padding:2px 8px;
  border-radius:10px; letter-spacing:0.5px;
}
.usa-tag.war { background:rgba(220,20,60,0.08); color:rgba(220,20,60,0.7); }
.usa-tag.politics { background:rgba(107,196,184,0.08); color:rgba(107,196,184,0.7); }
.usa-tag.economy { background:rgba(218,165,32,0.08); color:rgba(218,165,32,0.7); }
.usa-tag.society { background:rgba(34,139,34,0.08); color:rgba(34,139,34,0.7); }

.usa-event-desc {
  font-family:var(--font-mono); font-size:0.72rem;
  color:rgba(227,217,195,0.55); line-height:1.9; font-weight:300;
}

/* Full chapter text (full mode) */
.usa-full-text {
  font-family:var(--font-mono); font-size:0.75rem;
  color:rgba(227,217,195,0.65); line-height:2.1; font-weight:300;
  white-space:pre-wrap; word-wrap:break-word;
}
.usa-full-text p { margin-bottom:1.2em; }

@media (max-width:768px) {
  .usa-nav { display:none; }
  .usa-content-inner { padding:24px 18px 100px; }
  .usa-topbar { padding:12px 14px; gap:10px; }
  .usa-topbar .ch-time-range { display:none; }
  .usa-back-btn { padding:8px 12px; font-size:0.7rem; }
  .usa-back-btn span { display:none; }
  .usa-mode-btn { padding:7px 16px; font-size:0.68rem; }
  .usa-chapter-title { font-size:1.25rem; }
  .usa-chapter-head { margin-bottom:24px; padding-bottom:16px; position:sticky; top:0; background:#1a1612; z-index:5; }
  .usa-event-desc { font-size:0.75rem; line-height:1.95; }
  .usa-full-text { font-size:0.78rem; line-height:2.15; }
  .ch-term { padding:0 1px; }
  .ch-popup { font-size:0.82rem; line-height:1.85; }
  .ch-xlink { font-size:0.68rem; padding:4px 12px; }
}

/* === MOBILE CHAPTER FLOAT BUTTON === */
.mob-ch-btn {
  display:none; position:fixed; bottom:20px; left:20px; z-index:10003;
  width:44px; height:44px; border-radius:50%; border:1px solid rgba(107,196,184,0.3);
  background:rgba(18,15,12,0.95); color:var(--accent); cursor:pointer;
  backdrop-filter:blur(12px); box-shadow:0 4px 20px rgba(0,0,0,0.5);
  align-items:center; justify-content:center; transition:all 0.3s;
}
.mob-ch-btn:active { transform:scale(0.92); background:rgba(107,196,184,0.15); }
.mob-ch-btn svg { width:18px; height:18px; }
@media (max-width:768px) { .mob-ch-btn { display:flex; } }

.mob-ch-sheet {
  position:fixed; bottom:0; left:0; right:0; z-index:10004;
  background:rgba(18,15,12,0.98); border-top:1px solid rgba(107,196,184,0.2);
  border-radius:16px 16px 0 0; padding:16px 16px 28px; max-height:55vh; overflow-y:auto;
  transform:translateY(100%); transition:transform 0.3s ease;
  backdrop-filter:blur(20px);
}
.mob-ch-sheet.open { transform:translateY(0); }
.mob-ch-sheet .mcs-title { font-size:0.62rem; color:var(--ink-faint); letter-spacing:0.12em; font-family:var(--font-mono); margin-bottom:10px; }
.mob-ch-sheet .mcs-item {
  display:block; width:100%; text-align:left; background:none; border:none; padding:12px 14px;
  font-family:var(--font-body); font-size:0.78rem; color:var(--ink-dim); cursor:pointer;
  border-radius:8px; transition:all 0.2s; line-height:1.5; margin-bottom:2px;
}
.mob-ch-sheet .mcs-item:active { background:rgba(107,196,184,0.08); color:var(--accent); }
.mob-ch-sheet .mcs-item.active { color:var(--accent); background:rgba(107,196,184,0.06); border-left:2px solid var(--accent); }
.mob-ch-sheet .mcs-sub { font-size:0.52rem; color:var(--ink-faint); font-family:var(--font-mono); display:block; margin-bottom:2px; letter-spacing:1px; }

/* === READING PROGRESS BAR === */
.read-progress { position:fixed; top:0; left:0; height:2px; z-index:10005; background:var(--accent); width:0; transition:width 0.15s linear; pointer-events:none; box-shadow:0 0 6px var(--accent-glow); }

/* === BACK TO TOP === */
.btt-btn {
  position:fixed; bottom:20px; right:20px; z-index:10003;
  width:40px; height:40px; border-radius:50%; border:1px solid rgba(196,162,101,0.2);
  background:rgba(18,15,12,0.95); color:var(--gold); cursor:pointer;
  backdrop-filter:blur(12px); box-shadow:0 4px 16px rgba(0,0,0,0.4);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:all 0.3s; transform:translateY(8px);
}
.btt-btn.show { opacity:1; pointer-events:auto; transform:translateY(0); }
.btt-btn:active { transform:scale(0.92); }
.btt-btn svg { width:16px; height:16px; }


/* === TERM GLOSSARY === */
.ch-term { transition:all 0.2s; cursor:default; }
.terms-on .ch-term { color:var(--accent); text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px; text-decoration-color:rgba(107,196,184,0.35); cursor:pointer; }
.terms-on .ch-term:active { text-decoration-color:var(--accent); }
.ch-popup { background:var(--panel,rgba(18,15,12,0.96)); border:1px solid rgba(196,162,101,0.25); border-radius:8px; padding:12px 14px; margin:8px 0 12px; font-size:0.82rem; line-height:1.8; display:none; animation:chFade 0.2s ease; }
.ch-popup.show { display:block; }
.ch-popup .pop-t { color:var(--accent); font-weight:600; font-size:0.78rem; margin-bottom:4px; letter-spacing:0.04em; }
.ch-popup .pop-b { color:rgba(227,217,195,0.65); }
.ch-popup .pop-close { position:absolute; top:6px; right:8px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border:none; background:none; color:rgba(138,125,107,0.6); cursor:pointer; font-size:1rem; border-radius:50%; }
.ch-popup .pop-close:active { background:rgba(196,162,101,0.1); }
@keyframes chFade { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

/* === TERM TOGGLE BUTTON === */
.term-toggle {
  padding:5px 10px; border-radius:14px; border:1px solid rgba(107,196,184,0.15);
  background:none; color:rgba(138,125,107,0.7); cursor:pointer;
  font-family:var(--font-mono); font-size:0.58rem; letter-spacing:0.05em;
  transition:all 0.3s; white-space:nowrap;
}
.term-toggle.on { border-color:rgba(107,196,184,0.4); color:var(--accent); background:rgba(107,196,184,0.06); }

/* === CROSS-COUNTRY JUMP === */
.ch-xlink { display:inline-flex; align-items:center; gap:4px; font-size:0.65rem; padding:3px 10px; border-radius:12px; background:rgba(107,196,184,0.06); color:var(--accent); border:1px solid rgba(107,196,184,0.15); cursor:pointer; margin:4px 4px 4px 0; transition:all 0.2s; font-family:var(--font-mono,'DM Mono',monospace); letter-spacing:0.03em; }
.ch-xlink:active { background:rgba(107,196,184,0.15); }
.ch-xlink .xpin { font-size:0.55rem; opacity:0.6; margin-left:2px; }

/* === HIDDEN NOTES === */
.ch-para { position:relative; padding-left:12px; border-left:2px solid transparent; transition:border-color 0.3s; }
.ch-para.has-note { border-left-color:rgba(224,160,80,0.2); }
.ch-para .ndot { position:absolute; left:-1px; top:10px; width:5px; height:5px; border-radius:50%; background:#e0a050; opacity:0; transition:opacity 0.3s; }
.ch-para.has-note .ndot { opacity:0.7; }
.ch-notebox { display:none; margin:6px 0 14px; padding:10px 12px; background:rgba(30,25,18,0.6); border:1px solid rgba(196,162,101,0.12); border-radius:8px; position:relative; }
.ch-notebox.show { display:block; animation:chFade 0.2s ease; }
.ch-notebox textarea { width:100%; border:none; background:transparent; color:var(--ink,#e8dcc8); font-family:var(--font-body); font-size:16px; line-height:1.7; resize:none; outline:none; min-height:36px; }
.ch-notebox textarea::placeholder { color:rgba(138,125,107,0.5); }
.ch-notebox .nb-close { position:absolute; top:4px; right:6px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border:none; background:none; color:rgba(138,125,107,0.5); cursor:pointer; border-radius:50%; font-size:0.9rem; }
.ch-notebox .nb-close:active { background:rgba(196,162,101,0.08); }
.ch-saved { font-size:0.58rem; color:#e0a050; opacity:0; transition:opacity 0.3s; margin-top:3px; font-family:var(--font-mono); }
.ch-saved.show { opacity:1; }

/* === NAV STACK RETURN BUTTON === */
.nav-return-btn {
  position:fixed; bottom:72px; left:50%; transform:translateX(-50%); z-index:10003;
  padding:8px 20px; border-radius:20px;
  border:1px solid rgba(107,196,184,0.3); background:rgba(18,15,12,0.95);
  color:var(--accent); cursor:pointer; backdrop-filter:blur(12px);
  font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.05em;
  display:none; align-items:center; gap:6px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4); transition:all 0.3s;
}
.nav-return-btn:active { transform:translateX(-50%) scale(0.95); background:rgba(107,196,184,0.1); }
.nav-return-btn svg { width:12px; height:12px; }

/* === NOTES PANEL === */
.ch-npanel { position:fixed; inset:0; z-index:10001; background:var(--bg,#0a0908); transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; -webkit-overflow-scrolling:touch; }
.ch-npanel.open { transform:translateX(0); }
.ch-np-hdr { position:sticky; top:0; display:flex; align-items:center; padding:14px 16px; background:var(--bg); border-bottom:1px solid rgba(196,162,101,0.12); z-index:1; gap:10px; }
.ch-np-title { flex:1; font-family:var(--font-display); font-size:1.1rem; font-weight:700; color:var(--gold,#c4a265); letter-spacing:0.1em; }
.ch-np-btn { width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:rgba(138,125,107,1); cursor:pointer; border-radius:50%; background:none; border:none; }
.ch-np-btn:active { background:rgba(196,162,101,0.1); }
.ch-np-body { padding:16px; }
.ch-np-card { background:rgba(30,25,18,0.85); border:1px solid rgba(196,162,101,0.12); border-radius:8px; padding:12px 14px; margin-bottom:10px; }
.ch-np-loc { font-size:0.62rem; color:rgba(138,125,107,1); font-family:var(--font-mono); letter-spacing:0.05em; margin-bottom:6px; }
.ch-np-text { font-size:0.8rem; color:var(--ink); line-height:1.7; border-left:2px solid #e0a050; padding-left:10px; }
.ch-np-del { font-size:0.6rem; color:rgba(138,125,107,0.6); cursor:pointer; margin-top:6px; text-align:right; }
.ch-np-empty { text-align:center; padding:40px 20px; color:rgba(138,125,107,0.6); font-size:0.8rem; line-height:1.8; }

</style>
</head>
<body>

<div class="ambient-layer"></div>
<div class="vignette"></div>
<div id="overlay"></div>

<!-- Era Transition -->

  <div class="era-transition-text" id="era-transition-text"></div>
</div>

<!-- HEADER -->
<header>
  <div class="brand">

        <path d="M50,92 L53,58 L50,62 L47,58 Z" fill="var(--gold-dim)"/>
        <path d="M8,50 L42,53 L38,50 L42,47 Z" fill="var(--gold-dim)"/>
        <path d="M92,50 L58,53 L62,50 L58,47 Z" fill="var(--gold-dim)"/>
        <text x="50" y="5" text-anchor="middle" fill="var(--gold)" font-size="8" font-family="Cormorant Garamond" font-weight="700">N</text>
        <circle cx="50" cy="50" r="2" fill="var(--gold)"/>

<!-- MAP -->

  </div>
</div>

<!-- LEFT PANEL -->
<div id="left-panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-title" id="panel-title">伊比利亚</div>
    <div class="panel-title-en" id="panel-title-en">Iberia</div>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-footer">CHRONICLE MAP · EXPLORE HISTORY</div>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">
  <div class="layer-title">
    LAYERS
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3" fill="var(--accent)" stroke="none"/></svg>
  </div>
  <div class="layer-item" data-layer="political">
    <div class="layer-icon">🛡</div>
    <div class="layer-info"><h5>政治势力</h5><p>Political borders</p></div>
    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3" fill="var(--accent)" stroke="none"/></svg>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

      <div class="t-node" data-year="prehistoric"><div class="t-node-dot"></div><span class="t-node-label">史前</span></div>

<script>
const eras = [
  { id: 'prehistoric', label: '史前', yearLabel: '史前时代', src: 'images/map_prehistoric.png', desc: '人类迁徙，文明尚未点燃' },
  { id: '3000bce', label: '前3000', yearLabel: '约公元前 3000 年', src: 'images/map_3000bce.png', desc: '文明初现：美索不达米亚、尼罗河、印度河、黄河' },
  { id: '500bce', label: '前500', yearLabel: '约公元前 500 年', src: 'images/map_500bce.png', desc: '古典时代：波斯、希腊、春秋、印度列国' },
  { id: '200ce', label: '200年', yearLabel: '约公元 200 年', src: 'images/map_200ce.png', desc: '帝国时代：罗马、汉、帕提亚、贵霜' },
  { id: '1000ce', label: '1000年', yearLabel: '公元 1000 年', src: 'images/map_1000ce.png', desc: '中世纪：宋、拜占庭、阿拉伯、维京' },

const regionDetails = {
  americas: { title: '美洲', titleEn: 'The Americas', desc: '末次冰期结束后，人类从白令陆桥扩散至整个大陆。克洛维斯猎人在大平原追踪猛犸，亚马逊流域开始早期农业实验。' },
  eurasia: { title: '欧亚大陆', titleEn: 'Eurasia', desc: '农业革命在肥沃新月地带酝酿，小麦与大麦驯化。欧洲洞穴壁画记录狩猎生活，社会分层初现。' },
  africa: { title: '非洲', titleEn: 'Africa', desc: '撒哈拉仍是可通行的草原，尼罗河流域出现最早的农业聚落。班图人开始向南方扩张，带来铁器与农业技术。' },
  australia: { title: '澳大利亚', titleEn: 'Australia', desc: '约五万年前抵达的智人后裔发展出独特的 Dreamtime 信仰体系。巨型动物群灭绝后，火棍农业管理景观。' },
  beringia: { title: '白令陆桥', titleEn: 'Beringia', desc: '海平面下降 100 米暴露出的广阔苔原，连接东北亚与阿拉斯加。人类与猛犸、野马、骆驼在此迁徙。' },
  mesopotamia: { title: '美索不达米亚', titleEn: 'Mesopotamia', desc: '两河之间的土地。苏美尔人发明轮车、帆船与青铜冶炼。城邦间战争频繁，乌鲁克、乌尔、拉格什争霸。' },
  egypt: { title: '尼罗河流域', titleEn: 'The Nile Valley', desc: '世界最长的诗。尼罗河每年泛滥带来肥沃黑土，使沙漠中的奇迹成为可能。法老被视为神王，来世信仰驱动金字塔建造。' },
  indus: { title: '印度河流域', titleEn: 'The Indus Valley', desc: '印度文明的先声。摩亨佐-达罗拥有世界最早的公共卫生系统，城市规划严整如棋盘。文字尚未破译。' },
  yellow_river: { title: '黄河流域', titleEn: 'Yellow River Valley', desc: '华夏摇篮。仰韶彩陶与龙山黑陶见证社会复杂化。传说中的三皇五帝时代，部落联盟向国家过渡。' },
  aegean: { title: '爱琴海', titleEn: 'The Aegean', desc: '欧洲文明的起点。基克拉泽斯群岛的海员连接埃及与安纳托利亚，米诺斯宫殿在克里特岛兴起。' },
  persia: { title: '波斯帝国', titleEn: 'Persian Empire', desc: '历史上第一个横跨三大洲的帝国。居鲁士大帝释放巴比伦之囚，大流士建立行省与驿道。波斯波利斯的万国之门见证多元共治。' },
  greece: { title: '希腊城邦', titleEn: 'Greek City-States', desc: '民主、哲学与悲剧的诞生地。雅典卫城耸立，斯巴达军营严酷。希罗多德记录历史，苏格拉底追问真理。' },
  egypt_500: { title: '埃及', titleEn: 'Egypt', desc: '古老的文明已历经三千年。波斯统治下的埃及仍在建造神庙，但已不再是独立强权。亚历山大港即将改变一切。' },
  india_500: { title: '婆罗多诸国', titleEn: 'Mahajanapadas', desc: '十六大国并立，摩揭陀与憍萨罗争霸。释迦牟尼在此觉悟，耆那教大雄宣扬非暴力。奥义书哲学深入探索梵我合一。' },
  china_500: { title: '东周列国', titleEn: 'Eastern Zhou States', desc: '春秋五霸，礼乐征伐自诸侯出。孔子删述六经，老子留下道德经。铁器普及，井田制瓦解，百家争鸣即将爆发。' },
  gaul: { title: '高卢', titleEn: 'Gaul', desc: '凯尔特战士的土地。德鲁伊祭司维系口传知识，拉坦诺铁器精美绝伦。他们是令罗马颤抖的敌人，也是日后的法兰克人。' },
  italy: { title: '意大利', titleEn: 'Italia', desc: '靴子形状的半岛。伊特鲁里亚人建立城市联盟，罗马七丘上的狼孩传说正在变成共和国。希腊殖民城邦点缀南部。' },
  phoenicia: { title: '腓尼基', titleEn: 'Phoenicia', desc: '紫红之国，航海与商业的民族。他们发明字母，使文字从神庙走向市场。迦太基在北非海岸崛起，将与罗马争夺地中海。' },
  zhou_states: { title: '东周诸侯', titleEn: 'Eastern Zhou States', desc: '春秋五霸，礼乐征伐自诸侯出。孔子删述六经，老子留下道德经。铁器普及，井田制瓦解，百家争鸣即将爆发。' },
  bactria: { title: '巴克特里亚', titleEn: 'Bactria', desc: '中亚文明的十字路口。波斯帝国的东部行省，连接印度与草原。亚历山大将从这里进军印度，后来的希腊-巴克特里亚王国在此绽放东西交融的奇异之花。' },
  rome: { title: '罗马帝国', titleEn: 'Roman Empire', desc: '从苏格兰到美索不达米亚，地中海成为内湖。罗马法、拉丁语、基督教将塑造整个西方文明。但三世纪危机的阴影已在边境聚集。' },
  parthia: { title: '帕提亚帝国', titleEn: 'Parthian Empire', desc: '马上弓箭手的帝国。他们以轻骑兵回旋战术击败克拉苏，与罗马在亚美尼亚和美索不达米亚拉锯。丝绸之路的中转站。' },
  han: { title: '汉帝国', titleEn: 'Han Empire', desc: '汉族之名由此而来。造纸术、地动仪、史记。丝绸之路开通，佛教初入中原。但外戚、宦官与豪强正蛀空这座大厦。' },
  kushan: { title: '贵霜帝国', titleEn: 'Kushan Empire', desc: '大月氏的后裔，中亚的熔炉。犍陀罗佛像融合希腊阿波罗与印度菩萨，佛教由此走向中亚与中国。' },
  steppe_200: { title: '草原诸部', titleEn: 'Steppe Peoples', desc: '匈奴分裂，鲜卑、乌桓、丁零角逐草原。他们的迁徙与征服将在未来数百年重塑从欧洲到中国的政治版图。' },
  xiongnu: { title: '匈奴', titleEn: 'Xiongnu', desc: '冒顿单于的遗产。北匈奴西迁将触发欧亚民族多米诺，南匈奴内附成为五胡十六国的先声。草原帝国的组织模式被后世继承。' },
  arabia_200: { title: '阿拉伯', titleEn: 'Arabia', desc: '沙漠与绿洲的部落世界。纳巴泰人控制乳香贸易，麦加尚未成为宗教中心。六百年后，这里将诞生改变世界的信仰。' },
  nubia: { title: '努比亚', titleEn: 'Nubia', desc: '埃及以南的黑人王国。麦罗埃有自己的金字塔、文字与冶铁业。他们曾征服埃及建立第二十五王朝，又独立发展数百年。' },
  song: { title: '北宋', titleEn: 'Northern Song', desc: '文人政治的高峰，经济革命的先声。交子（纸币）、运河、科举。但燕云十六州的缺失与西夏、辽的压力始终如影随形。' },
  liao: { title: '契丹（辽）', titleEn: 'Khitan (Liao)', desc: '游牧民族建立的双轨制帝国。契丹大字与小字并行，佛教与萨满共存。他们的失败后裔西迁中亚，建立西辽。' },
  byzantium: { title: '拜占庭帝国', titleEn: 'Byzantine Empire', desc: '罗马的东半身在千年后仍自称罗马帝国。希腊火、东正教、君士坦丁堡的城墙。但曼齐刻尔特的惨败将在七十年后摧毁安纳托利亚。' },
  holy_roman: { title: '神圣罗马帝国', titleEn: 'Holy Roman Empire', desc: '既不神圣，也非罗马，更非帝国。德意志国王兼任意大利国王，教皇加冕赋予合法性。七选侯制度即将成型。' },
  france_1000: { title: '法兰西王国', titleEn: 'Kingdom of France', desc: '巴黎岛伯爵的王权微弱到需要向诺曼底公爵求助。封建金字塔层层分封，骑士比武与城堡建筑风靡。' },
  england_1000: { title: '英格兰王国', titleEn: 'Kingdom of England', desc: '阿尔弗雷德大帝的后裔统治着盎格鲁-撒克逊人的土地。诺曼底公爵威廉是忏悔者爱德华的表亲，也是王位的觊觎者。' },
  kievan_rus: { title: '基辅罗斯', titleEn: 'Kievan Rus', desc: '东斯拉夫人的第一个国家。弗拉基米尔受洗选择东正教，而非伊斯兰教或天主教。基辅的圣索菲亚大教堂见证这段历史。' },
  abbasid: { title: '阿拔斯哈里发', titleEn: 'Abbasid Caliphate', desc: '黑衣大食，伊斯兰世界的学术灯塔。代数学、医学、天文学在此发展。但哈里发已成为傀儡，白益与塞尔柱将军掌握实权。' },
  fatimid: { title: '法蒂玛王朝', titleEn: 'Fatimid Caliphate', desc: '什叶派的伊斯玛仪派哈里发国，自称穆罕默德之女法蒂玛的后裔。开罗、爱资哈尔、北非与埃及的繁荣。' },
  chola: { title: '朱罗王朝', titleEn: 'Chola Dynasty', desc: '南印度的海上强权。朱罗舰队控制印度洋，远征苏门答腊与马来半岛。青铜湿婆舞王像至今仍是印度艺术的巅峰。' },
  japan_1000: { title: '日本', titleEn: 'Japan', desc: '平安京的贵族们在和歌与物哀中消磨时光。藤原道长垄断摄关职位，源氏物语描绘的浮世绘卷。武士在庄园中悄然崛起。' },
  viking: { title: '维京世界', titleEn: 'Viking World', desc: '从北美到里海，维京人的长船无所不至。他们是掠夺者，也是商人、殖民者、雇佣兵。诺曼人、罗斯人、瓦兰吉卫队都是他们的化身。' },
  cordoba: { title: '科尔多瓦', titleEn: 'Caliphate of Córdoba', desc: '欧洲最璀璨的伊斯兰文明。科尔多瓦大清真寺、图书馆、灌溉农业。犹太医生与翻译家在此活跃，为日后的文艺复兴保存火种。' },
  ghana: { title: '加纳帝国', titleEn: 'Ghana Empire', desc: '黄金之国，西非第一个大帝国。跨撒哈拉商队带来盐、丝绸与知识。伊斯兰教在商人中传播，但王权仍信奉传统宗教。' },
  ming: { title: '明朝', titleEn: 'Ming Dynasty', desc: '推翻蒙古统治的汉族王朝。永乐大帝派遣郑和七下西洋，船队规模空前。随后转向内敛，长城重修，海禁严格执行。' },
  golden_horde: { title: '金帐汗国', titleEn: 'Golden Horde', desc: '拔都的遗产，统治俄罗斯长达两个世纪。萨莱的繁华与草原的残酷。莫斯科大公通过收集贡赋获得汗的信任，暗中积蓄力量。' },
  timurid: { title: '帖木儿帝国', titleEn: 'Timurid Empire', desc: '自称成吉思汗后裔的突厥化蒙古人。撒马尔罕的蓝色穹顶、比比哈努姆清真寺。帝国随帖木儿之死迅速分裂，但文化影响延续至莫卧儿。' },
  ottoman_1400: { title: '奥斯曼', titleEn: 'Ottoman Sultanate', desc: '安纳托利亚边境的贝伊国成长为巴尔干霸主。耶尼切里军团、德米舍梅制度。君士坦丁堡的城墙已能听到乌尔班大炮的轰鸣。' },
  england_1400: { title: '英格兰', titleEn: 'Kingdom of England', desc: '兰开斯特的红玫瑰。亨利五世在阿金库尔以长弓手击败法国骑士，莎士比亚将为此谱写不朽篇章。' },
  france_1400: { title: '法兰西', titleEn: 'Kingdom of France', desc: '瓦卢瓦的百合花。百年战争中最黑暗的时刻，勃艮第与英国结盟。圣女贞德将在洛林出现，以神启之名拯救王太子。' },
  mali: { title: '马里帝国', titleEn: 'Mali Empire', desc: '曼萨·穆萨的帝国，黄金产量震惊世界。廷巴克图的桑科雷大学，伊斯兰学术在西非的灯塔。他的麦加朝圣导致开罗金价暴跌。' },
  delhi: { title: '德里苏丹国', titleEn: 'Delhi Sultanate', desc: '突厥-阿富汗军事贵族统治印度。顾特卜塔高耸入云，伊斯兰建筑与印度传统融合。苏菲圣人使伊斯兰教深入民间。' },
  andean: { title: '安第斯世界', titleEn: 'Andean World', desc: '印加帝国正在崛起，奇穆王国走向衰落。没有文字，但奇普结绳记事系统复杂精密。马铃薯与藜麦支撑高原文明。' },
  aztec: { title: '墨西哥谷', titleEn: 'Valley of Mexico', desc: '阿兹特克三城同盟以特诺奇蒂特兰为首。湖心岛上的城市比欧洲任何城市都大，金字塔神庙与浮动花园并存。' },
  british_empire: { title: '大英帝国', titleEn: 'British Empire', desc: '工业革命改变人类。蒸汽机、工厂、铁路。拿破仑战争中的胜利者，即将成为日不落帝国。议会改革与废奴运动正在进行。' },
  british_n_america: { title: '英属北美', titleEn: 'British North America', desc: '加拿大与加勒比殖民地。毛皮贸易、种植园经济、流放罪犯。美国独立后，忠诚派北迁改变加拿大人口结构。' },
  usa: { title: '美国', titleEn: 'United States', desc: '新共和国的扩张。路易斯安那购地使领土翻倍，刘易斯与克拉克探险深入西部。奴隶制与自由的矛盾正在发酵。' },
  qing: { title: '大清帝国', titleEn: 'Qing China', desc: '康乾盛世的余晖。四库全书编纂，疆域达到极盛。但闭关锁国、人口爆炸与鸦片贸易的隐患正在积累。白莲教起义动摇根基。' },
  russia_1800: { title: '俄罗斯帝国', titleEn: 'Russian Empire', desc: '击败拿破仑后的欧洲宪兵。十二月党人起义前的专制帝国。西伯利亚流放、农奴制、普希金的诗歌。阿拉斯加尚未出售。' },
  france_1800: { title: '法兰西', titleEn: 'France', desc: '拿破仑·波拿巴的帝国。民法典统一法律，公立教育培养公民，大军团横扫欧洲。但西班牙泥潭与俄罗斯寒冬将终结这一切。' },
  spain_1800: { title: '西班牙', titleEn: 'Spain', desc: '波旁改革的失败。美洲殖民地独立运动风起云涌，本土被拿破仑占领，游击战诞生。' },
  portugal_1800: { title: '葡萄牙', titleEn: 'Portugal', desc: '布拉干萨王朝，巴西仍是殖民地。里斯本在1755年大地震后重建为启蒙城市。王室将在不久后逃亡里约。' },
  british_india: { title: '英属印度', titleEn: 'British India', desc: '东印度公司从商人变为统治者。普拉西战役、迈索尔战争、马拉塔联盟瓦解。印度次大陆逐渐纳入英国全球体系。' },
  australia_1800: { title: '英属澳大利亚', titleEn: 'British Australia', desc: '新南威尔士与范迪门地。流放殖民地转型为自由移民社会。原住民人口锐减，羊毛成为经济命脉。' },
  spanish_america: { title: '西班牙美洲', titleEn: 'Spanish America', desc: '从加利福尼亚到火地岛，克里奥尔精英对马德里的不满达到顶点。独立战争将诞生一系列新国家。' },
  brazil_1800: { title: '葡萄牙巴西', titleEn: 'Portuguese Brazil', desc: '里约热内卢是殖民帝国事实上的首都。咖啡种植园向内陆扩张，奴隶贸易虽遭英国压力仍持续。' },
  china_modern: { title: '中国', titleEn: 'China', desc: '改革开放四十余年，世界工厂与最大市场。高铁、移动支付、航天工程。台湾、南海、中美竞争是核心地缘议题。' },
  russia_modern: { title: '俄罗斯', titleEn: 'Russia', desc: '苏联解体后，以能源与军事维持大国地位。乌克兰危机后与国际社会对立加深，转向东方。' },
  usa_modern: { title: '美国', titleEn: 'United States', desc: '冷战胜利者，单极时刻已过。硅谷、好莱坞、华尔街定义全球文化。政治极化、种族矛盾挑战霸权根基。' },
  brazil_modern: { title: '巴西', titleEn: 'Brazil', desc: '金砖国家，亚马逊守护者。足球、桑巴、狂欢节。但贫富差距、暴力犯罪、政治腐败仍是发展瓶颈。' },
  india_modern: { title: '印度', titleEn: 'India', desc: '最大民主国家，IT与制药强国。印度教民族主义崛起，种姓制度在现代变形。印太战略中的关键摇摆力量。' },
  australia_modern: { title: '澳大利亚', titleEn: 'Australia', desc: '南半球发达国家，资源与教育出口大国。在美中竞争中寻求平衡，气候变化与山火威胁独特生态系统。' },
  canada: { title: '加拿大', titleEn: 'Canada', desc: '双语多元文化模范，北极主权主张国。能源管道争议、原住民和解、与美国复杂共生关系。' },
  europe_modern: { title: '欧洲联盟', titleEn: 'European Union', desc: '战后和平工程，27国联邦实验。欧元危机、英国脱欧、难民潮、右翼崛起。法德轴心能否继续推动一体化？' },
  japan_modern: { title: '日本', titleEn: 'Japan', desc: '失去的三十年后寻求再通胀。动漫、游戏、精密制造全球领先。老龄化、少子化、宪法第九条是长期挑战。' },
  middle_east_modern: { title: '中东', titleEn: 'Middle East', desc: '石油、宗教、帝国遗产的交汇。阿拉伯之春失败后的威权复辟，伊朗-沙特代理战争，以色列与巴勒斯坦的未解冲突。' },
  africa_modern: { title: '非洲', titleEn: 'Africa', desc: '人口最年轻的洲，2050年将占世界人口四分之一。城市化、移动支付、中国投资。但冲突、债务、气候脆弱性仍是障碍。' },
  arctic_ocean: { title: '北冰洋', titleEn: 'Arctic Ocean', desc: '地球最北的海洋，大部分被海冰覆盖。因纽特人在其南缘建立了适应极寒的狩猎文明。气候变暖正在改变北极航道的地缘格局。' },
  pacific1: { title: '太平洋', titleEn: 'Pacific Ocean', desc: '占地球表面三分之一的最大海洋。南岛语族的航海壮举横跨这片蓝色大陆，从东南亚扩散至夏威夷、新西兰与复活节岛。' },
  antarctic_sea: { title: '南极海', titleEn: 'Southern Ocean', desc: '环绕南极洲的极寒海域。强劲的环极洋流将南极与世界其他海洋隔开，创造了独特的生态系统。' },
  atlantic: { title: '大西洋', titleEn: 'Atlantic Ocean', desc: '分隔欧非与美洲的大洋。从维京人的冒险到哥伦布的航行，大西洋的跨越改写了世界历史的进程。' },
  indian_ocean: { title: '印度洋', titleEn: 'Indian Ocean', desc: '季风驱动的贸易之海。从阿拉伯商人到郑和船队，印度洋贸易网络连接了东非、阿拉伯、印度与东南亚。' },
  pacific2: { title: '太平洋', titleEn: 'Pacific Ocean', desc: '太平洋西部，火山与珊瑚岛链点缀其间。波利尼西亚人凭借星象导航征服了这片广袤水域，创造了人类航海史上最伟大的篇章。' },
  antarctica: { title: '南极洲', titleEn: 'Antarctica', desc: '地球上最冷、最干燥、风速最高的大洲。冰盖厚达四千米，封存着地球气候变迁的珍贵记录。1959年《南极条约》将其定为和平与科研之地。' },
  india: { title: '印度', titleEn: 'India', desc: '南亚次大陆，世界上最古老的文明之一。从吠陀时代到莫卧儿帝国，从佛教到印度教，这片土地孕育了丰富的宗教、哲学与艺术传统。' },
  italia: { title: '意大利', titleEn: 'Italia', desc: '地中海心脏的靴形半岛。伊特鲁里亚、希腊殖民城邦与拉丁部落在此交汇，最终罗马从一个小城邦崛起为统治整个地中海的帝国。' },
  zhao: { title: '赵国', titleEn: 'State of Zhao', desc: '战国七雄之一，位于今山西、河北一带。赵武灵王推行胡服骑射，使赵国军事实力大增。长平之战四十万降卒被坑杀，成为战国最惨烈的悲剧。' },
  yan: { title: '燕国', titleEn: 'State of Yan', desc: '战国七雄中最北的诸侯国，都城蓟（今北京）。燕昭王筑黄金台招贤纳士，乐毅连下齐国七十余城。荆轲刺秦王的壮举流传千古。' },
  qi: { title: '齐国', titleEn: 'State of Qi', desc: '东方大国，临淄是战国最繁华的都市。稷下学宫汇聚诸子百家，孟子、荀子、邹衍皆在此讲学。齐国以工商立国，鱼盐之利甲天下。' },
  wei: { title: '魏国', titleEn: 'State of Wei', desc: '三家分晋后最早变法的诸侯。魏文侯任用李悝、吴起，率先推行法治改革。但魏国四战之地，人才外流严重——商鞅、孙膑皆出走他国。' },
  han_state: { title: '韩国', titleEn: 'State of Han', desc: '战国七雄中最小的国家，位于中原腹地。以强弩著称，劲弩之国名不虚传。韩非子集法家大成，却死于自己理论所武装的秦国狱中。' },
  chu: { title: '楚国', titleEn: 'State of Chu', desc: '南方最大的诸侯国，疆域辽阔。楚文化瑰丽浪漫：屈原的《离骚》开辟文学传统，曾侯乙编钟震撼世界。楚虽三户，亡秦必楚。' },
  steppe: { title: '草原诸部', titleEn: 'Steppe Peoples', desc: '欧亚草原上的游牧民族群体。匈奴分裂后，鲜卑、乌桓、丁零等部族角逐。他们的大迁徙浪潮将在未来数百年重塑从欧洲到中国的政治版图。' },
  arabia: { title: '阿拉伯', titleEn: 'Arabia', desc: '沙漠与绿洲构成的部落世界。乳香贸易路线穿越半岛，纳巴泰人在佩特拉凿岩建城。六百年后，伊斯兰教将从麦加的沙漠中崛起，改变世界格局。' },
  silk_road: { title: '丝绸之路', titleEn: 'Silk Road', desc: '连接东西方文明的万里商道。丝绸、香料、宝石与思想沿途流通。佛教东传、罗马玻璃入华、粟特商人穿梭其间——这条路塑造了欧亚大陆的文化基因。' },
  aboriginal: { title: '诸多原住民部落联盟', titleEn: 'Aboriginal Confederations', desc: '澳大利亚原住民。' },

let currentEraId = '1000ce';
let selectedRegionId = null;
let isPlaying = false;
let playInterval = null;
let hotspotsVisible = true;

function init() {
  // Timeline nodes
  document.querySelectorAll('.t-node').forEach(node => {
    node.addEventListener('click', () => setEra(node.dataset.year));
  });

  // Nav tabs
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  // Layer toggles
  document.querySelectorAll('.layer-item').forEach(item => {
    item.addEventListener('click', () => {
      const eye = item.querySelector('.eye-icon');
      const isOn = eye.getAttribute('stroke') !== 'var(--ink-faint)';
      if (isOn) {
        eye.setAttribute('stroke', 'var(--ink-faint)');
        eye.querySelector('circle').setAttribute('fill', 'none');
        if (item.dataset.layer === 'political') hotspotsVisible = false;
      } else {
        eye.setAttribute('stroke', 'var(--accent)');
        eye.querySelector('circle').setAttribute('fill', 'var(--accent)');
        if (item.dataset.layer === 'political') hotspotsVisible = true;
      }
      updateHotspotsVisibility();
    });
  });

  document.getElementById('overlay').addEventListener('click', closePanel);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePanel();
  });

  const img = document.getElementById('map-image');
  img.addEventListener('load', syncOverlay);
  window.addEventListener('resize', syncOverlay);
  syncOverlay();

  setEra('1000ce');
}

// Keep hotspots-overlay exactly on top of the rendered image area
function syncOverlay() {
  const img = document.getElementById('map-image');
  const overlay = document.getElementById('hotspots-overlay');
  const container = document.getElementById('map-container');
  if (!img.naturalWidth) return;

  const containerRect = container.getBoundingClientRect();
  const imgRect = img.getBoundingClientRect();

  // offset relative to container
  const left = imgRect.left - containerRect.left;
  const top = imgRect.top - containerRect.top;
  overlay.style.left = left + 'px';
  overlay.style.top = top + 'px';
  overlay.style.width = imgRect.width + 'px';
  overlay.style.height = imgRect.height + 'px';
}

function setEra(eraId) {
  if (!eraId || !hotspotsData[eraId]) return;
  const prevEraId = currentEraId;
  currentEraId = eraId;

  // Update timeline nodes
  const eraIdx = eras.findIndex(e => e.id === eraId);
  document.querySelectorAll('.t-node').forEach((n, i) => {
    n.classList.toggle('active', n.dataset.year === eraId);
    n.classList.toggle('visited', i < eraIdx);
  });

  // Update progress bar
  const progress = document.getElementById('timeline-progress');
  const pct = (eraIdx / (eras.length - 1)) * 100;
  progress.style.width = pct + '%';

  const era = eras.find(e => e.id === eraId);
  if (!era) return;

  // Update year display
  document.getElementById('current-year-display').textContent = era.yearLabel;

  // Show era transition for dramatic effect (skip on first load)
  if (prevEraId !== eraId && prevEraId) {
    const trans = document.getElementById('era-transition');
    const transText = document.getElementById('era-transition-text');
    transText.textContent = era.yearLabel;
    trans.classList.add('active');
    setTimeout(() => trans.classList.remove('active'), 800);
  }

  // Fade map
  const img = document.getElementById('map-image');
  img.classList.add('fade-out');
  setTimeout(() => {
    img.src = era.src;
    img.onload = () => { img.classList.remove('fade-out'); syncOverlay(); };
    if (img.complete) img.classList.remove('fade-out');
  }, 450);

  renderHotspots(eraId);

  if (selectedRegionId) {
    const exists = hotspotsData[eraId].some(h => h.id === selectedRegionId);
    if (exists) openPanel(selectedRegionId);
    else closePanel();
  }
}

function renderHotspots(eraId) {
  const overlay = document.getElementById('hotspots-overlay');
  overlay.innerHTML = '';
  const list = hotspotsData[eraId] || [];

  // Create SVG for polygon hotspots
  const hasPoly = list.some(h => h.type === 'poly');
  let svg = null;
  if (hasPoly) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'hotspots-svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');
    overlay.appendChild(svg);
  }

  list.forEach((h, idx) => {
    if (h.type === 'poly' && h.points) {
      // Polygon hotspot
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      const pts = h.points.map(p => p.x + ',' + p.y).join(' ');
      polygon.setAttribute('points', pts);
      polygon.setAttribute('class', 'hotspot-poly');
      polygon.setAttribute('data-id', h.id);
      polygon.addEventListener('click', (e) => { e.stopPropagation(); openPanel(h.id); });
      svg.appendChild(polygon);
    } else {
      // Rectangle hotspot (original behavior)
      const div = document.createElement('div');
      div.className = 'hotspot pulse';
      div.style.cssText = `top:${h.top}%;left:${h.left}%;width:${h.w}%;height:${h.h}%;animation-delay:${idx*0.15}s`;
      div.dataset.id = h.id;
      div.dataset.name = h.name;
      div.addEventListener('click', (e) => { e.stopPropagation(); openPanel(h.id); });
      overlay.appendChild(div);
    }
  });
  updateHotspotsVisibility();
}

function updateHotspotsVisibility() {
  const overlay = document.getElementById('hotspots-overlay');
  overlay.style.opacity = hotspotsVisible ? '1' : '0';
  overlay.style.pointerEvents = hotspotsVisible ? 'auto' : 'none';
}

function openPanel(regionId) {
  selectedRegionId = regionId;
  const info = regionDetails[regionId];
  if (!info) return;

  document.querySelectorAll('.hotspot').forEach(h => {
    const isSelected = h.dataset.id === regionId;
    h.style.borderColor = isSelected ? 'var(--accent)' : '';
    h.style.background = isSelected ? 'rgba(107,196,184,0.12)' : '';
    h.style.boxShadow = isSelected ? '0 0 30px rgba(107,196,184,0.15), inset 0 0 20px rgba(107,196,184,0.05)' : '';
    h.style.zIndex = isSelected ? '20' : '';
  });

  const era = eras.find(e => e.id === currentEraId);
  const currentHotspot = (hotspotsData[currentEraId] || []).find(h => h.id === regionId);

  document.getElementById('panel-title').textContent = info.title;
  document.getElementById('panel-title-en').textContent = info.titleEn;

  const body = document.getElementById('panel-body');
  body.innerHTML = `

const usaFullText = {
  ch1: `最早的美洲人

在欧洲人"发现"美洲之前，这片大陆已经有人住了——而且住了很久很久。

具体有多久？根据2021年在美国新墨西哥州白沙国家公园发现的人类脚印化石，答案是至少2.3万年。这个发现相当震撼，因为它把人类踏足美洲的时间往前推了好几千年。

这些最早的美洲人是怎么来的？主流理论认为，他们是从西伯利亚走过来的。当时正值冰河时期，海平面比现在低得多，亚洲和北美之间露出了一片陆地，学术上叫"白令陆桥"。一群追逐猎物的猎人，可能根本没意识到自己正在"跨洲迁徙"，就这么一路走到了美洲。

不过，近年来的考古发现让事情变得更复杂了。有证据显示，一部分早期移民可能是坐船来的——从波利尼西亚，甚至从日本。DNA研究还发现了疑似来自欧洲的基因痕迹。美洲最早居民的来源，很可能比我们想象的更加多元。

克洛维斯人：美洲最早的"文化名片"

在早期美洲人中，有一群人特别出名，叫"克洛维斯人"，活跃在大约1.3万到1.2万年前。

他们出名不是因为建了什么宏伟建筑——那个时代还没这条件——而是因为他们留下的石器太有特点了。克洛维斯人打造的石质矛头，两面都经过精细加工，有一种独特的"凹槽"设计，方便绑在木杆上。这种工艺在当时的美洲遍地开花，从北美到南美都有出土，说明克洛维斯文化的影响范围相当广。

他们的食谱也挺壮观的。猛犸象、乳齿象、古风野牛、地懒——这些现在只能在博物馆里看到的史前巨兽，都是克洛维斯人的盘中餐。当然，他们不是只吃肉，考古发现他们还采集上百种植物。

从狩猎到农业：美洲文明的起点

时间来到公元前8000年左右，美洲进入了"古代阶段"。

真正的转折点是农业的出现，大约在公元前5000年。美洲农业最重要的贡献，是一种叫"玉米"的作物。最早的玉米长得其实很寒酸，穗子只有手指那么大。但经过美洲原住民几千年的培育，它变成了高产、耐旱、适应性极强的作物。今天，玉米是全世界总产量最高的粮食作物——超过了小麦和水稻。

农业改变了一切。人们不用再整天迁徙了，可以定居下来。村庄出现了，然后是城镇，然后是城市。文明的种子，就这样在美洲土地上发芽了。

印加帝国：美洲最大的帝国

印加人的崛起相当晚，也相当快。公元15世纪初，他们还只是秘鲁库斯科山区里的一个小部落。然后，一个叫帕查库特克的领袖上台了——"改变世界的人"。到16世纪初，印加帝国的版图已经覆盖了几乎整个南美洲西海岸，南北跨度超过4000公里。

他们修建了总长超过3万公里的道路网。他们有"奇普"结绳记事系统。他们的君主"萨帕印加"被认为是太阳神因蒂的后裔。

玛雅文明：城邦、文字与神秘的衰落

玛雅文明最早可追溯到公元前2000年。但玛雅从来不是统一的帝国，它更像古希腊——一堆城邦各自为政。

玛雅人最牛的成就是文字系统——整个美洲唯一被基本破译的古代文字。他们用二十进制，发明了"0"的概念，比欧洲人早了几百年。历法精确度超过同时期欧洲。

从公元9世纪开始，南部低地的玛雅城邦一个接一个崩溃。原因至今是谜。但玛雅文明并没有完全消失，今天仍有数百万玛雅人后裔生活在墨西哥和中美洲。

阿兹特克帝国：嗜血的霸主

大约在1325年，墨西卡人在湖心岛上建立了特诺奇提特兰。传说他们看到一只鹰站在仙人掌上叼着一条蛇——今天墨西哥国徽上就有这只鹰。

到西班牙人到来前，人口超过20万，比当时欧洲大多数城市都大。阿兹特克人的人祭规模令人震惊——他们相信太阳神需要人血作为"燃料"才能继续升起。

北美：没有帝国，但并非空白

北美原住民发展出了多种多样的文化：因纽特人在北极猎海豹，普韦布洛人建造多层泥砖建筑，林地印第安人种植"三姐妹"（玉米、豆类、南瓜），平原印第安人追逐野牛。

易洛魁联盟是著名的政治组织——松散的邦联，成员部落在外交和战争上协调行动。有学者认为美国联邦制可能受其启发。

美洲文明为何"落后"于欧洲？

地理是重要因素——美洲南北走向，跨越几乎所有气候带，技术传播困难。动物也是关键——大型可驯化动物在冰河时期末期几乎灭绝了，没有马、牛、羊，就没有畜力，车轮也失去了发展动力。还有疾病——欧亚大陆人和家畜接触了几千年演化出的传染病，对美洲人来说是生化武器。

历史从来不是公平的竞赛。`,
  ch2: `大航海时代的背景

15世纪的欧洲发生了深刻变化。黑死病后劳动力稀缺导致工资上涨，封建制度松动。文艺复兴重新发掘古希腊罗马知识，航海技术进步，对东方财富的渴望达到顶点。

奥斯曼帝国像铁幕横亘东西方之间，每件东方商品都要经过层层加价。西欧人想绕过"中间商"，找一条直达东方的新路。

葡萄牙人开路

"航海家恩里克"王子在萨格里什建立航海研究中心。1441年，葡萄牙人带回第一批黑人奴隶——开启了持续四个世纪的罪恶贸易。1488年迪亚士绕过好望角，1498年达·伽马到达印度。

哥伦布：向西航行的疯狂赌徒

哥伦布估算从欧洲向西4000公里就能到日本。实际距离超过19000公里。如果美洲不存在，他和船员会死在半路上。

四处碰壁后，西班牙女王伊莎贝拉赌了一把。1492年8月3日，三艘帆船从帕洛斯港出发。

10月12日凌晨看到陆地。哥伦布坚信到达了亚洲——他至死都拒绝承认这是新大陆。他在日记中写下对泰诺人的第一印象："用50个人就能征服他们全部。"

为什么叫"阿美利加"而不是"哥伦布大陆"？因为意大利人韦斯普奇首先认识到这是一块全新的大陆，而不是哥伦布坚持的"亚洲延伸"。1507年制图师用韦斯普奇的名字命名了这片土地。

西班牙的征服

1519年科尔特斯率500人登陆墨西哥。利用内部矛盾结盟数万仇恨阿兹特克的部落，加上武器代差和天花瘟疫，1521年摧毁特诺奇提特兰。

皮萨罗用类似套路征服印加帝国。印加皇帝用整整一屋子黄金赎身，皮萨罗收了黄金然后还是处死了他。

人口灾难

天花、麻疹、流感——美洲原住民的免疫系统从未接触过这些病原体。整个美洲人口从约5000万至1亿降到500万至1000万。90%甚至95%的原住民在150年里消失了。

人口锐减→劳动力短缺→从非洲进口奴隶。约1200万非洲人被强行运往美洲。

西班牙帝国的讽刺

西班牙控制了当时世界金银总量的83%。但大量金银涌入导致通货膨胀近4倍，本土手工业被冲垮。等到美洲银矿产量下降，西班牙发现自己已经空心化了。美洲的财富最终流向了英国、荷兰、法国的商人——他们用赚到的钱取代西班牙成为新的世界霸主。

其他玩家入场

法国人专注毛皮贸易，和印第安人关系相对融洽。荷兰人建立了"新阿姆斯特丹"（后来的纽约）。但对美洲未来影响最大的，是英国。`,
  ch3: `英国人姗姗来迟

16世纪中叶的英国还不是什么强国。伊丽莎白一世时期开始关注美洲，但用的是"特许状"模式——政府不掏钱，坐等民间资本冒险。

罗阿诺克：消失的殖民地

1587年117名殖民者登上罗阿诺克岛。领袖怀特回英国求援，因为无敌舰队来袭三年后才返回，发现所有人消失了。唯一线索是树上刻的"CROATOAN"。四百多年来至今没有定论。

詹姆斯敦：在死亡边缘站稳脚跟

1607年弗吉尼亚公司的104名殖民者建立詹姆斯敦——英国第一个永久殖民地。选址在沼泽地，蚊子肆虐，饮用水污染。大量"绅士"不干活只找金子。到年底只剩38人。

约翰·史密斯推行"不劳动者不得食"。1609年"饥饿时期"，500人只剩60人，甚至出现人吃人——2012年考古确实发现了有刀切痕迹的女孩遗骸。

烟草成为救命稻草。1612年约翰·罗尔夫引进温和品种，弗吉尼亚终于找到赚钱门路。罗尔夫还娶了波卡洪塔斯——她1616年访问英国受到热烈欢迎，但返程前染病去世，年仅21岁。

1619年：两件大事

同一年：弗吉尼亚议会诞生（北美第一个民选立法机构），第一批非洲黑人抵达英属北美。民主萌芽和奴隶制引入，同一块硬币的两面。

最早的非洲人身份比较模糊——安东尼·约翰逊获自由后自己也成了地主。但到17世纪末，终身的、基于种族的奴隶制已牢固确立。

五月花号

1620年102人签署《五月花号公约》——人民自己通过契约建立政府。第一个冬天只剩一半人。万帕诺亚格印第安人帮助了他们——不是因为善良，而是瘟疫削弱了他们的实力，需要和带火枪的白人结盟自保。

马萨诸塞湾："山巅之城"

1630年温斯罗普宣称要成为"山巅之城，万众瞩目"。这种使命感贯穿美国历史。但清教徒追求的是自己的宗教自由，不是所有人的——异见者被驱逐，贵格会教徒被鞭打甚至绞死。

培根起义与种族工具的发明

1676年白人黑人穷人联合起义。镇压后，统治者系统性地加深种族裂痕：改善白人待遇，把黑人推向终身奴隶制。让穷白人觉得至少比黑人强，他们就不会造反。种族成为统治工具。

塞勒姆女巫审判

1692年，19人被绞死，1人被石头压死。当恐惧压倒理性、指控不需要证据时，任何人都可能成为受害者。1950年代麦卡锡主义被称为"现代猎巫"。

威廉·佩恩的"神圣实验"

贵格会教徒佩恩建立宾夕法尼亚——真正的宗教宽容，土地从印第安人购买而非强占。费城成为殖民地最繁荣的城市之一。1688年《日耳曼敦抗议书》是美洲第一份反奴隶制公开文件。

十三殖民地形成

北方：小农经济、渔业、商业，奴隶不多，清教传统重教育。南方：种植园经济，大规模奴隶制，社会等级分明。中部：最多元化。到18世纪中叶总人口超过100万。`,
  ch4: `法国人的北美

新法兰西的总人口只有约7万，英属殖民地已超100万。法国控制的是一条线（河流沿岸贸易站），不是一片。一旦开战，人力远远不够。

七年战争：决定北美命运

1753年21岁的华盛顿被派去警告法国人。1754年他打死法国军官——战争稀里糊涂地开始了。最初英国人惨败，1759年攻陷魁北克，1763年《巴黎条约》法国退出北美。

英国赢了，但国债翻番。《1763年公告》禁止殖民者越过阿巴拉契亚山脉——殖民者怒了。

"无代表，不纳税"

1765年《印花税法》——第一次直接税。殖民者暴力抵制，"自由之子"涂焦油粘羽毛。1766年废除。

1770年"波士顿惨案"——5名波士顿人被射杀。为士兵辩护的律师是约翰·亚当斯。

1773年波士顿倾茶——342箱茶叶入海。英国以"不可容忍法令"回应，反而团结了殖民地。

第一届大陆会议

1774年十二个殖民地56名代表齐聚费城。通过《殖民者权利宣言》，建立通信委员会网络。革命的基础设施悄悄建立。

莱克星顿：第一枪

1775年4月19日，"响彻世界的枪声"。英军撤退途中遭民兵不断袭击，损失73死174伤。

《常识》：思想转折点

1776年1月，潘恩用最简单的语言论证独立："一个小岛凭什么统治一个大陆？"三个月内卖出10万册。

《独立宣言》

1776年7月4日。"人人生而平等，造物主赋予他们若干不可剥夺的权利。"但谴责奴隶贸易的段落被删除。56人签名，以生命为赌注。

独立战争

1776年圣诞夜华盛顿渡河奇袭特伦顿。1777年萨拉托加近6000英军投降——促成法国参战。1781年约克镇康沃利斯投降，英国军乐队演奏"世界颠倒了"。

1783年《巴黎条约》正式承认美国独立。

革命的另一面

约15-20%殖民者是效忠派，6-8万人流亡加拿大。成千上万黑人为英国作战——因为英国答应给他们自由。大多数印第安部落支持英国——因为殖民者对土地的贪婪威胁更大。

"人人生而平等"的承诺并没有适用于黑人奴隶、女性和原住民。`,
  ch5: `胜利之后：现在怎么办？

邦联政府极其虚弱——不能征税、不能管理贸易、不能强制执行决定。像一个没有工资没有权力的物业管理员。

各州各自为政，互设关税壁垒，货币混乱。国债4200万美元无力偿还。

谢斯起义

1786年马萨诸塞农民起义。退伍军人还不起债务，农场被没收。邦联政府无力镇压——连军队都没有。最后靠州政府自己筹钱解决。

华盛顿在信中写道："如果政府不能保护公民的财产，那还要政府干什么？"

费城制宪会议

1787年55名代表关门密谈四个月。弗吉尼亚方案提出三权分立。

大妥协：众议院按人口，参议院每州两席。五分之三妥协：每个奴隶算五分之三个人计算代表权——臭名昭著的政治交易。

宪法避免使用"奴隶"一词，逃奴条款强迫北方州帮助抓捕逃奴。妥协把定时炸弹埋入地基，七十年后炸裂国家。

选举人团制度也是妥协产物——大州多选举人，小州也有权重。已发生五次赢得普选票却输掉总统选举的情况。

批准之争

联邦党人vs反联邦党人。反对派最大质疑：没有权利法案！1788年宪法生效，1791年权利法案通过。

汉密尔顿vs杰斐逊

汉密尔顿：建国家银行、承担国州债、保护制造业——要把美国变成商业工业大国。
杰斐逊：独立自耕农是社会中坚，工厂雇工没有独立性——理想的美国是农业共和国。

首都建在南方的华盛顿，是南方同意联邦承担州债的交换条件。

宪法解释之争至今存在：联邦政府的权力边界在哪里？

1800年的革命

杰斐逊击败亚当斯——第一次政权和平转移。在当时世界上几乎闻所未闻。证明体制可以承受政党轮替，可以通过选举而不是暴力解决分歧。`,
  ch6: `棉花王国的崛起

1793年惠特尼发明轧棉机。棉花出口从150万磅飙升到1860年的20亿磅。奴隶从70万增至近400万。"棉花为王"——但惠特尼的初衷是减少对奴隶的依赖。历史的讽刺莫过于此。

两个美国

南方：种植园经济、奴隶制、崇尚"骑士精神"。北方：工业革命、工厂铁路城市、强调"自由劳动"。

南方从"必要的罪恶"转向宣称奴隶制是"正面的善"——黑人天生低劣需要白人"照顾"，《圣经》也支持。当经济体系建立在某种制度上时，人们总能找到理由辩护。

西进与奴隶制碰撞

每一块新领土都引发同一个问题：允许奴隶制吗？1820年密苏里妥协、1850年妥协案——一个接一个被打破。

1852年《汤姆叔叔的小屋》成为仅次于《圣经》的畅销书。1854年《堪萨斯-内布拉斯加法案》废除了密苏里妥协，堪萨斯变成流血的战场。

共和党1854年诞生，核心主张：阻止奴隶制扩张。1858年林肯-道格拉斯辩论让林肯全国闻名。

分裂

1860年林肯当选，普选票只有40%，南方十个州一张票都没拿到。南卡169:0票通过脱离。十一个州成立南方联盟。

内战

1861年4月12日萨姆特堡开火。北方人口2200万vs南方900万（含350万奴隶），工业90%在北方。但南方只需守住领土。

第一场"现代战争"：线膛步枪、铁甲舰、铁路、电报。但战术还停留在旧时代，排队冲锋迎面撞上更致命的火力。葛底斯堡三天5万伤亡，安提塔姆一天2万——美国历史上最血腥的一天。

1863年1月1日《解放奴隶宣言》。7月葛底斯堡——皮克特冲锋变成大屠杀；同日维克斯堡投降，密西西比河完全落入北方。林肯发表272词不朽演说。

1865年4月9日李将军投降，格兰特给予优厚条件。五天后林肯在福特剧院被暗杀。

总死亡人数可能高达75万——超过美国参与的所有其他战争的死亡总和。奴隶制终结，联邦不可分割——但种族问题远未解决。`,
  ch7: `重建的失败

约翰逊对南方白人极其宽大。"黑人法典"几乎是换了名字的奴隶制。国会"激进重建"让黑人第一次投票、参选、担任公职。但三K党恐怖活动横行。

1877年肮脏交易：共和党获总统，联邦军队撤出南方。重建终结。

吉姆·克劳

人头税、识字测验、祖父条款——系统性剥夺黑人投票权。路易斯安那黑人选民从13万降到1342人。

1896年"普莱西案"裁定种族隔离合宪——"分开但平等"。黑人沦为佃农的"债务奴役"。私刑照片被做成明信片出售。

镀金时代

洛克菲勒控制90%石油，卡内基主宰钢铁，1%的人拥有一半财富。"强盗大亨"们用掠夺性定价、秘密回扣、纵向整合垄断行业。

工人每周67小时，十岁童工在煤矿劳动。海马克特事件四名工运领袖被绞死，霍姆斯特德罢工军队镇压。劳资冲突接近阶级战争。

1880-1920年约2300万移民涌入。1882年《排华法案》——第一部针对特定族群的限制法。

进步主义

"扒粪者"记者揭露腐败——塔贝尔揭露标准石油，辛克莱的《屠场》曝光肉类加工业。

西奥多·罗斯福：反托拉斯诉讼拆分标准石油，煤矿罢工中政府首次不站在资方一边，推动食品安全立法和环保。

威尔逊：联邦储备系统、所得税修正案、克莱顿反托拉斯法。

1920年第十九修正案——女性花了72年赢得投票权。

1898年美西战争让美国突然成为太平洋帝国，但菲律宾独立战争中美军使用了酷刑和集中营。进步主义的最大局限：对南方种族隔离视而不见。威尔逊本人在联邦政府推行种族隔离。`,
  ch8: `一战

美国最初中立，但经济利益倾向协约国——出口从8亿飙升到32亿美元。1915年卢西塔尼亚号被击沉，128名美国人遇难。
